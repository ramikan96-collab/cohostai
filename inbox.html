<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>CohostAI | Inbox</title>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .conv-item:hover { background: #F8F9FF; }
    .conv-item.active { background: #EEF0FF; border-left: 3px solid #5B4FE8; }
    #conversation-list, #message-thread { overflow-y: auto; scrollbar-width: thin; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }
    .bottom-nav { box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1); }
    /* dropdown menu animation & positioning */
    .dropdown-menu {
      position: absolute;
      z-index: 50;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.02);
      min-width: 140px;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.1s ease, transform 0.1s ease;
      pointer-events: none;
    }
    .dropdown-menu.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    body.dark .dropdown-menu {
      background: #1E2130;
      border: 1px solid #2D3148;
    }
    .conv-item {
      position: relative;
    }
    .menu-trigger-btn {
      transition: background 0.2s;
    }
    .menu-trigger-btn:hover {
      background: #E2E8F0;
    }
    body.dark .menu-trigger-btn:hover {
      background: #2D3148;
    }
  </style>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg-[#F5F6FA] dark:bg-[#0F1117] h-screen overflow-hidden" onload="init()">

<script src="app.js"></script>
<script>
  var conversations = [];
  var activeConv = null;
  var messages = [];
  var props = {};
  var refreshTimer = null;
  var activeFilter = 'all';
  var draftGenerating = false;
  var replySending = false;
  var chatExpanded = false;
  var openedConvIds = new Set();
  var activeDropdownConvId = null;
  var attachExpandedFolderIds = new Set();
  var hasGuestMessages = false;

  var FUNCTIONS_URL = 'https://scfotrsaabcgxiyemmlg.supabase.co/functions/v1';
  var userProfile = null;

  var EXPAND_ICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
  var COLLAPSE_ICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>';
  var AI_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 5.4L19 9l-5.2.6L12 15l-1.8-5.4L5 9l5.2-.6L12 2z"/><path d="M19 16l.9 2.1L22 19l-2.1.9L19 22l-.9-2.1L16 19l2.1-.9z" opacity="0.65"/><path d="M5 16l.9 2.1L8 19l-2.1.9L5 22l-.9-2.1L2 19l2.1-.9z" opacity="0.65"/></svg>';

  function goToInbox() { window.location.href = '/inbox.html'; }
  function goToProperties() { window.location.href = '/properties.html'; }
  function goToSettings() { window.location.href = '/settings.html'; }

  // FIX 1: Mobile bottom nav — icons now match app.js sidebar exactly (same SVG paths)
  var bottomNavHTML =
    '<div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-[#1E2130] border-t border-[#E2E8F0] dark:border-[#2D3148] bottom-nav z-50">' +
      '<div class="flex items-center justify-around py-2 text-[#64748B] dark:text-[#94A3B8]">' +
        '<button onclick="goToInbox()" class="flex flex-col items-center pt-1 pb-1 text-[#5B4FE8]">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">' +
            '<path d="M4 4h16v16H4z" stroke-width="2"/>' +
            '<path d="M4 9h16" stroke-width="2"/>' +
          '</svg>' +
          '<span class="text-xs mt-1 font-medium">Inbox</span>' +
        '</button>' +
        '<button onclick="goToProperties()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">' +
            '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-width="2"/>' +
          '</svg>' +
          '<span class="text-xs mt-1 font-medium">Properties</span>' +
        '</button>' +
        '<button onclick="goToSettings()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">' +
            '<circle cx="12" cy="12" r="3" stroke-width="2"/>' +
            '<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-width="2"/>' +
          '</svg>' +
          '<span class="text-xs mt-1 font-medium">Settings</span>' +
        '</button>' +
      '</div>' +
    '</div>';

  // Helper to close all dropdowns
  function closeAllDropdowns() {
    document.querySelectorAll('.dropdown-menu').forEach(menu => {
      menu.classList.remove('show');
    });
    activeDropdownConvId = null;
  }

  // Toggle dropdown for specific conversation
  function toggleDropdown(convId, event) {
    event.stopPropagation();
    closeAllDropdowns();
    const targetMenu = document.getElementById(`dropdown-${convId}`);
    if (targetMenu) {
      targetMenu.classList.toggle('show');
      if (targetMenu.classList.contains('show')) {
        activeDropdownConvId = convId;
      } else {
        activeDropdownConvId = null;
      }
    }
  }

  // Edit conversation guest name (inline, triggered from header or 3-dot menu)
  function editConversationName(convId) {
    closeAllDropdowns();
    if (!activeConv || activeConv.id !== convId) {
      openConversation(convId);
      setTimeout(startEditName, 350);
    } else {
      startEditName();
    }
  }

  function startEditName() {
    if (!activeConv) return;
    var headerDiv = document.querySelector('#right-panel .flex-1.min-w-0');
    if (!headerDiv) return;
    var nameEl = headerDiv.querySelector('h2');
    if (!nameEl) return;
    var input = document.createElement('input');
    input.type = 'text';
    input.value = activeConv.guest_name || '';
    input.className = 'font-semibold text-sm text-[#0F172A] dark:text-white bg-transparent border-b-2 border-[#5B4FE8] outline-none w-full';
    input.style.fontSize = '16px';
    input.onblur = function() { saveEditName(input.value); };
    input.onkeydown = function(e) {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') renderConversationDetail();
    };
    nameEl.replaceWith(input);
    input.focus();
    input.select();
  }

  async function saveEditName(newName) {
    if (!activeConv) return;
    var trimmed = newName.trim();
    if (!trimmed || trimmed === activeConv.guest_name) { renderConversationDetail(); return; }
    try {
      var { error } = await sb.from('conversations').update({ guest_name: trimmed }).eq('id', activeConv.id);
      if (error) throw error;
      activeConv.guest_name = trimmed;
      var conv = conversations.find(function(c) { return c.id === activeConv.id; });
      if (conv) conv.guest_name = trimmed;
      renderConversationList();
      renderConversationDetail();
    } catch (err) {
      showToast('Failed to update name', 'error');
      renderConversationDetail();
    }
  }

  // Archive conversation
  async function archiveConversation(convId) {
    const conv = conversations.find(c => c.id === convId);
    if (!conv) return;
    const newStatus = conv.status === 'archived' ? 'new' : 'archived';
    try {
      const { error } = await sb.from('conversations')
        .update({ status: newStatus })
        .eq('id', convId);
      if (error) throw error;
      conv.status = newStatus;
      if (activeConv && activeConv.id === convId) {
        activeConv.status = newStatus;
        if (newStatus === 'archived' && activeFilter !== 'archived') {
          activeConv = null;
          renderConversationDetail();
        }
      }
      renderConversationList();
    } catch (err) {
      showToast('Failed to archive', 'error');
    }
    closeAllDropdowns();
  }

  // Skip conversation
  async function skipConversation(convId) {
    const conv = conversations.find(c => c.id === convId);
    if (!conv) return;
    try {
      const { error } = await sb.from('conversations')
        .update({ status: 'skipped' })
        .eq('id', convId);
      if (error) throw error;
      conv.status = 'skipped';
      if (activeConv && activeConv.id === convId) {
        activeConv.status = 'skipped';
        renderConversationDetail();
        renderMessages();
      }
      renderConversationList();
    } catch (err) {
      showToast('Failed to update', 'error');
    }
    closeAllDropdowns();
  }

  // Delete conversation — shows custom confirmation modal
  function deleteConversation(convId) {
    closeAllDropdowns();
    var existing = document.getElementById('delete-confirm-modal');
    if (existing) existing.remove();
    var modal = document.createElement('div');
    modal.id = 'delete-confirm-modal';
    modal.className = 'fixed inset-0 z-50 flex items-center justify-center px-4';
    modal.style.background = 'rgba(0,0,0,0.35)';
    modal.innerHTML =
      '<div class="bg-white dark:bg-[#1E2130] rounded-2xl p-5 max-w-xs w-full shadow-xl" onclick="event.stopPropagation()">' +
        '<p class="text-sm font-semibold text-[#0F172A] dark:text-white mb-1">Delete conversation?</p>' +
        '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] mb-4">All messages will be permanently lost.</p>' +
        '<div class="flex gap-2">' +
          '<button onclick="document.getElementById(\'delete-confirm-modal\').remove()" class="flex-1 py-2 rounded-xl text-xs font-medium border border-[#E2E8F0] dark:border-[#2D3148] text-[#64748B] dark:text-[#94A3B8] hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148] transition">Cancel</button>' +
          '<button onclick="confirmDelete(\'' + convId + '\')" class="flex-1 py-2 rounded-xl text-xs font-medium bg-red-600 text-white hover:bg-red-700 transition">Delete</button>' +
        '</div>' +
      '</div>';
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
  }

  async function confirmDelete(convId) {
    document.getElementById('delete-confirm-modal')?.remove();
    try {
      const { error: msgsError } = await sb.from('messages').delete().eq('conversation_id', convId);
      if (msgsError) throw msgsError;
      const { error } = await sb.from('conversations').delete().eq('id', convId);
      if (error) throw error;
      conversations = conversations.filter(c => c.id !== convId);
      if (activeConv && activeConv.id === convId) {
        activeConv = null;
        messages = [];
        renderConversationDetail();
      }
      renderConversationList();
      showToast('Conversation deleted', 'success', 2500);
    } catch (err) {
      showToast('Failed to delete: ' + err.message, 'error');
    }
  }

  async function markAsReplied(convId) {
    closeAllDropdowns();
    var conv = conversations.find(function(c) { return c.id === convId; });
    if (!conv) return;
    try {
      var { error } = await sb.from('conversations').update({ status: 'skipped' }).eq('id', convId);
      if (error) throw error;
      conv.status = 'skipped';
      if (activeConv && activeConv.id === convId) {
        activeConv.status = 'skipped';
        renderConversationDetail();
      }
      renderConversationList();
      showToast('Marked as replied', 'success', 2000);
    } catch (err) {
      showToast('Failed to update', 'error');
    }
  }

  function init() {
    initPaddle()
    requireAuth(function(user) {
      const savedOpened = localStorage.getItem('openedConvIds');
      if (savedOpened) {
        JSON.parse(savedOpened).forEach(id => openedConvIds.add(id));
      }

      renderLayout();
      renderConversationDetail();

      sb.from('profiles').select('gmail_refresh_token, created_at').eq('id', currentUser.id).single().then(function(res) {
        if (res.data) userProfile = res.data;
        loadConversations();
      });

      refreshTimer = setInterval(loadConversations, 45000);

      document.addEventListener('click', function(e) {
        if (!e.target.closest('.menu-trigger-btn') && !e.target.closest('.dropdown-menu')) {
          closeAllDropdowns();
        }
      });
    });
  }

  function renderLayout() {
    document.body.innerHTML =
      '<div class="flex h-screen overflow-hidden">' +
        '<div class="hidden lg:block h-full shrink-0">' + renderSidebar('inbox') + '</div>' +
        '<div id="left-panel" class="flex flex-col w-full lg:w-[350px] lg:min-w-[350px] border-r border-[#E2E8F0] dark:border-[#2D3148] bg-white dark:bg-[#1E2130] h-full lg:relative absolute z-30 transition-all duration-300">' +

          // FIX 3: Mobile Inbox title — blue house logo icon (lg:hidden) matches app.js sidebar logo
          '<div class="px-6 py-5 border-b border-[#E2E8F0] dark:border-[#2D3148] flex items-center justify-between bg-white dark:bg-[#1E2130]">' +
            '<div class="flex items-center gap-2.5">' +
              '<div class="lg:hidden flex items-center justify-center w-8 h-8 bg-[#5B4FE8] rounded-xl shrink-0">' +
                '<svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 2L3 8V17H8V12H12V17H17V8L10 2Z" fill="white" fill-opacity="0.95"/></svg>' +
              '</div>' +
              '<h1 class="text-lg font-semibold text-[#0F172A] dark:text-white">Inbox</h1>' +
            '</div>' +
            '<div class="flex items-center gap-2">' +
              '<span id="new-count-badge" class="hidden text-[10px] font-semibold text-[#5B4FE8] bg-[#EEF0FF] px-2 py-0.5 rounded-full"></span>' +
              '<button id="refresh-btn" onclick="manualRefresh()" class="text-[#94A3B8] hover:text-[#5B4FE8] transition">' +
                '<svg id="refresh-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' +
              '</button>' +
            '</div>' +
          '</div>' +

          '<div class="px-5 pt-4 pb-3 border-b border-[#E2E8F0] dark:border-[#2D3148]">' +
            '<input id="search-input" onkeyup="renderConversationList()" placeholder="Search guests, properties..." class="w-full bg-[#F8F9FF] dark:bg-[#151724] border border-[#E2E8F0] dark:border-[#2D3148] dark:text-white rounded-xl px-4 py-2.5 text-sm outline-none focus:border-[#5B4FE8]">' +
          '</div>' +

          // FIX 2: Filter bar — gap-1 → gap-2 for breathing room between tabs
          '<div id="filter-bar" class="px-5 py-3 border-b border-[#E2E8F0] dark:border-[#2D3148] flex gap-2 overflow-x-auto"></div>' +

          '<div id="conversation-list" class="flex-1 overflow-y-auto pb-20 lg:pb-0"></div>' +
        '</div>' +
        '<div id="right-panel" class="flex-1 flex flex-col overflow-hidden bg-[#F5F6FA] dark:bg-[#0F1117] hidden lg:flex"></div>' +
      '</div>' + bottomNavHTML;

    renderFilters('all');
  }

  function showListView() {
    document.getElementById('left-panel').style.transform = 'translateX(0)';
    document.getElementById('right-panel').classList.add('hidden');
  }

  function showChatView() {
    document.getElementById('left-panel').style.transform = 'translateX(-100%)';
    document.getElementById('right-panel').classList.remove('hidden');
  }

  function renderFilters(f) {
    activeFilter = f;
    var filters = [
      { id: 'all', label: 'All' },
      { id: 'new', label: 'New' },
      { id: 'sent', label: 'Sent' },
      { id: 'booked', label: 'Booked' },
      { id: 'archived', label: 'Archived' }
    ];
    var html = '';
    filters.forEach(function(fi) {
      var active = fi.id === f;
      html += '<button onclick="renderFilters(\'' + fi.id + '\')" class="px-3 py-1.5 rounded-lg text-xs font-medium transition whitespace-nowrap ' + (active ? 'bg-[#5B4FE8] text-white' : 'text-[#64748B] dark:text-[#94A3B8] hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148]') + '">' + fi.label + '</button>';
    });
    // Trailing spacer so "Archived" never touches the scroll edge
    html += '<div class="w-3 shrink-0"></div>';
    document.getElementById('filter-bar').innerHTML = html;
    renderConversationList();
    updateNewCountBadge();
  }

  function manualRefresh() {
    var icon = document.getElementById('refresh-icon');
    if (icon) icon.classList.add('spinner');
    loadConversations(function() {
      if (icon) icon.classList.remove('spinner');
    });
  }

  function loadConversations(onDone) {
    if (!currentUser) return;
    sb.from('properties').select('id, name').eq('user_id', currentUser.id).then(function(pRes) {
      if (pRes.data) pRes.data.forEach(function(p) { props[p.id] = p; });
      sb.from('conversations').select('*').eq('user_id', currentUser.id).order('last_message_at', { ascending: false }).then(function(res) {
        if (res.error) { if (onDone) onDone(); return; }
        conversations = res.data || [];
        renderConversationList();
        updateNewCountBadge();
        if (onDone) onDone();
      });
    });
  }

  function renderConversationList() {
    var el = document.getElementById('conversation-list');
    if (!el) return;
    var searchTerm = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
    
    var filtered = conversations.filter(function(c) {
      if (activeFilter === 'all') return c.status !== 'archived';
      if (activeFilter === 'booked') return (c.is_booked === true || c.status === 'booked') && c.status !== 'archived';
      if (activeFilter === 'new') return c.status === 'new' || c.status === 'draft_ready' || c.status === 'notification' || c.status === 'review_reminder' || c.status === 'canceled' || c.unread;
      return c.status === activeFilter;
    });

    if (searchTerm) {
      filtered = filtered.filter(function(c) {
        var propName = (c.property_id && props[c.property_id]) ? props[c.property_id].name : (c.property_name || '');
        return (c.guest_name || '').toLowerCase().includes(searchTerm) ||
          propName.toLowerCase().includes(searchTerm) ||
          (c.last_message_preview || '').toLowerCase().includes(searchTerm) ||
          (c.subject || '').toLowerCase().includes(searchTerm);
      });
    }

    if (filtered.length === 0) {
      var gmailConnected = userProfile && userProfile.gmail_refresh_token;
      if (searchTerm) {
        el.innerHTML =
          '<div class="py-20 text-center px-6 flex flex-col items-center">' +
            '<p class="text-sm font-medium text-[#0F172A] dark:text-white">No results for “' + escHtml(searchTerm) + '”</p>' +
            '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] mt-1">Try a different guest name.</p>' +
          '</div>';
      } else if (!gmailConnected && activeFilter === 'all') {
        el.innerHTML =
          '<div class="py-10 text-center px-6 flex flex-col items-center">' +
            '<div class="w-16 h-16 bg-[#FFF7ED] dark:bg-[#2D1E00] rounded-full flex items-center justify-center mb-4">' +
              '<svg class="w-8 h-8 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>' +
            '</div>' +
            '<p class="text-sm font-semibold text-[#0F172A] dark:text-white mb-1">Connect Gmail to get started</p>' +
            '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] mb-5 max-w-[220px] mx-auto">CohostAI reads Airbnb and Booking.com messages directly from your Gmail inbox.</p>' +
            '<div class="text-left w-full max-w-[220px] mx-auto space-y-2.5 mb-5">' +
              '<div class="flex items-center gap-2.5">' +
                '<div class="w-5 h-5 rounded-full bg-[#5B4FE8] text-white text-[10px] font-bold flex items-center justify-center shrink-0">1</div>' +
                '<span class="text-xs text-[#0F172A] dark:text-white">Connect Gmail in Settings</span>' +
              '</div>' +
              '<div class="flex items-center gap-2.5">' +
                '<div class="w-5 h-5 rounded-full bg-[#E2E8F0] dark:bg-[#2D3148] text-[#94A3B8] text-[10px] font-bold flex items-center justify-center shrink-0">2</div>' +

  function loadMessages(convId) {
    sb.from('messages').select('*').eq('conversation_id', convId).order('created_at', { ascending: true }).then(function(res) {
      messages = res.data || [];
      hasGuestMessages = messages.some(function(m) { return m.role === 'guest'; });
      renderConversationDetail();

    });

  function renderMessages() {
    var el = document.getElementById('messages-inner');
    if (!el) return;

    var draft = messages.find(function(m) { return m.role === 'draft'; });
    var visible = messages.filter(function(m) { return m.role !== 'draft'; });

    var html = '';
    visible.forEach(function(m) {
      if (m.role === 'system') {
        // System messages: centered info pill
        var isGreen = /confirmed|✓/i.test(m.content);
        var isRed = /canceled|✗/i.test(m.content);
        var isAmber = /review|⭐/i.test(m.content);
        var pillColor = isGreen
          ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800'
          : isRed
            ? 'bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 border-red-200 dark:border-red-800'
            : isAmber
              ? 'bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-300 border-amber-200 dark:border-amber-800'
              : 'bg-[#F1F5F9] dark:bg-[#2D3148] text-[#64748B] dark:text-[#94A3B8] border-[#E2E8F0] dark:border-[#3D4168]';
        html +=
          '<div class="flex justify-center my-2 fade-up">' +
            '<span class="text-[11px] font-medium px-3 py-1.5 rounded-full border ' + pillColor + ' max-w-[85%] text-center leading-relaxed">' +
              escHtml(m.content) +
            '</span>' +
          '</div>';
        return;
      }
      var isHost = m.role === 'host';
      var timeStr = formatMessageTime(m.created_at);
      html +=
        '<div class="flex flex-col ' + (isHost ? 'items-end' : 'items-start') + ' fade-up">' +
          '<div class="max-w-[75%] px-4 py-2.5 rounded-2xl text-sm leading-relaxed ' + (isHost ? 'bg-[#5B4FE8] text-white' : 'bg-[#F1F5F9] dark:bg-[#2D3148] text-[#0F172A] dark:text-white') + '">' +
            escHtml(m.content) +
          '</div>' +
          (timeStr ? '<span class="text-[10px] text-[#94A3B8] mt-0.5 ' + (isHost ? 'mr-1' : 'ml-1') + '">' + timeStr + '</span>' : '') +
        '</div>';
    });
    el.innerHTML = html;

    var textarea = document.getElementById('reply-input');

    var thread = document.getElementById('message-thread');
    if (thread) thread.scrollTop = thread.scrollHeight;
  }

  async function generateDraft(overrideContext) {
    if (draftGenerating || !activeConv) return;
    draftGenerating = true;
    var btn = document.getElementById('draft-btn');
    if (btn) btn.innerHTML = '<svg class="spinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Generating...';

    try {
      var context = (overrideContext !== undefined) ? overrideContext : (document.getElementById('context-input')?.value?.trim() || '');
      var session = (await sb.auth.getSession()).data.session;
      var body = { conversation_id: activeConv.id };
      if (context) body.context = context;
      var res = await fetch(FUNCTIONS_URL + '/generate-draft', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify(body),
      });
      var data = await res.json();

      if (!res.ok) {
        if (res.status === 402 || data.error === 'limit_reached') {
          showPaywallModal(data.used)
        } else {
          showToast(data.message || 'Could not generate draft. Please try again.', 'error')
        }
        return
      }

      var textarea = document.getElementById('reply-input');
      if (textarea && data.draft?.content) textarea.value = data.draft.content;
      messages = messages.filter(function(m) { return m.role !== 'draft'; });
      if (data.draft) messages.push(data.draft);
    } catch (e) {
      showToast('Could not generate draft. Check your connection and try again.', 'error');
    } finally {
      draftGenerating = false;
      var btn = document.getElementById('draft-btn');
      if (btn) btn.innerHTML = '<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg> Generate';
    }
  }

  async function sendReply() {
    if (replySending || !activeConv) return;
    var textarea = document.getElementById('reply-input');
    var content = textarea?.value?.trim();
    if (!content) { alert('Please write a reply first.'); return; }

    replySending = true;
    var btn = document.getElementById('send-btn');
    if (btn) btn.innerHTML = '<svg class="spinner" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Sending...';

    try {
      var session = (await sb.auth.getSession()).data.session;
      var res = await fetch(FUNCTIONS_URL + '/send-reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify({ conversation_id: activeConv.id, content: content }),
      });
      var data = await res.json();

      loadMessages(activeConv.id);

      var btn = document.getElementById('send-btn');
      if (btn) btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send';
    }
  }

  function escHtml(str) { return str ? String(str).replace(/[&<>"']/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }) : ''; }
  function formatDate(d) { return d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : ''; }

  function toTitleCase(str) {
    if (!str) return '';
    return str.toLowerCase().replace(/\b\w/g, function(c) { return c.toUpperCase(); });
  }

  function formatStayDates(checkIn, checkOut) {
    if (!checkIn || !checkOut) return '';
    var d1 = new Date(checkIn + 'T00:00:00');
    var d2 = new Date(checkOut + 'T00:00:00');
    var nights = Math.round((d2 - d1) / 86400000);
    if (nights <= 0) return '';
    var nightStr = nights === 1 ? '1 night' : nights + ' nights';
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var d1Day = d1.getDate();
    var d2Day = d2.getDate();
    var d1Month = months[d1.getMonth()];
    var d2Month = months[d2.getMonth()];
    var dateStr = (d1.getMonth() === d2.getMonth() && d1.getFullYear() === d2.getFullYear())
      ? d1Day + '-' + d2Day + ' ' + d1Month
      : d1Day + ' ' + d1Month + '-' + d2Day + ' ' + d2Month;
    return dateStr + ' (' + nightStr + ')';
  }

        '<div class="px-5 py-4 border-b border-[#E2E8F0] dark:border-[#2D3148] flex items-center justify-between shrink-0">' +
          '<div>' +
            '<p class="text-sm font-semibold text-[#0F172A] dark:text-white">Attach media</p>' +
            '<p class="text-xs text-[#94A3B8] mt-0.5">Select a file to insert a link into your reply</p>' +
          '</div>' +
          '<button onclick="closeAttachModal()" class="w-8 h-8 flex items-center justify-center rounded-lg text-[#94A3B8] hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148] transition">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
          '</button>' +
        '</div>' +
        '<div id="attach-content" class="flex-1 overflow-y-auto p-4">' +
          '<div class="flex justify-center py-8"><svg style="animation:spin 0.7s linear infinite" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5B4FE8" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></div>' +
        '</div>' +
      '</div>';

    modal.addEventListener('click', closeAttachModal);
    document.body.appendChild(modal);
    loadAttachFolders();
  }

  function closeAttachModal() {
    var modal = document.getElementById('attach-modal');
    if (modal) modal.remove();
  }

  async function loadAttachFolders() {
    var content = document.getElementById('attach-content');
    if (!content) return;

    if (!activeConv || !activeConv.property_id) {
      content.innerHTML =
        '<div class="text-center py-10">' +
          '<p class="text-sm text-[#94A3B8]">No property linked to this conversation.</p>' +
          '<p class="text-xs text-[#CBD5E1] mt-1">Link a property to access its media folders.</p>' +
        '</div>';
      return;
    }

    try {
      var fRes = await sb.from('property_media_folders')
        .select('*')
        .eq('property_id', activeConv.property_id)
        .order('created_at', { ascending: true });

      if (fRes.error) throw fRes.error;
      var folders = fRes.data || [];

      if (folders.length === 0) {
        content.innerHTML =
          '<div class="text-center py-10">' +
            '<p class="text-sm text-[#94A3B8]">No media folders yet.</p>' +
            '<p class="text-xs text-[#CBD5E1] mt-1">Add folders in the Properties page.</p>' +
          '</div>';
        return;
      }

      var ids = folders.map(function(f) { return f.id; });
      var fileRes = await sb.from('property_media_files')
        .select('*')
        .in('folder_id', ids)
        .order('created_at', { ascending: true });

      var allFiles = fileRes.data || [];
      var enriched = folders.map(function(folder) {
        return Object.assign({}, folder, {
          files: allFiles.filter(function(f) { return f.folder_id === folder.id; })
        });
      });

      // Auto-expand first folder
      if (enriched.length > 0) attachExpandedFolderIds.add(enriched[0].id);
      renderAttachFolders(enriched);

    } catch(e) {
      var c = document.getElementById('attach-content');
      if (c) c.innerHTML = '<p class="text-xs text-red-500 text-center py-6">Failed to load. Please try again.</p>';
    }
  }

  function renderAttachFolders(folders) {
    var content = document.getElementById('attach-content');
    if (!content) return;

    var html = '';
    folders.forEach(function(folder) {
      var isExpanded = attachExpandedFolderIds.has(folder.id);
      html += '<div class="border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl mb-2 overflow-hidden">';

      // Header
      html += '<div onclick="toggleAttachFolder(\'' + folder.id + '\')" class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-[#F8F9FF] dark:hover:bg-[#151724] transition select-none">';
      html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#5B4FE8" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
      html += '<span class="text-sm font-medium text-[#0F172A] dark:text-white flex-1">' + escHtml(folder.name) + '</span>';
      html += '<span class="text-xs text-[#94A3B8] mr-2">' + folder.files.length + ' files</span>';
      html += '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" style="transform:rotate(' + (isExpanded ? '180' : '0') + 'deg);transition:transform 0.2s"><polyline points="6 9 12 15 18 9"/></svg>';
      html += '</div>';

      if (isExpanded) {
        html += '<div class="border-t border-[#E2E8F0] dark:border-[#2D3148] p-3">';

        if (folder.files.length === 0) {
          html += '<p class="text-xs text-[#94A3B8] text-center py-3">No files in this folder.</p>';
        } else {
          html += '<div class="grid grid-cols-3 gap-2">';
          folder.files.forEach(function(file) {
            var publicUrl = sb.storage.from('property-media').getPublicUrl(file.storage_path).data.publicUrl;
            html += '<button onclick="insertMediaLink(\'' + escHtml(file.id) + '\', \'' + escHtml(file.display_name) + '\', \'' + file.file_type + '\')" class="group relative rounded-xl overflow-hidden border border-[#E2E8F0] dark:border-[#2D3148] bg-[#F8F9FF] dark:bg-[#151724] hover:border-[#5B4FE8] transition text-left">';
            if (file.file_type === 'image') {
              html += '<img src="' + escHtml(publicUrl) + '" alt="' + escHtml(file.display_name) + '" class="w-full h-16 object-cover group-hover:opacity-80 transition">';
            } else {
              html += '<div class="w-full h-16 flex items-center justify-center bg-[#EEF0FF] dark:bg-[#2D3148]"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5B4FE8" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>';
            }
            html += '<div class="absolute inset-0 bg-[#5B4FE8]/0 group-hover:bg-[#5B4FE8]/10 transition flex items-center justify-center">';
            html += '<span class="opacity-0 group-hover:opacity-100 text-[10px] font-semibold text-[#5B4FE8] bg-white/90 px-2 py-0.5 rounded-full shadow transition">Insert</span>';
            html += '</div>';
            html += '<p class="text-[10px] text-[#64748B] dark:text-[#94A3B8] px-1.5 py-1 truncate leading-tight">' + escHtml(file.display_name) + '</p>';
            html += '</button>';
          });
          html += '</div>';
        }

        html += '</div>';
      }

      html += '</div>';
    });

    content.innerHTML = html;
  }

  function toggleAttachFolder(folderId) {
    if (attachExpandedFolderIds.has(folderId)) attachExpandedFolderIds.delete(folderId);
    else attachExpandedFolderIds.add(folderId);

    // Re-render using cached folders
    var content = document.getElementById('attach-content');
    if (!content) return;
    // Re-fetch isn't needed — re-render from existing DOM data won't work cleanly,
    // so just reload (fast, already cached by Supabase client)
    loadAttachFolders();
  }

  function insertMediaLink(fileId, displayName, fileType) {
    var emoji = fileType === 'video' ? '🎥' : '📸';
    var url   = 'https://cohostai.vercel.app/view.html?id=' + fileId;
    var line  = emoji + ' ' + displayName + ': ' + url;

    var textarea = document.getElementById('reply-input');
    if (textarea) {
      var current = textarea.value;
      var sep = (current && !current.endsWith('\n')) ? '\n' : '';
      textarea.value = current + sep + line;
      textarea.focus();
      // Move cursor to end
      textarea.selectionStart = textarea.selectionEnd = textarea.value.length;
    }
    closeAttachModal();
  }

  function copyDraft() {
    var textarea = document.getElementById('reply-input');
    if (!textarea || !textarea.value) return;
    navigator.clipboard.writeText(textarea.value).then(function() {
      showToast('Reply copied to clipboard', 'success', 2000);
    }).catch(function() {
      textarea.select();
      document.execCommand('copy');
      showToast('Reply copied', 'success', 2000);
    });
  }

  function formatMessageTime(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr);
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var h = d.getHours(), m = d.getMinutes();
    var ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    return '≈ ' + months[d.getMonth()] + ' ' + d.getDate() + ', ' + h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm;
  }

  function toggleContextInput() {
    var row = document.getElementById('context-row');
    var btn = document.getElementById('context-toggle-btn');
    if (!row) return;
    row.classList.toggle('hidden');
    var isOpen = !row.classList.contains('hidden');
    if (btn) {
      btn.classList.toggle('text-[#5B4FE8]', isOpen);
      btn.classList.toggle('border-[#5B4FE8]', isOpen);
      btn.classList.toggle('bg-[#EEF0FF]', isOpen);
      btn.classList.toggle('text-[#94A3B8]', !isOpen);
    }
    if (isOpen) {
      var inp = document.getElementById('context-input');
      if (inp) inp.focus();
    }
  }

  function toggleEditPanel() {
    var panel = document.getElementById('edit-panel');
    var btn = document.getElementById('edit-toggle-btn');
    if (!panel) return;
    panel.classList.toggle('hidden');
    var isOpen = !panel.classList.contains('hidden');
    if (btn) {
      btn.classList.toggle('text-[#5B4FE8]', isOpen);
      btn.classList.toggle('text-[#94A3B8]', !isOpen);
    }
    if (isOpen) {
      var inp = document.getElementById('edit-input');
      if (inp) inp.focus();
    }
  }

  async function applyEditInstruction() {
    var instruction = document.getElementById('edit-input')?.value?.trim();
    if (!instruction) return;
    var currentDraft = document.getElementById('reply-input')?.value?.trim();
    var combined = currentDraft
      ? 'Current draft:\n' + currentDraft + '\n\nInstruction: ' + instruction
      : instruction;
    toggleEditPanel();
    await generateDraft(combined);
  }

  async function markBooked(convId) {
    var conv = conversations.find(function(c) { return c.id === convId; });
    if (!conv) return;
    var newBooked = !conv.is_booked;
    try {
      var res = await sb.from('conversations').update({ is_booked: newBooked }).eq('id', convId);
      if (res.error) throw res.error;
      conv.is_booked = newBooked;
      if (activeConv && activeConv.id === convId) activeConv.is_booked = newBooked;
      renderConversationList();
    } catch (err) {
      alert('Failed to update: ' + err.message);
    }
    closeAllDropdowns();
  }

  function updateNewCountBadge() {
    var badge = document.getElementById('new-count-badge');
    if (!badge) return;
    var count = conversations.filter(function(c) {
      return c.status === 'new' || c.status === 'draft_ready' ||
             c.status === 'notification' || c.status === 'review_reminder' || c.status === 'canceled' || c.unread;
    }).length;
    if (count > 0) {
      badge.textContent = count + ' new';
      badge.classList.remove('hidden');
    } else {
      badge.classList.add('hidden');
    }
  }
</script>
</body>
</html>
