<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI — Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .conv-item:hover { background: #F8F9FF; }
    .conv-item.active { background: #EEF0FF; border-left: 3px solid #5B4FE8; }
    
    #conversation-list { overflow-y: auto; scrollbar-width: thin; }
    #message-thread { overflow-y: auto; scrollbar-width: thin; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }

    .filter-tab {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="bg-[#F5F6FA] h-screen overflow-hidden" onload="init()">

<script src="app.js"></script>
<script>
  var conversations = [];
  var activeConv = null;
  var messages = [];
  var refreshTimer = null;
  var activeFilter = 'all';

  function init() {
    requireAuth(function(user) {
      renderLayout();
      loadConversations();
      refreshTimer = setInterval(loadConversations, 45000); // slightly more frequent
    });
  }

  function renderLayout() {
    document.body.innerHTML = `
      <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        ${renderSidebar('inbox')}
        
        <div class="flex flex-1 overflow-hidden">
          <!-- Conversation List -->
          <div id="left-panel" class="flex flex-col border-r border-[#E2E8F0] bg-white w-[320px] min-w-[320px]">
            <div class="px-5 py-5 border-b border-[#E2E8F0] flex items-center justify-between bg-white">
              <h1 class="font-semibold text-2xl text-[#0F172A]">Inbox</h1>
              <div class="flex items-center gap-3">
                <button onclick="loadConversations()" class="text-[#94A3B8] hover:text-[#5B4FE8] transition p-1" title="Refresh">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                </button>
              </div>
            </div>

            <!-- Search -->
            <div class="px-5 pt-4 pb-3 border-b border-[#E2E8F0]">
              <div class="relative">
                <input id="search-input" 
                       onkeyup="filterConversations()"
                       placeholder="Search guests or properties..." 
                       class="w-full bg-[#F8F9FF] border border-[#E2E8F0] focus:border-[#5B4FE8] rounded-2xl px-4 py-3 text-sm outline-none">
              </div>
            </div>

            <!-- Filters -->
            <div id="filter-bar" class="px-5 py-3 border-b border-[#E2E8F0] flex gap-1 bg-white"></div>

            <!-- Conversation List -->
            <div id="conversation-list" class="flex-1 overflow-y-auto"></div>
          </div>

          <!-- Main Chat Area -->
          <div id="right-panel" class="flex-1 flex flex-col overflow-hidden bg-[#F5F6FA]"></div>
        </div>
      </div>`;
    
    renderFilters('all');
  }

  function renderFilters(f) {
    activeFilter = f;
    const filters = [
      { id: 'all', label: 'All' },
      { id: 'new', label: 'New' },
      { id: 'draft_ready', label: 'Drafts' },
      { id: 'sent', label: 'Sent' },
      { id: 'archived', label: 'Archived' },
    ];

    let html = '';
    filters.forEach(fi => {
      const active = fi.id === f;
      html += `
        <button onclick="renderFilters('${fi.id}')" 
          class="filter-tab px-5 py-1.5 rounded-2xl text-sm font-medium transition-all ${
            active 
              ? 'bg-[#5B4FE8] text-white shadow-sm' 
              : 'text-[#64748B] hover:bg-[#F1F5F9]'
          }">
          ${fi.label}
        </button>`;
    });

    document.getElementById('filter-bar').innerHTML = html;
    renderConversationList();
  }

  function filterConversations() {
    renderConversationList();
  }

  function loadConversations() {
    sb.from('conversations')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('last_message_at', { ascending: false })
      .then(res => {
        if (res.error) return;
        conversations = res.data || [];
        renderConversationList();
      });
  }

  function renderConversationList() {
    const el = document.getElementById('conversation-list');
    const searchTerm = document.getElementById('search-input')?.value.toLowerCase() || '';

    let filtered = conversations.filter(c => {
      if (activeFilter === 'all') return c.status !== 'archived';
      return c.status === activeFilter;
    });

    if (searchTerm) {
      filtered = filtered.filter(c => 
        c.guest_name?.toLowerCase().includes(searchTerm) ||
        c.property_name?.toLowerCase().includes(searchTerm)
      );
    }

    if (filtered.length === 0) {
      el.innerHTML = `
        <div class="flex flex-col items-center justify-center h-full text-center px-6 py-20">
          <div class="w-20 h-20 bg-white rounded-3xl shadow flex items-center justify-center mx-auto mb-6 border border-[#E2E8F0]">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <p class="text-[#0F172A] font-semibold mb-1">No conversations</p>
          <p class="text-sm text-[#94A3B8]">Try changing filter or search term</p>
        </div>`;
      return;
    }

    let html = '';
    filtered.forEach(c => {
      const isActive = activeConv && activeConv.id === c.id;
      html += `
        <div onclick="openConversation('${c.id}')" 
             class="conv-item px-5 py-4 border-b border-[#F1F5F9] cursor-pointer ${isActive ? 'active' : ''}">
          <div class="flex justify-between items-start mb-1">
            <div class="flex items-center gap-2">
              ${c.unread ? `<div class="w-2.5 h-2.5 bg-[#5B4FE8] rounded-full"></div>` : ''}
              <span class="font-semibold text-[#0F172A]">${escHtml(c.guest_name)}</span>
            </div>
            <span class="text-xs text-[#94A3B8] whitespace-nowrap">${formatDate(c.last_message_at)}</span>
          </div>
          
          <div class="flex items-center justify-between gap-2">
            <p class="text-sm text-[#64748B] truncate flex-1">${escHtml(c.last_message_preview || 'No messages yet')}</p>
            ${statusBadge(c.status)}
          </div>
          
          ${c.property_name ? `<p class="text-xs text-[#94A3B8] mt-1 truncate">${escHtml(c.property_name)}</p>` : ''}
        </div>`;
    });

    el.innerHTML = html;
  }

  // Keep your existing functions: openConversation, renderConversationDetail, loadMessages, etc.
  // I'll help you upgrade them next if you want.

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ... (you can keep the rest of your functions for now)
</script>
</body>
</html>
