<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI — Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .conv-item:hover { background: #F8F9FF; }
    .conv-item.active { background: #EEF0FF; border-left: 3px solid #5B4FE8; }
    
    #conversation-list { overflow-y: auto; scrollbar-width: thin; }
    #message-thread { overflow-y: auto; scrollbar-width: thin; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }

    .bottom-nav {
      box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1);
    }
  </style>
</head>
<body class="bg-[#F5F6FA] h-screen overflow-hidden" onload="init()">

<script src="app.js"></script>
<script>
  var conversations = [];
  var activeConv = null;
  var messages = [];
  var refreshTimer = null;
  var activeFilter = 'all';

  function init() {
    requireAuth(function(user) {
      renderLayout();
      loadConversations();
      refreshTimer = setInterval(loadConversations, 45000);
    });
  }

  function renderLayout() {
    document.body.innerHTML = `
      <div class="flex h-screen overflow-hidden">

        <!-- LEFT PANEL - Conversation List -->
        <div id="left-panel" class="flex flex-col w-full lg:w-[320px] lg:min-w-[320px] border-r border-[#E2E8F0] bg-white h-full lg:relative absolute z-30 transition-all duration-300">
          
          <!-- Header with App Logo -->
          <div class="px-5 py-5 border-b border-[#E2E8F0] flex items-center justify-between bg-white">
            <div class="flex items-center gap-3">
              <!-- App Logo -->
              <div class="w-9 h-9 bg-gradient-to-br from-[#5B4FE8] to-[#7C6EFF] rounded-2xl flex items-center justify-center shadow-sm">
                <span class="text-white font-bold text-xl tracking-tighter">CA</span>
              </div>
              <h1 class="font-semibold text-2xl text-[#0F172A]">CohostAI</h1>
            </div>
            
            <button onclick="loadConversations()" class="text-[#94A3B8] hover:text-[#5B4FE8] transition" title="Refresh">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
          </div>

          <!-- Search -->
          <div class="px-5 pt-4 pb-3 border-b border-[#E2E8F0]">
            <input id="search-input" 
                   onkeyup="renderConversationList()" 
                   placeholder="Search guests or properties..." 
                   class="w-full bg-[#F8F9FF] border border-[#E2E8F0] focus:border-[#5B4FE8] rounded-2xl px-4 py-3 text-sm outline-none">
          </div>

          <!-- Filters -->
          <div id="filter-bar" class="px-5 py-3 border-b border-[#E2E8F0] flex gap-1 bg-white overflow-x-auto pb-4"></div>

          <!-- Conversation List -->
          <div id="conversation-list" class="flex-1 overflow-y-auto"></div>
        </div>

        <!-- RIGHT PANEL - Chat -->
        <div id="right-panel" class="flex-1 flex flex-col overflow-hidden bg-[#F5F6FA] hidden lg:flex"></div>
      </div>

      <!-- BOTTOM NAV - Mobile -->
      <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-[#E2E8F0] bottom-nav z-50">
        <div class="flex items-center justify-around py-2 text-[#64748B]">
          
          <!-- Inbox -->
          <button onclick="showListView()" class="flex flex-col items-center pt-1 pb-1 text-[#5B4FE8]">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2.01 2.01 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2" />
            </svg>
            <span class="text-xs mt-1 font-medium">Inbox</span>
          </button>

          <!-- Properties -->
          <button onclick="goToPage('properties')" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5" />
            </svg>
            <span class="text-xs mt-1">Properties</span>
          </button>

          <!-- Settings -->
          <button onclick="goToPage('settings')" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 002.573-1.066c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 00.817 1.194 1.724 1.724 0 01.817 1.194c-.94 1.543.827 3.31 2.37 2.37 1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 01-2.573 1.066 1.724 1.724 0 01-.817 1.194 1.724 1.724 0 01-.817 1.194c-.94 1.543.827 3.31 2.37 2.37 1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 01-2.573 1.066 1.724 1.724 0 01-.817 1.194 1.724 1.724 0 01-.817 1.194c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 01-.817-1.194 1.724 1.724 0 01-.817-1.194c-.94-1.543.827-3.31 2.37-2.37 1.756-.426 1.756-2.924 0-3.35z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-xs mt-1">Settings</span>
          </button>
        </div>
      </div>
    `;

    renderFilters('all');
  }

  function goToPage(page) {
    alert(`Navigating to ${page} page... (implement routing here)`);
    // TODO: Add your navigation logic here (e.g. window.location or SPA routing)
  }

  function showListView() {
    document.getElementById('left-panel').style.transform = 'translateX(0)';
    document.getElementById('right-panel').classList.add('hidden');
  }

  function showChatView() {
    document.getElementById('left-panel').style.transform = 'translateX(-100%)';
    document.getElementById('right-panel').classList.remove('hidden');
  }

  // ==================== Rest of your functions (same as before) ====================
  function renderFilters(f) { /* ... same as previous version ... */ }
  function loadConversations() { /* ... */ }
  function renderConversationList() { /* ... */ }
  function openConversation(id) { /* ... */ }
  function renderConversationDetail() { /* ... */ }
  function loadMessages(convId) { /* ... */ }
  function generateDraft() { alert("AI Draft generation coming soon..."); }

  function statusBadge(status) {
    const config = {
      new: { label: 'New', cls: 'bg-amber-100 text-amber-700' },
      sent: { label: 'Sent', cls: 'bg-emerald-100 text-emerald-700' },
      archived: { label: 'Archived', cls: 'bg-gray-100 text-gray-600' },
      draft_ready: { label: 'Draft', cls: 'bg-blue-100 text-blue-700' }
    };
    const s = config[status] || { label: status, cls: 'bg-gray-100 text-gray-600' };
    return `<span class="text-xs px-3 py-1 rounded-full font-medium ${s.cls}">${s.label}</span>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }
</script>
</body>
</html>
