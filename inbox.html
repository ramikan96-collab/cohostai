<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI — Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .conv-item:hover { background: #F8F9FF; }
    .conv-item.active { background: #EEF0FF; border-left: 3px solid #5B4FE8; }
    
    #conversation-list { overflow-y: auto; scrollbar-width: thin; }
    #message-thread { overflow-y: auto; scrollbar-width: thin; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }

    .bottom-nav { box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-[#F5F6FA] h-screen overflow-hidden" onload="init()">

<script src="app.js"></script>
<script>
  var conversations = [];
  var activeConv = null;
  var messages = [];
  var refreshTimer = null;
  var activeFilter = 'all';

  function init() {
    requireAuth(function(user) {
      renderLayout();
      loadConversations();
      refreshTimer = setInterval(loadConversations, 45000);
    });
  }

  function renderLayout() {
    document.body.innerHTML = `
      <div class="flex h-screen overflow-hidden">

        <!-- LEFT PANEL -->
        <div id="left-panel" class="flex flex-col w-full lg:w-[320px] lg:min-w-[320px] border-r border-[#E2E8F0] bg-white h-full lg:relative absolute z-30 transition-all duration-300">
          
          <!-- Header -->
          <div class="px-5 py-5 border-b border-[#E2E8F0] flex items-center justify-between bg-white">
            <div class="flex items-center gap-3">
              <div class="w-9 h-9 bg-[#5B4FE8] rounded-2xl flex items-center justify-center">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </div>
              <h1 class="text-2xl font-semibold text-[#0F172A]">CohostAI</h1>
            </div>
            
            <button onclick="loadConversations()" class="text-[#94A3B8] hover:text-[#5B4FE8] transition" title="Refresh">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
          </div>

          <!-- Search -->
          <div class="px-5 pt-4 pb-3 border-b border-[#E2E8F0]">
            <input id="search-input" onkeyup="renderConversationList()" 
                   placeholder="Search guests or properties..." 
                   class="w-full bg-[#F8F9FF] border border-[#E2E8F0] focus:border-[#5B4FE8] rounded-2xl px-4 py-3 text-sm outline-none">
          </div>

          <!-- Filters -->
          <div id="filter-bar" class="px-5 py-3 border-b border-[#E2E8F0] flex gap-1 bg-white overflow-x-auto"></div>

          <!-- Conversation List -->
          <div id="conversation-list" class="flex-1 overflow-y-auto"></div>
        </div>

        <!-- RIGHT PANEL -->
        <div id="right-panel" class="flex-1 flex flex-col overflow-hidden bg-[#F5F6FA] hidden lg:flex"></div>
      </div>

      <!-- BOTTOM NAV - Mobile -->
      <div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-[#E2E8F0] bottom-nav z-50">
        <div class="flex items-center justify-around py-2 text-[#64748B]">
          <button onclick="showListView()" class="flex flex-col items-center pt-1 pb-1 text-[#5B4FE8]">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2.01 2.01 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2" />
            </svg>
            <span class="text-xs mt-1 font-medium">Inbox</span>
          </button>

          <button onclick="goToProperties()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5" />
            </svg>
            <span class="text-xs mt-1 font-medium">Properties</span>
          </button>

          <button onclick="goToSettings()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 002.573-1.066c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 00.817 1.194 1.724 1.724 0 01.817 1.194c-.94 1.543.827 3.31 2.37 2.37 1.756.426 1.756 2.924 0 3.35z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
            <span class="text-xs mt-1 font-medium">Settings</span>
          </button>
        </div>
      </div>
    `;

    renderFilters('all');
  }

  function goToProperties() {
    window.location.href = '/properties.html';
  }

  function goToSettings() {
    window.location.href = '/settings.html';
  }

  function showListView() {
    document.getElementById('left-panel').style.transform = 'translateX(0)';
    document.getElementById('right-panel').classList.add('hidden');
  }

  function showChatView() {
    document.getElementById('left-panel').style.transform = 'translateX(-100%)';
    document.getElementById('right-panel').classList.remove('hidden');
  }

  // ====================== FILTERS ======================
  function renderFilters(f) {
    activeFilter = f;
    var filters = [
      { id: 'all', label: 'All' },
      { id: 'new', label: 'New' },
      { id: 'sent', label: 'Sent' },
      { id: 'archived', label: 'Archived' }
    ];
    var html = '';
    filters.forEach(function(fi) {
      var active = fi.id === f;
      html += `<button onclick="renderFilters('${fi.id}')" class="px-5 py-2 rounded-2xl text-sm font-medium transition whitespace-nowrap ${
        active ? 'bg-[#5B4FE8] text-white shadow-sm' : 'text-[#64748B] hover:bg-[#F1F5F9]'
      }">${fi.label}</button>`;
    });
    document.getElementById('filter-bar').innerHTML = html;
    renderConversationList();
  }

  // ====================== CONVERSATIONS ======================
  function loadConversations() {
    sb.from('conversations')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('last_message_at', { ascending: false })
      .then(function(res) {
        if (res.error) return;
        conversations = res.data || [];
        renderConversationList();
      });
  }

  function renderConversationList() {
    var el = document.getElementById('conversation-list');
    if (!el) return;
   
    var searchTerm = (document.getElementById('search-input')?.value || '').toLowerCase().trim();

    var filtered = conversations.filter(function(c) {
      if (activeFilter === 'all') return c.status !== 'archived';
      return c.status === activeFilter;
    });

    if (searchTerm) {
      filtered = filtered.filter(c => 
        (c.guest_name || '').toLowerCase().includes(searchTerm) ||
        (c.property_name || '').toLowerCase().includes(searchTerm)
      );
    }

    if (filtered.length === 0) {
      el.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center px-4 py-20">
        <div class="w-16 h-16 bg-white rounded-xl shadow-sm flex items-center justify-center mx-auto mb-3 border border-[#E2E8F0]">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#5B4FE8" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p class="text-sm font-semibold text-[#0F172A] mb-1">No conversations yet</p>
        <p class="text-xs text-[#94A3B8] text-center">Messages from Airbnb & Booking.com will appear here</p>
      </div>`;
      return;
    }
    
    var html = '';
    filtered.forEach(function(c) {
      var isActive = activeConv && activeConv.id === c.id;
      html += `<div class="conv-item px-5 py-4 border-b border-[#F1F5F9] cursor-pointer ${isActive ? 'active' : ''}" onclick="openConversation('${c.id}')">`;
      html += `<div class="flex items-start justify-between gap-2 mb-1">`;
      html += `<div class="flex items-center gap-1.5 min-w-0">`;
      if (c.unread) html += `<div class="w-2 h-2 bg-[#5B4FE8] rounded-full shrink-0"></div>`;
      html += `<span class="text-sm font-semibold text-[#0F172A] truncate">${escHtml(c.guest_name)}</span>`;
      html += `</div>`;
      html += `<span class="text-xs text-[#94A3B8] shrink-0">${formatDate(c.last_message_at)}</span>`;
      html += `</div>`;
      html += `<div class="flex items-center justify-between gap-2">`;
      html += `<p class="text-sm text-[#64748B] truncate">${escHtml(c.last_message_preview || '')}</p>`;
      html += statusBadge(c.status);
      html += `</div>`;
      if (c.property_name) {
        html += `<p class="text-xs text-[#94A3B8] mt-1 truncate">${escHtml(c.property_name)}</p>`;
      }
      html += `</div>`;
    });
    el.innerHTML = html;
  }

  function openConversation(id) {
    activeConv = conversations.find(function(c) { return c.id === id; }) || null;
    if (!activeConv) return;
    
    if (activeConv.unread) {
      sb.from('conversations').update({ unread: false }).eq('id', id).then(function(){});
      activeConv.unread = false;
      renderConversationList();
    }
    
    renderConversationList();
    renderConversationDetail();
    loadMessages(id);

    if (window.innerWidth < 768) showChatView();
  }

  function renderConversationDetail() {
    var c = activeConv;
    var panel = document.getElementById('right-panel');
    if (!c) {
      panel.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center text-center p-8 bg-[#F5F6FA]">
        <div class="w-20 h-20 bg-white rounded-2xl shadow-sm flex items-center justify-center mx-auto mb-4 border border-[#E2E8F0]">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#5B4FE8" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p class="text-base font-semibold text-[#0F172A] mb-1">Select a conversation</p>
        <p class="text-sm text-[#94A3B8]">Choose a guest thread to view the conversation and draft a reply.</p>
      </div>`;
      return;
    }
    
    var html = '';
    html += `<div class="px-5 py-4 border-b border-[#E2E8F0] bg-white flex items-center justify-between">`;
    html += `<div>`;
    html += `<div class="flex items-center gap-2">`;
    html += `<h2 class="font-semibold text-[#0F172A]">${escHtml(c.guest_name)}</h2>`;
    html += statusBadge(c.status);
    html += `</div>`;
    var meta = [];
    if (c.platform) meta.push(c.platform.charAt(0).toUpperCase() + c.platform.slice(1));
    if (c.property_name) meta.push(c.property_name);
    if (c.check_in) meta.push('Check-in ' + c.check_in);
    if (meta.length) html += `<p class="text-xs text-[#64748B] mt-0.5">${meta.join(' · ')}</p>`;
    html += `</div>`;
    html += `<div class="flex items-center gap-2">`;
    html += `<button onclick="archiveConv()" class="text-xs text-[#64748B] hover:text-[#0F172A] border border-[#E2E8F0] px-3 py-1.5 rounded-lg transition">`;
    html += c.status === 'archived' ? 'Unarchive' : 'Archive';
    html += `</button>`;
    html += `</div></div>`;
    
    html += `<div id="message-thread" class="flex-1 overflow-y-auto px-5 py-4 space-y-4">`;
    html += `<div id="messages-inner"><div class="flex justify-center py-8"><svg class="spinner w-5 h-5 text-[#5B4FE8]" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg></div></div>`;
    html += `</div>`;
    
    html += `<div id="reply-area" class="border-t border-[#E2E8F0] bg-white px-5 py-4">`;
    html += `<div id="draft-section"></div>`;
    html += `<div class="mt-3">`;
    html += `<label class="block text-xs font-medium text-[#64748B] mb-1.5">Add context for AI <span class="font-normal">(optional)</span></label>`;
    html += `<textarea id="context-input" rows="2" placeholder="e.g. Early check-in not available this weekend..." class="w-full px-3 py-2 text-sm border border-[#E2E8F0] rounded-lg outline-none focus:border-[#5B4FE8] resize-none transition"></textarea>`;
    html += `</div>`;
    html += `<div class="flex items-center gap-2 mt-3">`;
    html += `<button onclick="generateDraft()" id="gen-btn" class="flex items-center gap-1.5 px-4 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">`;
    html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;
    html += `<span id="gen-btn-text">Generate Draft</span>`;
    html += `</button>`;
    html += `</div></div>`;
    
    panel.innerHTML = html;
  }

  function loadMessages(convId) {
    sb.from('messages')
      .select('*')
      .eq('conversation_id', convId)
      .order('sent_at', { ascending: true })
      .then(function(res) {
        messages = res.data || [];
        renderMessages();
      });
  }

  function renderMessages() {
    var el = document.getElementById('messages-inner');
    if (!el) return;
    if (messages.length === 0) {
      el.innerHTML = '<p class="text-sm text-[#94A3B8] text-center py-8">No messages yet</p>';
      return;
    }
    
    var html = '';
    messages.forEach(function(m) {
      if (m.is_draft) return;
      var isHost = m.role === 'host';
      var isGuest = m.role === 'guest';
      
      html += `<div class="fade-up flex ${isHost ? 'justify-end' : 'justify-start'}">`;
      html += `<div class="max-w-[75%]">`;
      
      var bubbleCls = isHost
        ? 'bg-[#5B4FE8] text-white rounded-2xl rounded-br-sm'
        : isGuest
          ? 'bg-white border border-[#E2E8F0] text-[#0F172A] rounded-2xl rounded-bl-sm'
          : 'bg-[#F5F6FA] text-[#64748B] rounded-2xl text-xs italic';
          
      html += `<div class="px-4 py-2.5 text-sm ${bubbleCls}">${escHtml(m.content).replace(/\n/g, '<br>')}</div>`;
      html += `<p class="text-xs text-[#94A3B8] mt-1 ${isHost ? 'text-right' : 'text-left'}">${formatDate(m.sent_at)}</p>`;
      html += `</div></div>`;
    });
    
    var draft = messages.find(function(m) { return m.is_draft; });
    var draftSection = document.getElementById('draft-section');
    if (draftSection) {
      if (draft) {
        draftSection.innerHTML = `
          <div class="bg-[#EEF0FF] border border-[#5B4FE8]/20 rounded-xl p-3">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs font-semibold text-[#5B4FE8]">AI Draft</span>
              <button onclick="discardDraft('${draft.id}')" class="text-xs text-[#94A3B8] hover:text-red-500 transition">Discard</button>
            </div>
            <textarea id="draft-text" rows="4" class="w-full bg-transparent text-sm text-[#0F172A] outline-none resize-none">${escHtml(draft.content)}</textarea>
            <div class="flex justify-end mt-2">
              <button id="send-btn" onclick="sendReply()" class="flex items-center gap-1.5 px-4 py-2 bg-emerald-600 text-white text-sm font-medium rounded-lg hover:bg-emerald-700 transition">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Send Reply
              </button>
            </div>
          </div>`;
      } else {
        draftSection.innerHTML = '';
      }
    }
    
    el.innerHTML = html;
    var thread = document.getElementById('message-thread');
    if (thread) thread.scrollTop = thread.scrollHeight;
  }

  function generateDraft() {
    if (!activeConv) return;
    var context = document.getElementById('context-input').value.trim();
    var btn = document.getElementById('gen-btn');
    var btnText = document.getElementById('gen-btn-text');
    btn.disabled = true;
    btnText.textContent = 'Generating...';
    
    sb.functions.invoke('generate-draft', {
      body: { conversation_id: activeConv.id, context: context }
    }).then(function(res) {
      btn.disabled = false;
      btnText.textContent = 'Generate Draft';
      if (res.error) { alert('Error: ' + res.error.message); return; }
      loadMessages(activeConv.id);
      activeConv.status = 'draft_ready';
      conversations = conversations.map(function(c) {
        return c.id === activeConv.id ? Object.assign({}, c, { status: 'draft_ready' }) : c;
      });
      renderConversationList();
    });
  }

  function sendReply() {
    var draftText = document.getElementById('draft-text');
    if (!draftText || !activeConv) return;
    var content = draftText.value.trim();
    if (!content) return;
    
    var btn = document.getElementById('send-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Sending...'; }
    
    sb.functions.invoke('send-reply', {
      body: { conversation_id: activeConv.id, content: content }
    }).then(function(res) {
      if (btn) { btn.disabled = false; btn.textContent = 'Send Reply'; }
      if (res.error) { alert('Error sending: ' + res.error.message); return; }
      activeConv.status = 'sent';
      conversations = conversations.map(function(c) {
        return c.id === activeConv.id ? Object.assign({}, c, { status: 'sent', last_message_preview: '[You]: ' + content.slice(0, 80) }) : c;
      });
      renderConversationList();
      loadMessages(activeConv.id);
    });
  }

  function discardDraft(draftId) {
    sb.from('messages').delete().eq('id', draftId).then(function() {
      loadMessages(activeConv.id);
    });
  }

  function archiveConv() {
    if (!activeConv) return;
    var newStatus = activeConv.status === 'archived' ? 'new' : 'archived';
    sb.from('conversations').update({ status: newStatus }).eq('id', activeConv.id).then(function() {
      activeConv.status = newStatus;
      conversations = conversations.map(function(c) {
        return c.id === activeConv.id ? Object.assign({}, c, { status: newStatus }) : c;
      });
      renderConversationList();
      renderConversationDetail();
      loadMessages(activeConv.id);
    });
  }

  function statusBadge(status) {
    const config = {
      new: { label: 'New', cls: 'bg-amber-100 text-amber-700' },
      sent: { label: 'Sent', cls: 'bg-emerald-100 text-emerald-700' },
      archived: { label: 'Archived', cls: 'bg-gray-100 text-gray-600' },
      draft_ready: { label: 'Draft', cls: 'bg-blue-100 text-blue-700' }
    };
    const s = config[status] || { label: status, cls: 'bg-gray-100 text-gray-600' };
    return `<span class="text-xs px-3 py-1 rounded-full font-medium ${s.cls}">${s.label}</span>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
</script>
</body>
</html>
