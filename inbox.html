<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI — Inbox</title>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .conv-item:hover { background: #F8F9FF; }
    .conv-item.active { background: #EEF0FF; border-left: 3px solid #5B4FE8; }
    #conversation-list, #message-thread { overflow-y: auto; scrollbar-width: thin; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }
    .bottom-nav { box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-[#F5F6FA] dark:bg-[#0F1117] h-screen overflow-hidden" onload="init()">

<script src="app.js"></script>
<script>
  var conversations = [];
  var activeConv = null;
  var messages = [];
  var refreshTimer = null;
  var activeFilter = 'all';

  function goToInbox() { window.location.href = '/inbox.html'; }
  function goToProperties() { window.location.href = '/properties.html'; }
  function goToSettings() { window.location.href = '/settings.html'; }

  var bottomNavHTML = 
    '<div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-[#1E2130] border-t border-[#E2E8F0] dark:border-[#2D3148] bottom-nav z-50">' +
      '<div class="flex items-center justify-around py-2 text-[#64748B] dark:text-[#94A3B8]">' +
        '<button onclick="goToInbox()" class="flex flex-col items-center pt-1 pb-1 text-[#5B4FE8]">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2.01 2.01 0 002.22 0L21 8M5 19h14a2 2 0 0 1-2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2" /></svg>' +
          '<span class="text-xs mt-1 font-medium">Inbox</span>' +
        '</button>' +
        '<button onclick="goToProperties()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5" /></svg>' +
          '<span class="text-xs mt-1 font-medium">Properties</span>' +
        '</button>' +
        '<button onclick="goToSettings()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 002.573-1.066c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 00.817 1.194 1.724 1.724 0 01.817 1.194c-.94 1.543.827 3.31 2.37 2.37 1.756.426 1.756 2.924 0 3.35z" /><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>' +
          '<span class="text-xs mt-1 font-medium">Settings</span>' +
        '</button>' +
      '</div>' +
    '</div>';

  function init() {
    requireAuth(function(user) {
      renderLayout();
      loadConversations();
      refreshTimer = setInterval(loadConversations, 45000);
    });
  }

  function renderLayout() {
    document.body.innerHTML = 
      '<div class="flex h-screen overflow-hidden">' +
        // RESTORED SIDEBAR FOR DESKTOP
        '<div class="hidden lg:block h-full shrink-0">' + renderSidebar('inbox') + '</div>' +

        // LEFT PANEL (Conversation List)
        '<div id="left-panel" class="flex flex-col w-full lg:w-[350px] lg:min-w-[350px] border-r border-[#E2E8F0] dark:border-[#2D3148] bg-white dark:bg-[#1E2130] h-full lg:relative absolute z-30 transition-all duration-300">' +
          
          // CORRECTED HEADER: Matches size/style of other pages
          '<div class="px-6 py-5 border-b border-[#E2E8F0] dark:border-[#2D3148] flex items-center justify-between bg-white dark:bg-[#1E2130]">' +
            '<h1 class="text-lg font-semibold text-[#0F172A] dark:text-white">Inbox</h1>' +
            '<button onclick="loadConversations()" class="text-[#94A3B8] hover:text-[#5B4FE8] transition">' +
              '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' +
            '</button>' +
          '</div>' +

          '<div class="px-5 pt-4 pb-3 border-b border-[#E2E8F0] dark:border-[#2D3148]">' +
            '<input id="search-input" onkeyup="renderConversationList()" placeholder="Search guests..." class="w-full bg-[#F8F9FF] dark:bg-[#151724] border border-[#E2E8F0] dark:border-[#2D3148] dark:text-white rounded-xl px-4 py-2.5 text-sm outline-none focus:border-[#5B4FE8]">' +
          '</div>' +

          '<div id="filter-bar" class="px-5 py-3 border-b border-[#E2E8F0] dark:border-[#2D3148] flex gap-1 overflow-x-auto"></div>' +
          '<div id="conversation-list" class="flex-1 overflow-y-auto pb-20 lg:pb-0"></div>' +
        '</div>' +

        // RIGHT PANEL (Chat Detail)
        '<div id="right-panel" class="flex-1 flex flex-col overflow-hidden bg-[#F5F6FA] dark:bg-[#0F1117] hidden lg:flex"></div>' +
      '</div>' + bottomNavHTML;

    renderFilters('all');
  }

  // Navigation Logic
  function showListView() {
    document.getElementById('left-panel').style.transform = 'translateX(0)';
    document.getElementById('right-panel').classList.add('hidden');
  }

  function showChatView() {
    document.getElementById('left-panel').style.transform = 'translateX(-100%)';
    document.getElementById('right-panel').classList.remove('hidden');
  }

  // Logic remains the same, but HTML wrappers updated for theme/spacing consistency
  function renderFilters(f) {
    activeFilter = f;
    var filters = [{ id: 'all', label: 'All' }, { id: 'new', label: 'New' }, { id: 'sent', label: 'Sent' }, { id: 'archived', label: 'Archived' }];
    var html = '';
    filters.forEach(function(fi) {
      var active = fi.id === f;
      html += `<button onclick="renderFilters('${fi.id}')" class="px-4 py-1.5 rounded-lg text-xs font-medium transition whitespace-nowrap ${active ? 'bg-[#5B4FE8] text-white' : 'text-[#64748B] dark:text-[#94A3B8] hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148]' }">${fi.label}</button>`;
    });
    document.getElementById('filter-bar').innerHTML = html;
    renderConversationList();
  }

  function loadConversations() {
    sb.from('conversations').select('*').eq('user_id', currentUser.id).order('last_message_at', { ascending: false }).then(function(res) {
      if (res.error) return;
      conversations = res.data || [];
      renderConversationList();
    });
  }

// Updated logic for the Conversation List (Left Panel)
  function renderConversationList() {
    var el = document.getElementById('conversation-list');
    if (!el) return;
    var searchTerm = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
    var filtered = conversations.filter(c => activeFilter === 'all' ? c.status !== 'archived' : c.status === activeFilter);
    if (searchTerm) filtered = filtered.filter(c => (c.guest_name || '').toLowerCase().includes(searchTerm));

    if (filtered.length === 0) {
      el.innerHTML = `
        <div class="py-20 text-center px-6 flex flex-col items-center animate-fade-in">
          <div class="w-16 h-16 bg-[#F1F5F9] dark:bg-[#2D3148] rounded-full flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-[#94A3B8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
            </svg>
          </div>
          <p class="text-sm font-medium text-[#0F172A] dark:text-white">Your inbox is clear</p>
          <p class="text-xs text-[#64748B] dark:text-[#94A3B8] mt-1">All caught up! New guest inquiries will appear here.</p>
        </div>`;
      return;
    }

    
    var html = '';
    filtered.forEach(function(c) {
      var isActive = activeConv && activeConv.id === c.id;
      html += `<div class="conv-item px-6 py-4 border-b border-[#F1F5F9] dark:border-[#2D3148] cursor-pointer ${isActive ? 'active' : ''}" onclick="openConversation('${c.id}')">`;
      html += `<div class="flex justify-between mb-1"><span class="text-sm font-semibold dark:text-white truncate">${escHtml(c.guest_name)}</span><span class="text-[10px] text-[#94A3B8]">${formatDate(c.last_message_at)}</span></div>`;
      html += `<p class="text-xs text-[#64748B] dark:text-[#94A3B8] truncate">${escHtml(c.last_message_preview || '')}</p></div>`;
    });
    el.innerHTML = html;
  }

  function openConversation(id) {
    activeConv = conversations.find(c => c.id === id);
    renderConversationList();
    renderConversationDetail();
    loadMessages(id);
    if (window.innerWidth < 1024) showChatView();
  }

// Updated logic for the Chat Window (Right Panel)
  function renderConversationDetail() {
    var c = activeConv;
    var panel = document.getElementById('right-panel');
    if (!c) {
      panel.innerHTML = `
        <div class="flex-1 flex flex-col items-center justify-center text-center p-8 bg-[#F5F6FA] dark:bg-[#0F1117]">
          <div class="w-20 h-20 bg-white dark:bg-[#1E2130] rounded-3xl shadow-sm flex items-center justify-center mb-6">
            <svg class="w-10 h-10 text-[#5B4FE8]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
            </svg>
          </div>
          <h3 class="text-lg font-semibold text-[#0F172A] dark:text-white mb-2">Select a conversation</h3>
          <p class="text-sm text-[#64748B] dark:text-[#94A3B8] max-w-xs">
            Pick a guest from the list to view their booking details and start messaging.
          </p>
        </div>`;
      return;
    }
    
    panel.innerHTML = 
      `<div class="flex-1 flex flex-col bg-white dark:bg-[#0F1117]">
        <div class="px-6 py-4 border-b border-[#E2E8F0] dark:border-[#2D3148] flex items-center justify-between">
          <div class="flex items-center gap-3">
            <button onclick="showListView()" class="lg:hidden text-[#64748B]"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
            <h2 class="font-semibold text-sm dark:text-white">${escHtml(c.guest_name)}</h2>
          </div>
        </div>
        <div id="message-thread" class="flex-1 p-6 space-y-4 pb-24">
          <div id="messages-inner"></div>
        </div>
      </div>`;
  }

  // Load/Render messages and helper functions (escHtml, formatDate) remain identical to source logic
  function loadMessages(convId) {
    sb.from('messages').select('*').eq('conversation_id', convId).order('sent_at', { ascending: true }).then(function(res) {
      messages = res.data || [];
      renderMessages();
    });
  }

  function renderMessages() {
    var el = document.getElementById('messages-inner');
    if (!el) return;
    var html = '';
    messages.forEach(m => {
      var isHost = m.role === 'host';
      html += `<div class="flex ${isHost ? 'justify-end' : 'justify-start'}"><div class="max-w-[80%] px-4 py-2 rounded-2xl text-sm ${isHost ? 'bg-[#5B4FE8] text-white' : 'bg-[#F1F5F9] dark:bg-[#2D3148] dark:text-white'}">${escHtml(m.content)}</div></div>`;
    });
    el.innerHTML = html;
    var thread = document.getElementById('message-thread');
    if (thread) thread.scrollTop = thread.scrollHeight;
  }

  function escHtml(str) { return str ? String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])) : ''; }
  function formatDate(d) { return d ? new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : ''; }
</script>
</body>
</html>
