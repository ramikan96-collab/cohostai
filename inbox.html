<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>CohostAI — Inbox</title>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .conv-item:hover { background: #F8F9FF; }
    .conv-item.active { background: #EEF0FF; border-left: 3px solid #5B4FE8; }
    #conversation-list, #message-thread { overflow-y: auto; scrollbar-width: thin; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }
    .bottom-nav { box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1); }
    /* dropdown menu animation & positioning */
    .dropdown-menu {
      position: absolute;
      z-index: 50;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.02);
      min-width: 140px;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.1s ease, transform 0.1s ease;
      pointer-events: none;
    }
    .dropdown-menu.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }
    body.dark .dropdown-menu {
      background: #1E2130;
      border: 1px solid #2D3148;
    }
    .conv-item {
      position: relative;
    }
    .menu-trigger-btn {
      transition: background 0.2s;
    }
    .menu-trigger-btn:hover {
      background: #E2E8F0;
    }
    body.dark .menu-trigger-btn:hover {
      background: #2D3148;
    }
  </style>
</head>
<body class="bg-[#F5F6FA] dark:bg-[#0F1117] h-screen overflow-hidden" onload="init()">

<script src="app.js"></script>
<script>
  var conversations = [];
  var activeConv = null;
  var messages = [];
  var props = {};
  var refreshTimer = null;
  var activeFilter = 'all';
  var draftGenerating = false;
  var replySending = false;
  var chatExpanded = false;
  var openedConvIds = new Set();
  var activeDropdownConvId = null;

  var FUNCTIONS_URL = 'https://scfotrsaabcgxiyemmlg.supabase.co/functions/v1';

  var EXPAND_ICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>';
  var COLLAPSE_ICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>';
  var AI_ICON = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 5.4L19 9l-5.2.6L12 15l-1.8-5.4L5 9l5.2-.6L12 2z"/><path d="M19 16l.9 2.1L22 19l-2.1.9L19 22l-.9-2.1L16 19l2.1-.9z" opacity="0.65"/><path d="M5 16l.9 2.1L8 19l-2.1.9L5 22l-.9-2.1L2 19l2.1-.9z" opacity="0.65"/></svg>';

  function goToInbox() { window.location.href = '/inbox.html'; }
  function goToProperties() { window.location.href = '/properties.html'; }
  function goToSettings() { window.location.href = '/settings.html'; }

  var bottomNavHTML =
    '<div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-[#1E2130] border-t border-[#E2E8F0] dark:border-[#2D3148] bottom-nav z-50">' +
      '<div class="flex items-center justify-around py-2 text-[#64748B] dark:text-[#94A3B8]">' +
        '<button onclick="goToInbox()" class="flex flex-col items-center pt-1 pb-1 text-[#5B4FE8]">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 8l7.89 5.26a2.01 2.01 0 002.22 0L21 8M5 19h14a2 2 0 0 1-2-2V7a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2" /></svg>' +
          '<span class="text-xs mt-1 font-medium">Inbox</span>' +
        '</button>' +
        '<button onclick="goToProperties()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1v-5m10-10l2 2m-2-2v10a1 1 0 01-1 1v-5m-6 0a1 1 0 001-1v5" /></svg>' +
          '<span class="text-xs mt-1 font-medium">Properties</span>' +
        '</button>' +
        '<button onclick="goToSettings()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 002.573-1.066c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 00.817 1.194 1.724 1.724 0 01.817 1.194c-.94 1.543.827 3.31 2.37 2.37 1.756.426 1.756 2.924 0 3.35z" /><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>' +
          '<span class="text-xs mt-1 font-medium">Settings</span>' +
        '</button>' +
      '</div>' +
    '</div>';

  // Helper to close all dropdowns
  function closeAllDropdowns() {
    document.querySelectorAll('.dropdown-menu').forEach(menu => {
      menu.classList.remove('show');
    });
    activeDropdownConvId = null;
  }

  // Toggle dropdown for specific conversation
  function toggleDropdown(convId, event) {
    event.stopPropagation();
    closeAllDropdowns();
    const targetMenu = document.getElementById(`dropdown-${convId}`);
    if (targetMenu) {
      targetMenu.classList.toggle('show');
      if (targetMenu.classList.contains('show')) {
        activeDropdownConvId = convId;
      } else {
        activeDropdownConvId = null;
      }
    }
  }

  // Edit conversation guest name (inline prompt)
  async function editConversationName(convId) {
    const conv = conversations.find(c => c.id === convId);
    if (!conv) return;
    const newName = prompt("Edit guest name:", conv.guest_name);
    if (newName && newName.trim() !== "") {
      try {
        const { error } = await sb.from('conversations')
          .update({ guest_name: newName.trim() })
          .eq('id', convId);
        if (error) throw error;
        conv.guest_name = newName.trim();
        if (activeConv && activeConv.id === convId) activeConv.guest_name = newName.trim();
        renderConversationList();
        if (activeConv && activeConv.id === convId) renderConversationDetail();
      } catch (err) {
        alert("Failed to update name: " + err.message);
      }
    }
    closeAllDropdowns();
  }

  // Archive conversation
  async function archiveConversation(convId) {
    const conv = conversations.find(c => c.id === convId);
    if (!conv) return;
    const newStatus = conv.status === 'archived' ? 'new' : 'archived';
    try {
      const { error } = await sb.from('conversations')
        .update({ status: newStatus })
        .eq('id', convId);
      if (error) throw error;
      conv.status = newStatus;
      if (activeConv && activeConv.id === convId) {
        activeConv.status = newStatus;
        if (newStatus === 'archived' && activeFilter !== 'archived') {
          activeConv = null;
          renderConversationDetail();
        }
      }
      renderConversationList();
    } catch (err) {
      alert("Failed to archive: " + err.message);
    }
    closeAllDropdowns();
  }

  // Skip conversation
  async function skipConversation(convId) {
    const conv = conversations.find(c => c.id === convId);
    if (!conv) return;
    try {
      const { error } = await sb.from('conversations')
        .update({ status: 'skipped' })
        .eq('id', convId);
      if (error) throw error;
      conv.status = 'skipped';
      if (activeConv && activeConv.id === convId) {
        activeConv.status = 'skipped';
        renderConversationDetail();
      }
      renderConversationList();
    } catch (err) {
      alert("Failed to skip: " + err.message);
    }
    closeAllDropdowns();
  }

  // Delete conversation
  async function deleteConversation(convId) {
    const confirmed = confirm("⚠️ Delete this conversation permanently? All messages will be lost. This action cannot be undone.");
    if (!confirmed) return;
    try {
      const { error: msgsError } = await sb.from('messages').delete().eq('conversation_id', convId);
      if (msgsError) throw msgsError;
      const { error } = await sb.from('conversations').delete().eq('id', convId);
      if (error) throw error;
      conversations = conversations.filter(c => c.id !== convId);
      if (activeConv && activeConv.id === convId) {
        activeConv = null;
        messages = [];
        renderConversationDetail();
      }
      renderConversationList();
    } catch (err) {
      alert("Failed to delete: " + err.message);
    }
    closeAllDropdowns();
  }

  function init() {
    requireAuth(function(user) {
      // Load opened conversations from localStorage (for unread circle persistence)
      const savedOpened = localStorage.getItem('openedConvIds');
      if (savedOpened) {
        JSON.parse(savedOpened).forEach(id => openedConvIds.add(id));
      }

      renderLayout();
      renderConversationDetail();
      loadConversations();
      refreshTimer = setInterval(loadConversations, 45000);

      document.addEventListener('click', function(e) {
        if (!e.target.closest('.menu-trigger-btn') && !e.target.closest('.dropdown-menu')) {
          closeAllDropdowns();
        }
      });
    });
  }

  function renderLayout() {
    document.body.innerHTML =
      '<div class="flex h-screen overflow-hidden">' +
        '<div class="hidden lg:block h-full shrink-0">' + renderSidebar('inbox') + '</div>' +
        '<div id="left-panel" class="flex flex-col w-full lg:w-[350px] lg:min-w-[350px] border-r border-[#E2E8F0] dark:border-[#2D3148] bg-white dark:bg-[#1E2130] h-full lg:relative absolute z-30 transition-all duration-300">' +
          '<div class="px-6 py-5 border-b border-[#E2E8F0] dark:border-[#2D3148] flex items-center justify-between bg-white dark:bg-[#1E2130]">' +
            '<h1 class="text-lg font-semibold text-[#0F172A] dark:text-white">Inbox</h1>' +
            '<button onclick="loadConversations()" class="text-[#94A3B8] hover:text-[#5B4FE8] transition">' +
              '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>' +
            '</button>' +
          '</div>' +
          '<div class="px-5 pt-4 pb-3 border-b border-[#E2E8F0] dark:border-[#2D3148]">' +
            '<input id="search-input" onkeyup="renderConversationList()" placeholder="Search guests..." class="w-full bg-[#F8F9FF] dark:bg-[#151724] border border-[#E2E8F0] dark:border-[#2D3148] dark:text-white rounded-xl px-4 py-2.5 text-sm outline-none focus:border-[#5B4FE8]">' +
          '</div>' +
          '<div id="filter-bar" class="px-5 py-3 border-b border-[#E2E8F0] dark:border-[#2D3148] flex gap-1 overflow-x-auto"></div>' +
          '<div id="conversation-list" class="flex-1 overflow-y-auto pb-20 lg:pb-0"></div>' +
        '</div>' +
        '<div id="right-panel" class="flex-1 flex flex-col overflow-hidden bg-[#F5F6FA] dark:bg-[#0F1117] hidden lg:flex"></div>' +
      '</div>' + bottomNavHTML;

    renderFilters('all');
  }

  function showListView() {
    document.getElementById('left-panel').style.transform = 'translateX(0)';
    document.getElementById('right-panel').classList.add('hidden');
  }

  function showChatView() {
    document.getElementById('left-panel').style.transform = 'translateX(-100%)';
    document.getElementById('right-panel').classList.remove('hidden');
  }

  function renderFilters(f) {
    activeFilter = f;
    var filters = [
      { id: 'all', label: 'All' },
      { id: 'new', label: 'New' },
      { id: 'skipped', label: 'Skipped' },
      { id: 'sent', label: 'Sent' },
      { id: 'archived', label: 'Archived' }
    ];
    var html = '';
    filters.forEach(function(fi) {
      var active = fi.id === f;
      html += '<button onclick="renderFilters(\'' + fi.id + '\')" class="px-4 py-1.5 rounded-lg text-xs font-medium transition whitespace-nowrap ' + (active ? 'bg-[#5B4FE8] text-white' : 'text-[#64748B] dark:text-[#94A3B8] hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148]') + '">' + fi.label + '</button>';
    });
    document.getElementById('filter-bar').innerHTML = html;
    renderConversationList();
  }

  function loadConversations() {
    sb.from('properties').select('id, name').eq('user_id', currentUser.id).then(function(pRes) {
      if (pRes.data) pRes.data.forEach(function(p) { props[p.id] = p; });
      sb.from('conversations').select('*').eq('user_id', currentUser.id).order('last_message_at', { ascending: false }).then(function(res) {
        if (res.error) return;
        conversations = res.data || [];
        renderConversationList();
      });
    });
  }

  function renderConversationList() {
    var el = document.getElementById('conversation-list');
    if (!el) return;
    var searchTerm = (document.getElementById('search-input')?.value || '').toLowerCase().trim();
    
    var filtered = conversations.filter(function(c) {
      if (activeFilter === 'all') return c.status !== 'archived';
      return c.status === activeFilter;
    });
    
    if (searchTerm) {
      filtered = filtered.filter(function(c) {
        return (c.guest_name || '').toLowerCase().includes(searchTerm);
      });
    }

    if (filtered.length === 0) {
      el.innerHTML =
        '<div class="py-20 text-center px-6 flex flex-col items-center">' +
          '<div class="w-16 h-16 bg-[#F1F5F9] dark:bg-[#2D3148] rounded-full flex items-center justify-center mb-4">' +
            '<svg class="w-8 h-8 text-[#94A3B8]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" /></svg>' +
          '</div>' +
          '<p class="text-sm font-medium text-[#0F172A] dark:text-white">Your inbox is clear</p>' +
          '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] mt-1">New guest inquiries will appear here.</p>' +
        '</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(c) {
      var isActive = activeConv && activeConv.id === c.id;
      var isUnread = c.status === 'new' && !openedConvIds.has(c.id);
      var propName = c.property_id && props[c.property_id] ? props[c.property_id].name : null;

      var platformTag = '';
      if (c.platform === 'airbnb') {
        platformTag = '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-[#FFF0F3] text-[#E31C5F] border border-[#FFCCD5]">Airbnb</span>';
      } else if (c.platform === 'booking.com') {
        platformTag = '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-[#003580] text-white">Booking.com</span>';
      }

      var newBadge = (c.status === 'new')
        ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-[#EEF0FF] text-[#5B4FE8]">New</span>'
        : (c.status === 'skipped' ? '<span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-[#F3E8FF] text-[#8B5CF6]">Skipped</span>' : '');

      var propertyTag = propName
        ? '<span class="text-[10px] text-[#94A3B8] truncate max-w-[120px]">' + escHtml(propName) + '</span>'
        : '';

      html += '<div class="conv-item px-5 py-3.5 border-b border-[#F1F5F9] dark:border-[#2D3148] cursor-pointer relative" onclick="openConversation(\'' + c.id + '\')">';
      
      html += '<div class="flex justify-between items-start mb-1">';
      html += '<span class="text-sm font-semibold text-[#0F172A] dark:text-white truncate flex-1 mr-2">' + escHtml(c.guest_name) + '</span>';
      html += '<div class="flex items-center gap-1.5 shrink-0">';
      html += '<span class="text-[10px] text-[#94A3B8]">' + formatDate(c.last_message_at) + '</span>';
      
      html += '<div class="relative">';
      html += '<button class="menu-trigger-btn w-6 h-6 flex items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition text-[#64748B]" onclick="toggleDropdown(\'' + c.id + '\', event)">';
      html += '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>';
      html += '</button>';
      
      html += '<div id="dropdown-' + c.id + '" class="dropdown-menu right-0 mt-1 py-1.5 bg-white dark:bg-[#1E2130] rounded-xl shadow-xl border border-gray-100 dark:border-[#2D3148] w-36" style="top: 28px; right: 0;">';
      html += '<button onclick="event.stopPropagation(); editConversationName(\'' + c.id + '\')" class="w-full text-left px-4 py-2 text-xs text-[#0F172A] dark:text-gray-200 hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148] flex items-center gap-2">';
      html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3l4 4-7 7H10v-4l7-7z"/><path d="M4 20h16"/></svg> Edit name</button>';

      var archiveLabel = c.status === 'archived' ? 'Unarchive' : 'Archive';
      html += '<button onclick="event.stopPropagation(); archiveConversation(\'' + c.id + '\')" class="w-full text-left px-4 py-2 text-xs text-[#0F172A] dark:text-gray-200 hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148] flex items-center gap-2">';
      html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16h16V4H4zM8 9h8"/><path d="M10 13h4"/></svg> ' + archiveLabel + '</button>';

      if (c.status !== 'skipped') {
        html += '<button onclick="event.stopPropagation(); skipConversation(\'' + c.id + '\')" class="w-full text-left px-4 py-2 text-xs text-[#64748B] dark:text-gray-300 hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148] flex items-center gap-2">';
        html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Skip</button>';
      }

      html += '<button onclick="event.stopPropagation(); deleteConversation(\'' + c.id + '\')" class="w-full text-left px-4 py-2 text-xs text-red-600 dark:text-red-400 hover:bg-red-50 dark:hover:bg-red-900/30 flex items-center gap-2">';
      html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M8 6V4h8v2"/><path d="M19 10v10a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V10"/><line x1="10" y1="14" x2="14" y2="14"/></svg> Delete</button>';
      html += '</div>';
      html += '</div>';
      
      if (isUnread) html += '<span class="w-2 h-2 rounded-full bg-[#5B4FE8] shrink-0 ml-1"></span>';
      html += '</div></div>';
      
      if (platformTag || newBadge || propertyTag) {
        html += '<div class="flex items-center gap-1.5 mb-1.5 flex-wrap">';
        if (platformTag) html += platformTag;
        if (newBadge) html += newBadge;
        if (propertyTag) html += propertyTag;
        html += '</div>';
      }
      
      html += '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] truncate">' + escHtml(c.last_message_preview || '') + '</p>';
      html += '</div>';
    });
    el.innerHTML = html;
  }

  function openConversation(id) {
    closeAllDropdowns();
    activeConv = conversations.find(function(c) { return c.id === id; });
    
    if (activeConv) {
      openedConvIds.add(id);
      // Persist opened state
      localStorage.setItem('openedConvIds', JSON.stringify(Array.from(openedConvIds)));
      
      renderConversationList();
      renderConversationDetail();
      loadMessages(id);
      if (window.innerWidth < 1024) showChatView();
    }
  }

  function renderConversationDetail() {
    var c = activeConv;
    var panel = document.getElementById('right-panel');
    if (!c) {
      panel.innerHTML =
        '<div class="flex-1 flex flex-col items-center justify-center text-center p-8 bg-[#F5F6FA] dark:bg-[#0F1117]">' +
          '<div class="w-20 h-20 bg-white dark:bg-[#1E2130] rounded-3xl shadow-sm flex items-center justify-center mb-6">' +
            '<svg class="w-10 h-10 text-[#94A3B8]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>' +
          '</div>' +
          '<h3 class="text-lg font-semibold text-[#0F172A] dark:text-white mb-2">Select a conversation</h3>' +
          '<p class="text-sm text-[#64748B] dark:text-[#94A3B8] max-w-xs">Choose a guest thread to view the conversation and draft a reply.</p>' +
        '</div>';
      return;
    }

    var checkInStr = c.check_in ? new Date(c.check_in + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : null;
    var checkOutStr = c.check_out ? new Date(c.check_out + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : null;
    var dateRange = (checkInStr && checkOutStr) ? checkInStr + ' – ' + checkOutStr : '';
    var platform = c.platform === 'airbnb' ? 'Airbnb' : c.platform === 'booking.com' ? 'Booking.com' : '';
    var meta = [platform, dateRange].filter(Boolean).join(' · ');

    panel.innerHTML =
      '<div class="flex flex-col h-full bg-white dark:bg-[#1E2130]">' +

        '<div class="px-6 py-4 border-b border-[#E2E8F0] dark:border-[#2D3148] flex items-center gap-3 shrink-0">' +
          '<button onclick="showListView()" class="lg:hidden text-[#64748B] shrink-0"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>' +
          '<div class="flex-1 min-w-0">' +
            '<h2 class="font-semibold text-sm text-[#0F172A] dark:text-white truncate">' + escHtml(c.guest_name) + '</h2>' +
            (meta ? '<p class="text-xs text-[#94A3B8] mt-0.5">' + escHtml(meta) + '</p>' : '') +
          '</div>' +
        '</div>' +

        '<div id="message-thread" class="flex-1 overflow-y-auto p-6 space-y-3">' +
          '<div id="messages-inner"></div>' +
        '</div>' +

        '<div class="border-t border-[#E2E8F0] dark:border-[#2D3148] p-4 pb-20 lg:pb-4 bg-white dark:bg-[#1E2130] shrink-0">' +

          '<div class="flex items-center gap-2 mb-3">' +
            '<span class="text-xs font-medium text-[#94A3B8] whitespace-nowrap">Context</span>' +
            '<input id="context-input" type="text" placeholder="e.g. earliest check-in today is 14:00" class="flex-1 bg-transparent border-b border-[#E2E8F0] dark:border-[#2D3148] text-xs text-[#0F172A] dark:text-white outline-none pb-1 placeholder-[#CBD5E1] dark:placeholder-[#4A5568]">' +
          '</div>' +

          '<button id="draft-btn" onclick="generateDraft()" class="w-full flex items-center justify-center gap-2 px-4 py-2 mb-3 rounded-xl text-sm font-medium text-[#5B4FE8] bg-[#EEF0FF] hover:bg-[#E0E3FF] transition">' +
            AI_ICON + ' Generate AI Draft' +
          '</button>' +

          '<div class="relative">' +
            '<textarea id="reply-input" rows="4" placeholder="Write your reply..." class="w-full bg-[#F8F9FF] dark:bg-[#151724] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl px-4 py-3 pr-10 text-sm text-[#0F172A] dark:text-white outline-none focus:border-[#5B4FE8] resize-none placeholder-[#94A3B8]"></textarea>' +
            '<button id="expand-btn" onclick="toggleExpand()" class="absolute top-2 right-2 w-7 h-7 flex items-center justify-center text-[#94A3B8] hover:text-[#5B4FE8] transition rounded-lg hover:bg-[#EEF0FF]">' +
              EXPAND_ICON +
            '</button>' +
          '</div>' +

          '<div class="flex justify-end gap-2 mt-3">' +
            '<button id="skip-btn" onclick="skipCurrentConversation()" class="flex items-center gap-2 px-5 py-2 rounded-xl text-sm font-medium text-[#64748B] border border-[#E2E8F0] dark:border-[#2D3148] hover:bg-[#F1F5F9] dark:hover:bg-[#2D3148] transition">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
              'Skip' +
            '</button>' +
            '<button id="send-btn" onclick="sendReply()" class="flex items-center gap-2 px-5 py-2 rounded-xl text-sm font-medium text-white bg-[#5B4FE8] hover:bg-[#4940D4] transition">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>' +
              ' Send' +
            '</button>' +
          '</div>' +

        '</div>' +
      '</div>';
  }

  function skipCurrentConversation() {
    if (!activeConv) return;
    if (confirm("Mark this conversation as skipped?")) {
      skipConversation(activeConv.id);
    }
  }

  function toggleExpand() {
    chatExpanded = !chatExpanded;
    var textarea = document.getElementById('reply-input');
    var btn = document.getElementById('expand-btn');
    if (textarea) textarea.rows = chatExpanded ? 10 : 4;
    if (btn) btn.innerHTML = chatExpanded ? COLLAPSE_ICON : EXPAND_ICON;
  }

  function loadMessages(convId) {
    sb.from('messages').select('*').eq('conversation_id', convId).order('created_at', { ascending: true }).then(function(res) {
      messages = res.data || [];
      renderMessages();
    });
  }

  function renderMessages() {
    var el = document.getElementById('messages-inner');
    if (!el) return;

    var draft = messages.find(function(m) { return m.role === 'draft'; });
    var visible = messages.filter(function(m) { return m.role !== 'draft'; });

    var html = '';
    visible.forEach(function(m) {
      var isHost = m.role === 'host';
      html +=
        '<div class="flex ' + (isHost ? 'justify-end' : 'justify-start') + ' fade-up">' +
          '<div class="max-w-[75%] px-4 py-2.5 rounded-2xl text-sm leading-relaxed ' + (isHost ? 'bg-[#5B4FE8] text-white' : 'bg-[#F1F5F9] dark:bg-[#2D3148] text-[#0F172A] dark:text-white') + '">' +
            escHtml(m.content) +
          '</div>' +
        '</div>';
    });
    el.innerHTML = html;

    var textarea = document.getElementById('reply-input');
    if (textarea && draft && !textarea.value) textarea.value = draft.content;

    var thread = document.getElementById('message-thread');
    if (thread) thread.scrollTop = thread.scrollHeight;
  }

  async function generateDraft() {
    if (draftGenerating || !activeConv) return;
    draftGenerating = true;
    var btn = document.getElementById('draft-btn');
    if (btn) btn.innerHTML = '<svg class="spinner" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Generating...';

    try {
      var context = document.getElementById('context-input')?.value?.trim() || '';
      var session = (await sb.auth.getSession()).data.session;
      var body = { conversation_id: activeConv.id };
      if (context) body.context = context;
      var res = await fetch(FUNCTIONS_URL + '/generate-draft', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify(body),
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to generate draft');
      var textarea = document.getElementById('reply-input');
      if (textarea && data.draft?.content) textarea.value = data.draft.content;
      messages = messages.filter(function(m) { return m.role !== 'draft'; });
      if (data.draft) messages.push(data.draft);
    } catch (e) {
      alert('Could not generate draft: ' + e.message);
    } finally {
      draftGenerating = false;
      var btn = document.getElementById('draft-btn');
      if (btn) btn.innerHTML = AI_ICON + ' Generate AI Draft';
    }
  }

  async function sendReply() {
    if (replySending || !activeConv) return;
    var textarea = document.getElementById('reply-input');
    var content = textarea?.value?.trim();
    if (!content) { alert('Please write a reply first.'); return; }

    replySending = true;
    var btn = document.getElementById('send-btn');
    if (btn) btn.innerHTML = '<svg class="spinner" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Sending...';

    try {
      var session = (await sb.auth.getSession()).data.session;
      var res = await fetch(FUNCTIONS_URL + '/send-reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify({ conversation_id: activeConv.id, content: content }),
      });
      var data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed to send');
      textarea.value = '';
      activeConv.status = 'sent';
      loadMessages(activeConv.id);
      loadConversations();
    } catch (e) {
      alert('Could not send: ' + e.message);
    } finally {
      replySending = false;
      var btn = document.getElementById('send-btn');
      if (btn) btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send';
    }
  }

  function escHtml(str) { return str ? String(str).replace(/[&<>"']/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; }) : ''; }
  function formatDate(d) { return d ? new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : ''; }
</script>
</body>
</html>
