<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI — Inbox</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <style>
    body { font-family: 'Inter', sans-serif; }
    .conv-item:hover { background: #F8F9FF; }
    .conv-item.active { background: #EEF0FF; border-left: 3px solid #5B4FE8; }
    
    #conversation-list { overflow-y: auto; scrollbar-width: thin; }
    #message-thread { overflow-y: auto; scrollbar-width: thin; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      #left-panel {
        width: 100%;
        min-width: 100%;
        position: absolute;
        z-index: 10;
        height: 100%;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
      }
      #left-panel.open {
        transform: translateX(0);
      }
      #right-panel {
        width: 100%;
      }
    }
  </style>
</head>
<body class="bg-[#F5F6FA] h-screen overflow-hidden" onload="init()">

<script src="app.js"></script>
<script>
  var conversations = [];
  var activeConv = null;
  var messages = [];
  var refreshTimer = null;
  var activeFilter = 'all';

  function init() {
    requireAuth(function(user) {
      renderLayout();
      loadConversations();
      refreshTimer = setInterval(loadConversations, 45000);
    });
  }

  function renderLayout() {
    document.body.innerHTML = `
      <div class="flex h-screen overflow-hidden">
        <!-- Left Panel - Conversation List -->
        <div id="left-panel" class="flex flex-col border-r border-[#E2E8F0] bg-white w-[320px] min-w-[320px] lg:relative absolute h-full z-20">
          
          <!-- Header -->
          <div class="px-5 py-5 border-b border-[#E2E8F0] flex items-center justify-between bg-white">
            <h1 class="font-semibold text-2xl text-[#0F172A]">Inbox</h1>
            <div class="flex items-center gap-3">
              <button onclick="toggleMobileMenu()" class="lg:hidden text-[#64748B] hover:text-[#0F172A]">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6h12v12" />
                </svg>
              </button>
              <button onclick="loadConversations()" class="text-[#94A3B8] hover:text-[#5B4FE8] transition" title="Refresh">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="23 4 23 10 17 10"/>
                  <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Search -->
          <div class="px-5 pt-4 pb-3 border-b border-[#E2E8F0]">
            <div class="relative">
              <input id="search-input" 
                     onkeyup="renderConversationList()" 
                     placeholder="Search guests or properties..." 
                     class="w-full bg-[#F8F9FF] border border-[#E2E8F0] focus:border-[#5B4FE8] rounded-2xl px-4 py-3 text-sm outline-none">
            </div>
          </div>

          <!-- Filters -->
          <div id="filter-bar" class="px-5 py-3 border-b border-[#E2E8F0] flex gap-1 bg-white overflow-x-auto"></div>

          <!-- Conversation List -->
          <div id="conversation-list" class="flex-1 overflow-y-auto"></div>
        </div>

        <!-- Right Panel -->
        <div id="right-panel" class="flex-1 flex flex-col overflow-hidden bg-[#F5F6FA] relative"></div>
      </div>
    `;
    
    renderFilters('all');
  }

  function toggleMobileMenu() {
    const leftPanel = document.getElementById('left-panel');
    leftPanel.classList.toggle('open');
  }

  function renderFilters(f) {
    activeFilter = f;
    const filters = [
      { id: 'all', label: 'All' },
      { id: 'new', label: 'New' },
      { id: 'sent', label: 'Sent' },
      { id: 'archived', label: 'Archived' }
    ];

    let html = '';
    filters.forEach(fi => {
      const isActive = fi.id === f;
      html += `
        <button onclick="renderFilters('${fi.id}')" 
          class="filter-tab whitespace-nowrap px-5 py-2 rounded-2xl text-sm font-medium transition-all flex-shrink-0 ${
            isActive 
              ? 'bg-[#5B4FE8] text-white shadow' 
              : 'text-[#64748B] hover:bg-[#F1F5F9]'
          }">
          ${fi.label}
        </button>`;
    });

    document.getElementById('filter-bar').innerHTML = html;
    renderConversationList();
  }

  function loadConversations() {
    sb.from('conversations')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('last_message_at', { ascending: false })
      .then(res => {
        if (res.error) return;
        conversations = res.data || [];
        renderConversationList();
      });
  }

  function renderConversationList() {
    const el = document.getElementById('conversation-list');
    const searchTerm = (document.getElementById('search-input')?.value || '').toLowerCase().trim();

    let filtered = conversations.filter(c => {
      if (activeFilter === 'all') return c.status !== 'archived';
      return c.status === activeFilter;
    });

    if (searchTerm) {
      filtered = filtered.filter(c => 
        (c.guest_name || '').toLowerCase().includes(searchTerm) ||
        (c.property_name || '').toLowerCase().includes(searchTerm)
      );
    }

    if (filtered.length === 0) {
      el.innerHTML = `
        <div class="flex flex-col items-center justify-center h-full text-center px-6 py-20">
          <div class="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center mx-auto mb-6 border border-[#E2E8F0]">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <p class="text-[#0F172A] font-semibold">No conversations found</p>
          <p class="text-sm text-[#94A3B8] mt-1">Try adjusting your search or filter</p>
        </div>`;
      return;
    }

    let html = '';
    filtered.forEach(c => {
      const isActive = activeConv && activeConv.id === c.id;
      html += `
        <div onclick="openConversation('${c.id}'); ${window.innerWidth < 768 ? 'toggleMobileMenu()' : ''}" 
             class="conv-item px-5 py-4 border-b border-[#F1F5F9] cursor-pointer ${isActive ? 'active' : ''}">
          <div class="flex justify-between items-start mb-1">
            <div class="flex items-center gap-2 min-w-0">
              ${c.unread ? `<div class="w-2.5 h-2.5 bg-[#5B4FE8] rounded-full shrink-0 mt-1.5"></div>` : ''}
              <span class="font-semibold text-[#0F172A] truncate">${escHtml(c.guest_name)}</span>
            </div>
            <span class="text-xs text-[#94A3B8] shrink-0">${formatDate(c.last_message_at)}</span>
          </div>
          
          <div class="flex items-center justify-between gap-2">
            <p class="text-sm text-[#64748B] truncate flex-1">${escHtml(c.last_message_preview || 'No messages yet')}</p>
            ${statusBadge(c.status)}
          </div>
          
          ${c.property_name ? `<p class="text-xs text-[#94A3B8] mt-1 truncate">${escHtml(c.property_name)}</p>` : ''}
        </div>`;
    });

    el.innerHTML = html;
  }

  function renderConversationDetail() {
    const panel = document.getElementById('right-panel');
    const c = activeConv;

    if (!c) {
      panel.innerHTML = `
        <div class="flex-1 flex flex-col items-center justify-center text-center p-8">
          <div class="w-24 h-24 bg-white rounded-3xl shadow-sm flex items-center justify-center mx-auto mb-8 border border-[#E2E8F0]">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#5B4FE8" stroke-width="1.2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <h2 class="text-2xl font-semibold text-[#0F172A] mb-2">Select a conversation</h2>
          <p class="text-[#64748B] max-w-xs">Choose a guest from the list to view messages and reply</p>
        </div>`;
      return;
    }

    // Placeholder for message thread + draft area (you can expand later)
    panel.innerHTML = `
      <div class="flex-1 flex flex-col h-full">
        <!-- Chat Header -->
        <div class="px-6 py-4 border-b border-[#E2E8F0] bg-white flex items-center justify-between">
          <div class="flex items-center gap-3">
            <button onclick="closeConversation()" class="lg:hidden text-[#64748B] hover:text-black">
              ← Back
            </button>
            <div>
              <h2 class="font-semibold text-lg text-[#0F172A]">${escHtml(c.guest_name)}</h2>
              <p class="text-sm text-[#64748B]">${escHtml(c.property_name || '')}</p>
            </div>
          </div>
          <div>
            ${statusBadge(c.status)}
          </div>
        </div>

        <!-- Message Thread Placeholder -->
        <div id="message-thread" class="flex-1 p-6 overflow-y-auto bg-[#F5F6FA]">
          <div class="flex justify-center py-12">
            <div class="spinner w-6 h-6 text-[#5B4FE8]"></div>
          </div>
        </div>

        <!-- Draft Area Placeholder -->
        <div class="border-t border-[#E2E8F0] bg-white p-4">
          <button onclick="generateDraft()" 
            class="w-full bg-[#5B4FE8] hover:bg-[#4840CC] text-white py-3.5 rounded-2xl font-medium transition">
            Generate AI Draft
          </button>
        </div>
      </div>
    `;

    loadMessages(c.id);
  }

  function closeConversation() {
    activeConv = null;
    renderConversationDetail();
  }

  // Keep your existing functions
  function openConversation(id) {
    activeConv = conversations.find(c => c.id === id) || null;
    if (!activeConv) return;

    if (activeConv.unread) {
      sb.from('conversations').update({ unread: false }).eq('id', id).then(() => {});
      activeConv.unread = false;
    }

    renderConversationList();
    renderConversationDetail();
  }

  function loadMessages(convId) {
    // Your existing implementation
    sb.from('messages')
      .select('*')
      .eq('conversation_id', convId)
      .order('sent_at', { ascending: true })
      .then(res => {
        messages = res.data || [];
        renderMessages();
      });
  }

  function renderMessages() {
    // Placeholder for now
    const el = document.getElementById('message-thread');
    if (!el) return;
    // You can expand this later
  }

  function generateDraft() {
    alert("Draft generation will be implemented soon");
  }

  function statusBadge(status) {
    const styles = {
      new: 'bg-amber-100 text-amber-700',
      sent: 'bg-emerald-100 text-emerald-700',
      archived: 'bg-gray-100 text-gray-600',
      draft_ready: 'bg-blue-100 text-blue-700'
    };
    const labels = {
      new: 'New',
      sent: 'Sent',
      archived: 'Archived',
      draft_ready: 'Draft'
    };
    const cls = styles[status] || 'bg-gray-100 text-gray-600';
    const label = labels[status] || status;
    return `<span class="text-xs px-3 py-1 rounded-full font-medium ${cls}">${label}</span>`;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const date = new Date(dateStr);
    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
</script>
</body>
</html>
