<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI | Properties</title>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }
    .bottom-nav { box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }
    .file-thumb { transition: transform 0.15s ease; }
    .file-thumb:hover { transform: scale(1.02); }
  </style>
</head>
<body class="bg-[#F5F6FA] dark:bg-[#0F1117]" onload="init()">
<script src="app.js"></script>
<script>
  var properties   = [];
  var editingId    = null;

  // ── Loaded from DB ──
  var mediaFolders = [];

  // ── Pending (staged, committed only on Save) ──
  var pendingNewFolders      = [];        // [{tempId, name}]
  var pendingNewFiles        = {};        // folderId (real or tempId) -> [{tempId, file, displayName, fileType, objectUrl}]
  var pendingDeleteFolderIds = new Set(); // real IDs
  var pendingDeleteFileIds   = new Set(); // real IDs

  var expandedFolderIds = new Set();

  var BUILDER_DEFAULTS = {
    tone: 'warm', length: 'short', guestName: 'first', earlyLate: 'apologize',
    firstMessage: 'extra_warm', cantFulfill: 'alternatives', complaints: 'apologize_first',
    humor: false, unhappyGuest: 'apologize_solve', discounts: 'decline', petRequests: 'decline',
    amenityDetail: 'brief', lastMinute: 'standard', localRecs: false,
    groupBookings: 'standard', custom: ''
  };
  var builderState = Object.assign({}, BUILDER_DEFAULTS);
  var builderExpanded = false;
  var builderFullExpanded = false;

  // ─────────────────────────────────────────
  var emptyForm = {
    name: '', platform: 'both', location: '',
    description: '',
    airbnb_listing_title: '', booking_listing_title: '',
    check_in_time: '15:00', check_out_time: '11:00',
    wifi_name: '', wifi_password: '', parking_info: '',
    house_rules: '', extra_info: ''
  };
  var form = Object.assign({}, emptyForm);

  function goToInbox()      { window.location.href = '/inbox.html'; }
  function goToProperties() { window.location.href = '/properties.html'; }
  function goToSettings()   { window.location.href = '/settings.html'; }

  var bottomNavHTML =
    '<div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-[#1E2130] border-t border-[#E2E8F0] dark:border-[#2D3148] bottom-nav z-50">' +
      '<div class="flex items-center justify-around py-2 text-[#64748B] dark:text-[#94A3B8]">' +
        '<button onclick="goToInbox()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16v16H4z" stroke-width="2"/><path d="M4 9h16" stroke-width="2"/></svg>' +
          '<span class="text-xs mt-1 font-medium">Inbox</span>' +
        '</button>' +
        '<button onclick="goToProperties()" class="flex flex-col items-center pt-1 pb-1 text-[#5B4FE8]">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-width="2"/></svg>' +
          '<span class="text-xs mt-1 font-medium">Properties</span>' +
        '</button>' +
        '<button onclick="goToSettings()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3" stroke-width="2"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-width="2"/></svg>' +
          '<span class="text-xs mt-1 font-medium">Settings</span>' +
        '</button>' +
      '</div>' +
    '</div>';

  var PROP_LIMITS = { trial: 1, starter: 1, solo: 1, host: 3, manager: Infinity, enterprise: Infinity, unlimited: Infinity };
  function getPropLimit() {
    var plan = currentProfile && currentProfile.plan ? currentProfile.plan : 'trial';
    return PROP_LIMITS[plan] !== undefined ? PROP_LIMITS[plan] : 1;
  }
  function atPropLimit() {
    return getPropLimit() !== Infinity && properties.length >= getPropLimit();
  }

  // ─────────────────────────────────────────
  //  Init & list
  // ─────────────────────────────────────────

  function init() { requireAuth(function() { loadProperties(); }); }

  function loadProperties() {
    sb.from('properties')
      .select('*')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: true })
      .then(function(res) { properties = res.data || []; renderList(); });
  }

  function renderList() {
    document.body.innerHTML =
      '<div class="flex h-screen overflow-hidden">' +
        '<div class="hidden lg:block h-full shrink-0">' + renderSidebar('properties') + '</div>' +
        '<div class="flex-1 overflow-y-auto pb-16 lg:pb-0">' +
          '<div class="max-w-3xl mx-auto px-4 sm:px-6 py-8">' +
            '<div class="flex items-center justify-between mb-6">' +
              '<div>' +
                '<h1 class="text-lg font-semibold text-[#0F172A] dark:text-white">Properties</h1>' +
                '<p class="text-sm text-[#64748B] dark:text-[#94A3B8] mt-0.5">Manage your listings and AI context per property</p>' +
              '</div>' +
              (atPropLimit()
                ? '<button disabled class="flex items-center gap-1.5 px-4 py-2 bg-[#E2E8F0] text-[#94A3B8] text-sm font-medium rounded-lg cursor-not-allowed"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Property</button><span class="text-xs text-[#94A3B8] ml-2">Limit reached · <a href="settings.html" class="text-[#5B4FE8] hover:underline">Upgrade</a></span>'
                : '<button onclick="startNew()" class="flex items-center gap-1.5 px-4 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Add Property</button>'
              ) +
            '</div>' +
            '<div id="properties-list">' + renderPropertiesHTML() + '</div>' +
          '</div>' +
        '</div>' +
      '</div>' + bottomNavHTML;
  }

  function renderPropertiesHTML() {
    if (properties.length === 0) {
      return '<div class="flex flex-col items-center justify-center py-20 text-center">' +
        '<div class="w-14 h-14 bg-white dark:bg-[#1E2130] rounded-2xl border border-[#E2E8F0] dark:border-[#2D3148] flex items-center justify-center mb-4">' +
        '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg></div>' +
        '<p class="text-sm font-medium text-[#0F172A] dark:text-white mb-1">No properties yet</p>' +
        '<p class="text-sm text-[#64748B] dark:text-[#94A3B8] mb-4">Add your first property so the AI knows the context</p>' +
        '<button onclick="startNew()" class="px-4 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Add Property</button>' +
        '</div>';
    }
    return properties.map(function(p) {
      return '<div class="fade-up bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-4 mb-3 hover:border-[#5B4FE8]/30 transition">' +
        '<div class="flex items-start gap-3">' +
          '<div class="w-9 h-9 rounded-xl bg-[#EEF0FF] dark:bg-[#2D3148] flex items-center justify-center shrink-0">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#5B4FE8" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>' +
          '</div>' +
          '<div class="flex-1 min-w-0">' +
            '<div class="flex items-start justify-between gap-2">' +
              '<div>' +
                '<h3 class="text-sm font-semibold text-[#0F172A] dark:text-white">' + escHtml(p.name) + '</h3>' +
                '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] mt-0.5">' + escHtml(p.location || '') + '</p>' +
                '<div class="flex flex-wrap gap-x-3 gap-y-0.5 mt-1.5 text-xs text-[#94A3B8]">' +
                  (p.check_in_time ? '<span>Check-in ' + p.check_in_time + '</span>' : '') +
                  (p.check_out_time ? '<span>Check-out ' + p.check_out_time + '</span>' : '') +
                  (p.wifi_name ? '<span>WiFi: ' + escHtml(p.wifi_name) + '</span>' : '') +
                '</div>' +
              '</div>' +
              '<div class="flex items-center gap-1 shrink-0">' +
                '<button onclick="startEdit(\'' + p.id + '\')" class="w-8 h-8 flex items-center justify-center rounded-lg text-[#94A3B8] hover:bg-[#F5F6FA] dark:hover:bg-[#2D3148] hover:text-[#5B4FE8] transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
                '<button onclick="deleteProperty(\'' + p.id + '\')" class="w-8 h-8 flex items-center justify-center rounded-lg text-[#94A3B8] hover:bg-red-50 dark:hover:bg-red-950 hover:text-red-500 transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg></button>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  // ─────────────────────────────────────────
  //  Form
  // ─────────────────────────────────────────

  function startNew() {
    editingId = null;
    form = Object.assign({}, emptyForm);
    builderState = Object.assign({}, BUILDER_DEFAULTS);
    builderExpanded = false;
    builderFullExpanded = false;
    clearPendingState();
    renderForm();
  }

  function startEdit(id) {
    var p = properties.find(function(x) { return x.id === id; });
    if (!p) return;
    editingId = id;
    form = Object.assign({}, emptyForm, p);
    clearPendingState();
    loadBuilderState();
    renderForm();
  }

  function clearPendingState() {
    // Revoke any object URLs to free memory
    Object.values(pendingNewFiles).forEach(function(arr) {
      arr.forEach(function(pf) { if (pf.objectUrl) URL.revokeObjectURL(pf.objectUrl); });
    });
    mediaFolders          = [];
    pendingNewFolders     = [];
    pendingNewFiles       = {};
    pendingDeleteFolderIds = new Set();
    pendingDeleteFileIds   = new Set();
    expandedFolderIds      = new Set();
  }

  function renderForm() {
    var inputCls = 'w-full h-9 px-3 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] bg-white transition';
    var labelCls = 'block text-xs font-medium text-[#0F172A] dark:text-[#CBD5E1] mb-1.5';

    document.body.innerHTML =
      '<div class="flex h-screen overflow-hidden">' +
        '<div class="hidden lg:block h-full shrink-0">' + renderSidebar('properties') + '</div>' +
        '<div class="flex-1 overflow-y-auto pb-16 lg:pb-0">' +
          '<div class="max-w-2xl mx-auto px-4 sm:px-6 py-8">' +

            '<div class="flex items-center justify-between mb-6">' +
              '<h1 class="text-lg font-semibold text-[#0F172A] dark:text-white">' + (editingId ? 'Edit Property' : 'Add Property') + '</h1>' +
            '</div>' +

            // ── Property fields form (no submit handler — saveAll() handles it) ──
            '<div id="property-form" class="space-y-5">' +

              // Basic Info
              '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5 space-y-4">' +
                '<h3 class="text-sm font-medium text-[#0F172A] dark:text-white">Basic Info</h3>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' +
                  '<div><label class="' + labelCls + '">Property Name *</label><input id="f_name" required value="' + escHtml(form.name) + '" placeholder="e.g. Sunset Studio TLV" class="' + inputCls + '"></div>' +
                  '<div><label class="' + labelCls + '">Platform</label><select id="f_platform" class="' + inputCls + '"><option value="airbnb"' + (form.platform === 'airbnb' ? ' selected' : '') + '>Airbnb</option><option value="booking.com"' + (form.platform === 'booking.com' ? ' selected' : '') + '>Booking.com</option><option value="both"' + (form.platform === 'both' ? ' selected' : '') + '>Both</option></select></div>' +
                '</div>' +
                '<div><label class="' + labelCls + '">Airbnb Listing Title</label><input id="f_airbnb_title" value="' + escHtml(form.airbnb_listing_title || '') + '" placeholder="Exact title from your Airbnb listing" class="' + inputCls + '"><p class="text-xs text-[#94A3B8] mt-1">Helps AI match emails to this property</p></div>' +
                '<div><label class="' + labelCls + '">Booking.com Listing Title</label><input id="f_booking_title" value="' + escHtml(form.booking_listing_title || '') + '" placeholder="Exact title from your Booking.com listing" class="' + inputCls + '"></div>' +
                '<div><label class="' + labelCls + '">Location</label><input id="f_location" value="' + escHtml(form.location || '') + '" placeholder="e.g. Tel Aviv, Israel" class="' + inputCls + '"></div>' +
                '<div><label class="' + labelCls + '">Description</label><textarea id="f_description" rows="2" placeholder="Short description for AI context..." class="w-full px-3 py-2 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] bg-white resize-none transition">' + escHtml(form.description || '') + '</textarea></div>' +
              '</div>' +

              // Check-in / Check-out
              '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5 space-y-4">' +
                '<h3 class="text-sm font-medium text-[#0F172A] dark:text-white">Check-in / Check-out</h3>' +
                '<div class="grid grid-cols-2 gap-4">' +
                  '<div><label class="' + labelCls + '">Check-in Time</label><input type="time" id="f_checkin" value="' + escHtml(form.check_in_time || '15:00') + '" class="w-full h-9 px-3 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-[16px] sm:text-sm outline-none focus:border-[#5B4FE8] bg-white transition"></div>' +
                  '<div><label class="' + labelCls + '">Check-out Time</label><input type="time" id="f_checkout" value="' + escHtml(form.check_out_time || '11:00') + '" class="w-full h-9 px-3 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-[16px] sm:text-sm outline-none focus:border-[#5B4FE8] bg-white transition"></div>' +
                '</div>' +
              '</div>' +

              // WiFi & Parking
              '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5 space-y-4">' +
                '<h3 class="text-sm font-medium text-[#0F172A] dark:text-white">WiFi & Parking</h3>' +
                '<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">' +
                  '<div><label class="' + labelCls + '">WiFi Name</label><input id="f_wifi_name" value="' + escHtml(form.wifi_name || '') + '" class="' + inputCls + '"></div>' +
                  '<div><label class="' + labelCls + '">WiFi Password</label><input id="f_wifi_password" value="' + escHtml(form.wifi_password || '') + '" class="' + inputCls + '"></div>' +
                '</div>' +
                '<div><label class="' + labelCls + '">Parking Info</label><input id="f_parking" value="' + escHtml(form.parking_info || '') + '" placeholder="e.g. Free street parking" class="' + inputCls + '"></div>' +
              '</div>' +

              // House Rules
              '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5 space-y-4">' +
                '<h3 class="text-sm font-medium text-[#0F172A] dark:text-white">House Rules</h3>' +
                '<div><textarea id="f_house_rules" rows="3" placeholder="No parties, quiet after 10pm..." class="w-full px-3 py-2 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] bg-white resize-none transition">' + escHtml(form.house_rules || '') + '</textarea></div>' +
              '</div>' +

              // AI Prompt Builder
              '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl overflow-hidden">' +
                renderPromptBuilder() +
              '</div>' +

              // ── Media Folders (only when editing existing property) ──
              (editingId
                ? '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5">' +
                    '<div class="flex items-center justify-between mb-1">' +
                      '<div>' +
                        '<h3 class="text-sm font-medium text-[#0F172A] dark:text-white">Media Folders</h3>' +
                        '<p class="text-xs text-[#94A3B8] mt-0.5">Photos you can share with guests as links</p>' +
                      '</div>' +
                      '<button onclick="createFolder()" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-[#5B4FE8] bg-[#EEF0FF] hover:bg-[#E0E3FF] dark:bg-[#2D3148] dark:hover:bg-[#3D4160] rounded-lg transition">' +
                        '<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> New Folder' +
                      '</button>' +
                    '</div>' +
                    '<div id="media-folders-content" class="mt-4">' +
                      '<div class="py-4 flex justify-center"><svg class="spinner" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5B4FE8" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></div>' +
                    '</div>' +
                  '</div>'
                : '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5">' +
                    '<h3 class="text-sm font-medium text-[#0F172A] dark:text-white mb-1">Media Folders</h3>' +
                    '<p class="text-xs text-[#94A3B8]">Save this property first, then you can add media folders.</p>' +
                  '</div>'
              ) +

              // ── Save / Cancel — always at the very bottom ──
              '<div class="flex justify-end gap-2 pb-8">' +
                '<button type="button" onclick="loadProperties()" class="px-4 py-2 text-sm text-[#64748B] dark:text-[#94A3B8] border border-[#E2E8F0] dark:border-[#2D3148] rounded-lg hover:bg-[#F5F6FA] dark:hover:bg-[#2D3148] transition">Cancel</button>' +
                '<button type="button" id="save-btn" onclick="saveAll()" class="px-5 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Save Property</button>' +
              '</div>' +

            '</div>' + // #property-form
          '</div>' +
        '</div>' +
      '</div>' + bottomNavHTML;

    if (editingId) loadMediaFolders();
  }

  // ─────────────────────────────────────────
  //  Save all (property fields + staged media)
  // ─────────────────────────────────────────

  async function saveAll() {
    var nameVal = document.getElementById('f_name') && document.getElementById('f_name').value.trim();
    if (!nameVal) { alert('Property name is required.'); document.getElementById('f_name').focus(); return; }
    if (!editingId && atPropLimit()) { alert('You\'ve reached the property limit for your plan. Upgrade to add more.'); return; }

    var btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    var data = {
      user_id:               currentUser.id,
      name:                  nameVal,
      platform:              document.getElementById('f_platform').value,
      location:              document.getElementById('f_location').value.trim(),
      description:           document.getElementById('f_description').value.trim(),
      airbnb_listing_title:  document.getElementById('f_airbnb_title').value.trim(),
      booking_listing_title: document.getElementById('f_booking_title').value.trim(),
      check_in_time:         document.getElementById('f_checkin').value,
      check_out_time:        document.getElementById('f_checkout').value,
      wifi_name:             document.getElementById('f_wifi_name').value.trim(),
      wifi_password:         document.getElementById('f_wifi_password').value.trim(),
      parking_info:          document.getElementById('f_parking').value.trim(),
      house_rules:           document.getElementById('f_house_rules').value.trim(),
      extra_info:            assembleBuilderConfig(),
    };

    try {
      // 1. Save property fields
      var propRes = editingId
        ? await sb.from('properties').update(data).eq('id', editingId)
        : await sb.from('properties').insert(data).select().single();

      if (propRes.error) throw propRes.error;

      // 2. If editing, commit staged media changes
      if (editingId) {
        btn.textContent = 'Saving media...';
        await commitMediaChanges();
      }

      loadProperties();
    } catch(e) {
      alert('Error saving: ' + e.message);
      btn.disabled = false;
      btn.textContent = 'Save Property';
    }
  }

  async function commitMediaChanges() {
    // ── Delete staged files ──
    if (pendingDeleteFileIds.size > 0) {
      var storagePaths = [];
      mediaFolders.forEach(function(folder) {
        folder.files.forEach(function(file) {
          if (pendingDeleteFileIds.has(file.id)) storagePaths.push(file.storage_path);
        });
      });
      if (storagePaths.length) await sb.storage.from('property-media').remove(storagePaths);
      await sb.from('property_media_files').delete().in('id', Array.from(pendingDeleteFileIds));
    }

    // ── Delete staged folders (+ their remaining files) ──
    if (pendingDeleteFolderIds.size > 0) {
      var folderStoragePaths = [];
      mediaFolders.forEach(function(folder) {
        if (pendingDeleteFolderIds.has(folder.id)) {
          folder.files.forEach(function(file) {
            if (!pendingDeleteFileIds.has(file.id)) folderStoragePaths.push(file.storage_path);
          });
        }
      });
      if (folderStoragePaths.length) await sb.storage.from('property-media').remove(folderStoragePaths);
      await sb.from('property_media_files').delete().in('folder_id', Array.from(pendingDeleteFolderIds));
      await sb.from('property_media_folders').delete().in('id', Array.from(pendingDeleteFolderIds));
    }

    // ── Upload new files for existing (non-deleted) folders ──
    for (var folderId in pendingNewFiles) {
      var isTemp     = folderId.startsWith('temp_');
      var isDeleted  = pendingDeleteFolderIds.has(folderId);
      var isPending  = pendingNewFolders.find(function(f) { return f.tempId === folderId; });
      if (isDeleted || isTemp) continue; // real-folder deletes handled above; temp folders handled below
      for (var i = 0; i < pendingNewFiles[folderId].length; i++) {
        await uploadPendingFile(pendingNewFiles[folderId][i], folderId);
      }
    }

    // ── Create new folders + upload their files ──
    for (var j = 0; j < pendingNewFolders.length; j++) {
      var pf = pendingNewFolders[j];
      var folderRes = await sb.from('property_media_folders').insert({
        property_id: editingId,
        user_id:     currentUser.id,
        name:        pf.name
      }).select().single();
      if (folderRes.error) continue;
      var realId = folderRes.data.id;
      var files  = pendingNewFiles[pf.tempId] || [];
      for (var k = 0; k < files.length; k++) {
        await uploadPendingFile(files[k], realId);
      }
    }

    // Revoke object URLs
    Object.values(pendingNewFiles).forEach(function(arr) {
      arr.forEach(function(pf) { if (pf.objectUrl) URL.revokeObjectURL(pf.objectUrl); });
    });
  }

  async function uploadPendingFile(pendingFile, realFolderId) {
    var ext = pendingFile.file.name.split('.').pop().toLowerCase();
    var uid = (typeof crypto !== 'undefined' && crypto.randomUUID)
      ? crypto.randomUUID()
      : Date.now().toString(36) + Math.random().toString(36).substr(2);
    var storagePath = currentUser.id + '/' + editingId + '/' + realFolderId + '/' + uid + '.' + ext;

    var upRes = await sb.storage.from('property-media').upload(storagePath, pendingFile.file, { contentType: pendingFile.file.type });
    if (upRes.error) return;

    await sb.from('property_media_files').insert({
      folder_id:    realFolderId,
      property_id:  editingId,
      user_id:      currentUser.id,
      display_name: pendingFile.displayName,
      storage_path: storagePath,
      file_type:    pendingFile.fileType
    });
  }

  async function loadMediaFolders() {
    var content = document.getElementById('media-folders-content');
    if (!content) return;
    try {
      var fRes = await sb.from('property_media_folders').select('*').eq('property_id', editingId).order('created_at', { ascending: true });
      if (fRes.error) throw fRes.error;
      var folders = fRes.data || [];
      if (folders.length > 0) {
        var ids = folders.map(function(f) { return f.id; });
        var fileRes = await sb.from('property_media_files').select('*').in('folder_id', ids).order('created_at', { ascending: true });
        var allFiles = fileRes.data || [];
        mediaFolders = folders.map(function(folder) {
          return Object.assign({}, folder, { files: allFiles.filter(function(f) { return f.folder_id === folder.id; }) });
        });
      } else {
        mediaFolders = [];
      }
      renderMediaFolders();
    } catch(e) {
      var c = document.getElementById('media-folders-content');
      if (c) c.innerHTML = '<p class="text-xs text-red-500 py-3 text-center">Failed to load. Please refresh.</p>';
    }
  }

  function createFolder() {
    var name = prompt('Folder name (e.g. Arrival, Shelter, Pool):');
    if (!name || !name.trim()) return;
    var tempId = 'temp_' + Date.now();
    pendingNewFolders.push({ tempId: tempId, name: name.trim() });
    expandedFolderIds.add(tempId);
    renderMediaFolders();
  }

  function stageDeleteFolder(folderId, isNew) {
    if (!confirm('Remove this folder and all its files?')) return;
    if (isNew) {
      // Remove from pending list entirely
      pendingNewFolders = pendingNewFolders.filter(function(f) { return f.tempId !== folderId; });
      delete pendingNewFiles[folderId];
    } else {
      pendingDeleteFolderIds.add(folderId);
    }
    expandedFolderIds.delete(folderId);
    renderMediaFolders();
  }

  function stageDeleteFile(fileId) {
    pendingDeleteFileIds.add(fileId);
    renderMediaFolders();
  }

  function removePendingFile(folderId, tempId) {
    if (!pendingNewFiles[folderId]) return;
    var pf = pendingNewFiles[folderId].find(function(f) { return f.tempId === tempId; });
    if (pf && pf.objectUrl) URL.revokeObjectURL(pf.objectUrl);
    pendingNewFiles[folderId] = pendingNewFiles[folderId].filter(function(f) { return f.tempId !== tempId; });
    renderMediaFolders();
  }

  function toggleFolder(folderId) {
    if (expandedFolderIds.has(folderId)) expandedFolderIds.delete(folderId);
    else expandedFolderIds.add(folderId);
    renderMediaFolders();
  }

  function showUploadArea(folderId) {
    var area = document.getElementById('upload-area-' + folderId);
    var btn  = document.getElementById('add-btn-' + folderId);
    if (area) area.classList.remove('hidden');
    if (btn)  btn.classList.add('hidden');
  }

  function hideUploadArea(folderId) {
    var area = document.getElementById('upload-area-' + folderId);
    var btn  = document.getElementById('add-btn-' + folderId);
    if (area) area.classList.add('hidden');
    if (btn)  btn.classList.remove('hidden');
    var fi = document.getElementById('file-input-' + folderId);
    var ni = document.getElementById('display-name-' + folderId);
    if (fi) fi.value = '';
    if (ni) ni.value = '';
  }

  function onFileSelected(input, folderId) {
    if (input.files && input.files[0]) {
      var ni = document.getElementById('display-name-' + folderId);
      if (ni && !ni.value) {
        var raw = input.files[0].name.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ');
        ni.value = raw.charAt(0).toUpperCase() + raw.slice(1);
      }
    }
  }

  function stageFile(folderId) {
    var fi   = document.getElementById('file-input-' + folderId);
    var ni   = document.getElementById('display-name-' + folderId);
    var file = fi && fi.files && fi.files[0];
    var name = ni && ni.value.trim();

    if (!file) { alert('Please select a file first.'); return; }
    if (!name) { alert('Please enter a name for this file.'); return; }

    var objectUrl = URL.createObjectURL(file);
    var fileType  = file.type.startsWith('video/') ? 'video' : 'image';
    var tempId    = 'tmp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);

    if (!pendingNewFiles[folderId]) pendingNewFiles[folderId] = [];
    pendingNewFiles[folderId].push({ tempId: tempId, file: file, displayName: name, fileType: fileType, objectUrl: objectUrl });

    hideUploadArea(folderId);
    renderMediaFolders();
  }

    sb.from('properties').delete().eq('id', id).then(function() { loadProperties(); });

  function getBuilderPlan() {
    var plan = currentProfile && currentProfile.plan ? currentProfile.plan : 'trial';
    return ['host', 'manager', 'enterprise', 'unlimited'].indexOf(plan) !== -1 ? 'full' : 'starter';
  }

  function loadBuilderState() {
    var raw = form.extra_info || '';
    if (raw.startsWith('BUILDER_CONFIG:')) {
      try {
        builderState = Object.assign({}, BUILDER_DEFAULTS, JSON.parse(raw.slice('BUILDER_CONFIG:'.length)));
        builderExpanded = true;
      } catch(e) {
        builderState = Object.assign({}, BUILDER_DEFAULTS, { custom: raw });
        builderExpanded = false;
      }
    } else {
      builderState = Object.assign({}, BUILDER_DEFAULTS, { custom: raw });
      builderExpanded = false;
    }
    builderFullExpanded = false;
  }

  function onBuilderChange(key, value) {
    builderState[key] = value;
    if (typeof value === 'boolean') {
      var el = document.getElementById('btog-' + key);
      if (el) {
        el.style.background = value ? '#5B4FE8' : '#CBD5E1';
        var dot = el.querySelector('.tdot');
        if (dot) dot.style.left = value ? '20px' : '2px';
      }
    }
  }

  function assembleBuilderConfig() {
    var customEl = document.getElementById('builder-custom');
    if (customEl) builderState.custom = customEl.value;
    return 'BUILDER_CONFIG:' + JSON.stringify(builderState);
  }

  function renderBuilderExtrasHtml() {
    var h = '';
    h += bRow('Guest unhappy mid-stay', bSel('unhappyGuest', [['apologize_solve','Apologise & offer solution'],['escalate','Escalate internally'],['factual','Stay calm & factual']]));
    h += bRow('Discount / pricing requests', bSel('discounts', [['decline','Politely decline'],['redirect','Acknowledge & redirect'],['open','Open to discuss']]));
    h += bRow('Pet requests', bSel('petRequests', [['decline','Politely decline'],['check','Offer to check'],['direct_no','Firm no']]));
    h += bRow('Amenity questions', bSel('amenityDetail', [['detailed','Give detailed answers'],['brief','Keep it brief'],['refer_listing','Refer to listing']]));
    h += bRow('Last-minute bookings', bSel('lastMinute', [['extra_warm','Extra warm welcome'],['standard','Standard response'],['note_prep','Note quick prep needed']]));
    h += bRow('Local recommendations', bTog('localRecs'));
    h += bRow('Group bookings', bSel('groupBookings', [['welcoming','Extra welcoming'],['standard','Standard response'],['cautious','Thorough & careful']]));
    return h;
  }

  function renderBuilderBodyHtml() {
    var plan = getBuilderPlan();
    var h = '<div class="px-5 pb-5 pt-1">';
    h += renderBuilderCoreHtml();

    if (plan === 'full') {
      h += '<div id="builder-extras-toggle" onclick="toggleBuilderFull()" class="flex items-center gap-1.5 py-2.5 cursor-pointer select-none border-b border-[#F1F5F9] dark:border-[#2D3148] text-xs font-medium text-[#5B4FE8] hover:text-[#4840CC] transition">';
      h += '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform:rotate(' + (builderFullExpanded ? '180' : '0') + 'deg);transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>';
      h += builderFullExpanded ? 'Hide 7 extra controls' : 'Show 7 more controls';
      h += '</div>';
      h += '<div id="builder-extras">' + (builderFullExpanded ? renderBuilderExtrasHtml() : '') + '</div>';
    } else {
      h += '<div class="py-2.5 flex items-center gap-2 border-b border-[#F1F5F9] dark:border-[#2D3148]"><span class="text-xs text-[#94A3B8]">+7 more controls on Host plan</span><a href="settings.html" class="text-xs text-[#5B4FE8] hover:underline font-medium">Upgrade →</a></div>';
    }

    h += '<div class="pt-3 mt-1">' +
      '<label class="block text-xs font-medium text-[#334155] dark:text-[#CBD5E1] mb-1.5">Custom notes <span class="text-[#94A3B8] font-normal">— optional</span></label>' +
      '<textarea id="builder-custom" rows="2" placeholder="Anything else the AI should know for this property..." class="w-full px-3 py-2 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-xs outline-none focus:border-[#5B4FE8] bg-white resize-none transition">' + escHtml(builderState.custom || '') + '</textarea>' +
    '</div>';

    return h + '</div>';
  }

  function toggleBuilder() {
    if (builderExpanded) {
      var customEl = document.getElementById('builder-custom');
      if (customEl) builderState.custom = customEl.value;
    }
    builderExpanded = !builderExpanded;
    var body = document.getElementById('builder-body');
    var chevron = document.getElementById('builder-chevron');
    if (body) body.innerHTML = builderExpanded ? '<div class="border-t border-[#E2E8F0] dark:border-[#2D3148]">' + renderBuilderBodyHtml() + '</div>' : '';
    if (chevron) chevron.style.transform = builderExpanded ? 'rotate(180deg)' : 'rotate(0deg)';
  }

  function toggleBuilderFull() {
    builderFullExpanded = !builderFullExpanded;
    var extras = document.getElementById('builder-extras');
    var toggle = document.getElementById('builder-extras-toggle');
    if (extras) extras.innerHTML = builderFullExpanded ? renderBuilderExtrasHtml() : '';
    if (toggle) toggle.innerHTML =
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="transform:rotate(' + (builderFullExpanded ? '180' : '0') + 'deg);transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>' +
      (builderFullExpanded ? 'Hide 7 extra controls' : 'Show 7 more controls');
  }

  function renderPromptBuilder() {
    var plan = getBuilderPlan();
    var h = '';
    h += '<div onclick="toggleBuilder()" class="flex items-center justify-between px-5 py-4 cursor-pointer select-none hover:bg-[#F8F9FF] dark:hover:bg-[#151724] transition">';
    h += '<div><h3 class="text-sm font-medium text-[#0F172A] dark:text-white">AI Prompt Builder</h3>';
    h += '<p class="text-xs text-[#94A3B8] mt-0.5">Shape how the AI replies to guests for this property</p></div>';
    h += '<div class="flex items-center gap-2 shrink-0">';
    h += '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-[#EEF0FF] text-[#5B4FE8]">' + (plan === 'full' ? '15 controls' : '8 controls') + '</span>';
    h += '<svg id="builder-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="2" style="transform:rotate(' + (builderExpanded ? '180' : '0') + 'deg);transition:transform .2s"><polyline points="6 9 12 15 18 9"/></svg>';
    h += '</div></div>';
    h += '<div id="builder-body">';
    if (builderExpanded) h += '<div class="border-t border-[#E2E8F0] dark:border-[#2D3148]">' + renderBuilderBodyHtml() + '</div>';
    h += '</div>';
    return h;
  }

  function escHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
