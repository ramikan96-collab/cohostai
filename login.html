<!DOCTYPE html>                                                                                                                                                                                                                                                               
  <html lang="en">                                                                                                                                                                                                                                                              
  <head>                                                                                                                                                                                                                                                                        
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />                                                                                                                                                                                                    
    <title>CohostAI — Login</title>                         
    <script src="https://cdn.tailwindcss.com"></script>                                                                                                                                                                                                                         
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />                                                                                                                                                           
    <style>                                                                                                                                                                                                                                                                     
      body { font-family: 'Inter', sans-serif; }                                                                                                                                                                                                                                
      @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }                                                                                                                                                          
      .fade-up { animation: fadeUp 0.5s ease both; }                                                                                                                                                                                                                            
      @keyframes spin { to { transform: rotate(360deg); } }
      .spinner { animation: spin 0.8s linear infinite; }                                                                                                                                                                                                                        
    </style>                                                
                                                                                                                                                                                                                                                                                
    <script>                                                
      var mode = 'login'                                                                                                                                                                                                                                                        
                                                            
      var SUPABASE_URL = 'https://scfotrsaabcgxiyemmlg.supabase.co'
      var SUPABASE_KEY = 'sb_publishable_oHLqCHsF2_3HdGKNRK-OkA_whE04ZHI'
      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                
      function init() {                                                                                                                                                                                                                                                         
        sb.auth.getSession().then(function(res) {                                                                                                                                                                                                                               
          if (res.data.session) window.location.href = 'inbox.html'                                                                                                                                                                                                             
        })
        var params = new URLSearchParams(window.location.search)                                                                                                                                                                                                                
        if (params.get('mode') === 'signup') setMode('signup')                                                                                                                                                                                                                  
      }
                                                                                                                                                                                                                                                                                
      function setMode(m) {                                 
        mode = m
        var s = m === 'signup'
        document.getElementById('tab-login').className  = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all ' + (!s ? 'bg-white text-[#0F172A] shadow-sm' : 'text-[#64748B]')                                                                                          
        document.getElementById('tab-signup').className = 'flex-1 py-2 text-sm font-medium rounded-lg transition-all ' + (s  ? 'bg-white text-[#0F172A] shadow-sm' : 'text-[#64748B]')                                                                                          
        document.getElementById('form-title').textContent  = s ? 'Create your account'         : 'Welcome back'                                                                                                                                                                 
        document.getElementById('form-sub').textContent    = s ? 'Start your 7-day free trial' : 'Enter your details to continue'                                                                                                                                               
        document.getElementById('btn-text').textContent    = s ? 'Create account'              : 'Log in'                                                                                                                                                                       
        document.getElementById('switch-text').textContent = s ? 'Already have an account?'    : "Don't have an account?"                                                                                                                                                       
        document.getElementById('switch-btn').textContent  = s ? 'Log in'                      : 'Sign up free'                                                                                                                                                                 
        document.getElementById('name-field').style.display    = s ? 'block' : 'none'                                                                                                                                                                                           
        document.getElementById('password-hint').style.display = s ? 'block' : 'none'                                                                                                                                                                                           
        hideError()                                                                                                                                                                                                                                                             
        hideSuccess()                                       
      }                                                                                                                                                                                                                                                                         
                                                            
      function handleSubmit(e) {                                                                                                                                                                                                                                                
        e.preventDefault()
        var email    = document.getElementById('input-email').value.trim()                                                                                                                                                                                                      
        var password = document.getElementById('input-password').value
        var name     = document.getElementById('input-name').value.trim()                                                                                                                                                                                                       
        setLoading(true)
        hideError()                                                                                                                                                                                                                                                             
        hideSuccess()                                       

        if (mode === 'signup') {                                                                                                                                                                                                                                                
          sb.auth.signUp({ email: email, password: password, options: { data: { host_name: name } } })
            .then(function(res) {                                                                                                                                                                                                                                               
              if (res.error) throw res.error                
              if (res.data.user && name) {                                                                                                                                                                                                                                      
                sb.from('profiles').update({ host_name: name }).eq('id', res.data.user.id).then(function(){})                                                                                                                                                                   
              }                                                                                                                                                                                                                                                                 
              showSuccess('Check your email for a confirmation link, then come back to log in.')                                                                                                                                                                                
              setLoading(false)                                                                                                                                                                                                                                                 
            })                                              
            .catch(function(err) { showError(friendlyError(err.message)); setLoading(false) })                                                                                                                                                                                  
        } else {                                                                                                                                                                                                                                                                
          sb.auth.signInWithPassword({ email: email, password: password })
            .then(function(res) {                                                                                                                                                                                                                                               
              if (res.error) throw res.error                                                                                                                                                                                                                                    
              window.location.href = 'inbox.html'
            })                                                                                                                                                                                                                                                                  
            .catch(function(err) { showError(friendlyError(err.message)); setLoading(false) })
        }
      }
                                                                                                                                                                                                                                                                                
      function setLoading(on) {
        document.getElementById('submit-btn').disabled = on                                                                                                                                                                                                                     
        document.getElementById('btn-spinner').style.display = on ? 'block' : 'none'
        document.getElementById('submit-btn').style.opacity  = on ? '0.7'   : '1'                                                                                                                                                                                               
      }                                                                                                                                                                                                                                                                         
      function showError(msg)   { var b = document.getElementById('error-box');   b.textContent = msg; b.style.display = 'block' }                                                                                                                                              
      function hideError()      { document.getElementById('error-box').style.display = 'none' }                                                                                                                                                                                 
      function showSuccess(msg) { var b = document.getElementById('success-box'); b.textContent = msg; b.style.display = 'block' }
      function hideSuccess()    { document.getElementById('success-box').style.display = 'none' }                                                                                                                                                                               
      function friendlyError(msg) {                                                                                                                                                                                                                                             
        if (msg.includes('Invalid login'))       return 'Wrong email or password.'                                                                                                                                                                                              
        if (msg.includes('already registered'))  return 'An account already exists with this email. Log in instead.'                                                                                                                                                            
        if (msg.includes('Password should'))     return 'Password must be at least 6 characters.'                                                                                                                                                                               
        if (msg.includes('Email not confirmed')) return 'Please confirm your email first. Check your inbox.'                                                                                                                                                                    
        return msg                                                                                                                                                                                                                                                              
      }                                                     
    </script>                                                                                                                                                                                                                                                                   
  </head>                                                   
  <body class="min-h-screen bg-[#F5F6FA] flex items-center justify-center px-4" onload="init()">

    <div class="fade-up w-full max-w-md">                                                                                                                                                                                                                                       
   
      <div class="flex items-center justify-center mb-8">                                                                                                                                                                                                                       
        <a href="index.html" class="flex items-center gap-2">
          <div class="w-9 h-9 bg-[#5B4FE8] rounded-xl flex items-center justify-center">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
              <path d="M10 2L3 8V17H8V12H12V17H17V8L10 2Z" fill="white" fill-opacity="0.95"/>
              <circle cx="15.5" cy="5.5" r="3" fill="white" fill-opacity="0.4"/>
              <circle cx="15.5" cy="5.5" r="1.5" fill="white"/>
            </svg>
          </div>
          <span class="font-bold text-xl text-[#0F172A]">CohostAI</span>
        </a>                                                                                                                                                                                                                                                                    
      </div>
                                                                                                                                                                                                                                                                                
      <div class="bg-white rounded-2xl border border-[#E2E8F0] p-8 shadow-sm">

        <div class="flex bg-[#F5F6FA] rounded-xl p-1 mb-8">
          <button id="tab-login"  onclick="setMode('login')"  class="flex-1 py-2 text-sm font-medium rounded-lg transition-all bg-white text-[#0F172A] shadow-sm">Log in</button>
          <button id="tab-signup" onclick="setMode('signup')" class="flex-1 py-2 text-sm font-medium rounded-lg transition-all text-[#64748B]">Sign up</button>                                                                                                                 
        </div>
                                                                                                                                                                                                                                                                                
        <h1 id="form-title" class="text-xl font-bold text-[#0F172A] mb-1">Welcome back</h1>                                                                                                                                                                                     
        <p  id="form-sub"   class="text-sm text-[#64748B] mb-6">Enter your details to continue</p>
                                                                                                                                                                                                                                                                                
        <form onsubmit="handleSubmit(event)" class="space-y-4">                                                                                                                                                                                                                 
   
          <div id="name-field" style="display:none">                                                                                                                                                                                                                            
            <label class="block text-xs font-medium text-[#0F172A] mb-1.5">Your name</label>
            <input id="input-name" type="text" placeholder="e.g. Hayim"                                                                                                                                                                                                         
              class="w-full h-10 px-3 rounded-lg border border-[#E2E8F0] text-sm outline-none focus:border-[#5B4FE8] transition" />                                                                                                                                             
          </div>                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                
          <div>                                                                                                                                                                                                                                                                 
            <label class="block text-xs font-medium text-[#0F172A] mb-1.5">Email</label>
            <input id="input-email" type="email" placeholder="you@example.com" required
              class="w-full h-10 px-3 rounded-lg border border-[#E2E8F0] text-sm outline-none focus:border-[#5B4FE8] transition" />                                                                                                                                             
          </div>                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                
          <div>                                                                                                                                                                                                                                                                 
            <label class="block text-xs font-medium text-[#0F172A] mb-1.5">Password</label>
            <input id="input-password" type="password" placeholder="••••••••" required minlength="6"
              class="w-full h-10 px-3 rounded-lg border border-[#E2E8F0] text-sm outline-none focus:border-[#5B4FE8] transition" />                                                                                                                                             
            <p id="password-hint" style="display:none" class="text-xs text-[#64748B] mt-1">Minimum 6 characters</p>                                                                                                                                                             
          </div>                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                
          <div id="error-box"   style="display:none" class="bg-red-50 border border-red-200 text-red-700 text-sm px-4 py-3 rounded-lg"></div>                                                                                                                                   
          <div id="success-box" style="display:none" class="bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm px-4 py-3 rounded-lg"></div>
                                                                                                                                                                                                                                                                                
          <button type="submit" id="submit-btn"                                                                                                                                                                                                                                 
            class="w-full h-10 bg-[#5B4FE8] text-white rounded-lg font-semibold text-sm hover:bg-[#4840CC] transition flex items-center justify-center gap-2">                                                                                                                  
            <span id="btn-text">Log in</span>                                                                                                                                                                                                                                   
            <svg id="btn-spinner" style="display:none" class="spinner w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>                                                                                                                                                                        
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
            </svg>                                                                                                                                                                                                                                                              
          </button>                                         
        </form>                                                                                                                                                                                                                                                                 
                                                            
        <p class="text-center text-sm text-[#64748B] mt-6">                                                                                                                                                                                                                     
          <span id="switch-text">Don't have an account?</span>
          <button id="switch-btn" onclick="setMode('signup')" class="text-[#5B4FE8] font-medium hover:underline ml-1">Sign up free</button>                                                                                                                                     
        </p>                                                                                                                                                                                                                                                                    
      </div>
                                                                                                                                                                                                                                                                                
      <p class="text-center text-xs text-[#94A3B8] mt-6">                                                                                                                                                                                                                       
        By continuing you agree to our
        <a href="terms.html" class="underline hover:text-[#64748B]">Terms</a> and                                                                                                                                                                                               
        <a href="privacy.html" class="underline hover:text-[#64748B]">Privacy Policy</a>                                                                                                                                                                                        
      </p>                                                                                                                                                                                                                                                                      
    </div>                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                
  </body>                                                   
  </html>
