<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI | Settings</title>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
    .bottom-nav { box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-[#F5F6FA] dark:bg-[#0F1117]" onload="init()">
<script src="app.js"></script>
<script>
  var profile = null
  var loading = false
  var isDark = localStorage.getItem('theme') === 'dark'

  var DEFAULT_PROMPT = 'Reply as a warm, experienced short-term rental host. Think Airbnb Superhost energy.\n\nKeep replies short: 2 to 4 sentences is almost always enough. Be friendly and genuine, like texting someone you like. Never formal, never robotic.\n\nAvoid: long dashes, bullet points, "Of course!", "Absolutely!", "Great question!", "I\'d be happy to", or any phrase a robot would write.\n\nUse the guest\'s first name. Match the language they wrote in. End warmly and briefly: "See you soon!" or "Looking forward to hosting you!"\n\nIf you\'re missing a specific detail, add a short placeholder in brackets like [check-in time] rather than guessing.'

  function goToInbox() { window.location.href = '/inbox.html'; }
  function goToProperties() { window.location.href = '/properties.html'; }
  function goToSettings() { window.location.href = '/settings.html'; }

  var bottomNavHTML =
    '<div class="lg:hidden fixed bottom-0 left-0 right-0 bg-white dark:bg-[#1E2130] border-t border-[#E2E8F0] dark:border-[#2D3148] bottom-nav z-50">' +
      '<div class="flex items-center justify-around py-2 text-[#64748B] dark:text-[#94A3B8]">' +
        '<button onclick="goToInbox()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">' +
            '<path d="M4 4h16v16H4z" stroke-width="2"/>' +
            '<path d="M4 9h16" stroke-width="2"/>' +
          '</svg>' +
          '<span class="text-xs mt-1 font-medium">Inbox</span>' +
        '</button>' +
        '<button onclick="goToProperties()" class="flex flex-col items-center pt-1 pb-1 hover:text-[#5B4FE8] transition">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">' +
            '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-width="2"/>' +
          '</svg>' +
          '<span class="text-xs mt-1 font-medium">Properties</span>' +
        '</button>' +
        '<button onclick="goToSettings()" class="flex flex-col items-center pt-1 pb-1 text-[#5B4FE8]">' +
          '<svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor">' +
            '<circle cx="12" cy="12" r="3" stroke-width="2"/>' +
            '<path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke-width="2"/>' +
          '</svg>' +
          '<span class="text-xs mt-1 font-medium">Settings</span>' +
        '</button>' +
      '</div>' +
    '</div>';

  function init() {
    requireAuth(function(user, prof) {
      profile = prof
      handleOAuthReturn()
      renderSettings()
    })
  }

  function handleOAuthReturn() {
    var params = new URLSearchParams(window.location.search)
    var isConnected = params.get('gmail_connected') === '1'
    
    if (isConnected) {
      sb.from('profiles').select('*').eq('id', currentUser.id).single()
        .then(function(res) {
          if (res.error) {
            showToast('Gmail connected but failed to refresh profile', 'error')
            return
          }
          if (res.data) {
            currentProfile = res.data
            profile = res.data
            showToast('Gmail connected successfully!', 'success')
            history.replaceState(null, '', 'settings.html')
            renderSettings()
          }
        })
      return
    }
    
    if (params.get('gmail_error')) {
      history.replaceState(null, '', 'settings.html')
      showToast('Gmail connection failed: ' + decodeURIComponent(params.get('gmail_error')), 'error')
    }
  }

  function onDarkToggle() {
    isDark = !isDark
    if (isDark) {
      document.documentElement.classList.add('dark')
      localStorage.setItem('theme', 'dark')
    } else {
      document.documentElement.classList.remove('dark')
      localStorage.setItem('theme', 'light')
    }
    renderSettings();
  }

  function renderSettings() {
    document.body.innerHTML =
      '<div class="flex h-screen overflow-hidden">' +
        '<div class="hidden lg:block h-full shrink-0">' + renderSidebar('settings') + '</div>' +
        '<div class="flex-1 overflow-y-auto pb-20 lg:pb-0">' +
          '<div class="max-w-2xl mx-auto px-4 sm:px-6 py-8">' +
            '<div class="mb-6">' +
              '<h1 class="text-lg font-semibold text-[#0F172A] dark:text-white">Settings</h1>' +
              '<p class="text-sm text-[#64748B] dark:text-[#94A3B8] mt-0.5">Configure your host profile and AI behaviour.</p>' +
            '</div>' +
            '<div id="toast" style="display:none" class="mb-4"></div>' +
            '<form onsubmit="saveSettings(event)" class="space-y-5">' +
              section(iconSvg('user'), 'Host Profile',
                field('Your name', '<input id="host_name" value="' + esc(profile ? profile.host_name || '' : '') + '" placeholder="e.g. Rami" ' + iCls() + '>') +
                field('Language',
                  '<select id="language_pref" ' + iCls() + '>' +
                    opt('', 'Auto-detect (reply in guest\'s language)', profile ? profile.language_pref : '') +
                    opt('English', 'English', profile ? profile.language_pref : '') +
                    opt('Hebrew', 'Hebrew (עברית)', profile ? profile.language_pref : '') +
                    opt('Turkish', 'Turkish (Türkçe)', profile ? profile.language_pref : '') +
                    opt('Spanish', 'Spanish (Español)', profile ? profile.language_pref : '') +
                  '</select>'
                )
              ) +
              section(iconSvg('zap'), 'AI Instructions',
                '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] -mt-1">This is the personality and style guide the AI follows when writing guest replies. Edit it to match your hosting voice — tone, language, what to avoid.</p>' +
                '<textarea id="master_prompt" rows="8" class="w-full px-3 py-2.5 rounded-xl border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] resize-none transition leading-relaxed">' + esc(profile && profile.master_prompt ? profile.master_prompt : DEFAULT_PROMPT) + '</textarea>'
              ) +
              '<div class="flex justify-end"><button type="submit" id="save-btn" class="px-5 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Save Settings</button></div>' +
              section(iconSvg('mail'), 'Gmail Connection', renderGmailSection()) +
              section(iconSvg('sun'), 'Appearance',
                '<div class="flex items-center justify-between"><div><p class="text-sm font-medium text-[#0F172A] dark:text-white">' + (isDark ? 'Dark Mode' : 'Light Mode') + '</p></div>' +
                '<div onclick="onDarkToggle()" style="position:relative;width:44px;height:24px;border-radius:12px;background:' + (isDark ? '#5B4FE8' : '#CBD5E1') + ';cursor:pointer;transition:background .2s;flex-shrink:0;">' +
                '<div style="position:absolute;top:2px;left:' + (isDark ? '22px' : '2px') + ';width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s;"></div></div></div>'
              ) +
              
      section(iconSvg('plan'), 'Plan & Usage', renderPlanSection()) +
              section(iconSvg('logout'), 'Account',
  '<div class="flex items-center justify-between"><div><p class="text-sm text-[#0F172A] dark:text-white">' + esc(currentUser ? currentUser.email || '' : '') + '</p></div>' +
  '<button type="button" onclick="logout()" class="px-3 py-1.5 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition">Log out</button></div>' +
  '<div class="pt-2 mt-2 border-t border-red-200 dark:border-red-800/30"></div>' +
  '<div class="flex items-center justify-between"><div><p class="text-sm font-medium text-red-700 dark:text-red-400">Danger Zone</p><p class="text-xs text-[#64748B] dark:text-[#94A3B8]">Delete your account and all data, irreversible</p></div>' +
  '<button type="button" onclick="confirmDeleteAccount()" class="px-3 py-1.5 text-xs bg-red-600 text-white rounded-lg hover:bg-red-700 transition shadow-sm">Delete Account</button></div>'
) +
            '</form>' +
          '</div>' +
        '</div>' +
      '</div>' + bottomNavHTML;
    loadUsageCount();
  }

  function renderGmailSection() {
    if (profile && profile.gmail_connected && profile.gmail_email) {
      var tokenExpiry = profile.gmail_token_expiry || 0
      var tokenStale = tokenExpiry > 0 && Date.now() > tokenExpiry + 24 * 60 * 60 * 1000
      if (tokenStale) {
        return '<div class="p-3 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800 rounded-lg space-y-2">' +
          '<p class="text-sm font-medium text-amber-800 dark:text-amber-300">Gmail connection needs refresh</p>' +
          '<p class="text-xs text-amber-700 dark:text-amber-400">Your Gmail session expired. This is why your inbox may appear empty.</p>' +
          '<button type="button" onclick="connectGmail()" class="px-3 py-1.5 text-xs font-medium bg-amber-600 text-white rounded-lg hover:bg-amber-700 transition">Reconnect Gmail</button>' +
          '</div>'
      }
      return '<div class="flex items-center gap-3 p-3 bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-200 dark:border-emerald-800 rounded-lg">' +
        '<div style="flex:1;min-width:0"><p class="text-sm font-medium text-[#0F172A] dark:text-white">Gmail Connected</p><p class="text-xs text-[#64748B] dark:text-[#94A3B8] truncate">' + esc(profile.gmail_email) + '</p></div>' +
        '<button type="button" onclick="disconnectGmail()" class="px-3 py-1.5 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition">Disconnect</button></div>'
    }
    return '<button type="button" onclick="connectGmail()" class="w-full py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Connect Gmail</button>'
  }

  function saveSettings(e) {
    e.preventDefault()
    if (loading) return
    loading = true
    var btn = document.getElementById('save-btn')
    btn.disabled = true
    var data = {
      host_name: document.getElementById('host_name').value.trim(),
      language_pref: document.getElementById('language_pref').value,
      master_prompt: document.getElementById('master_prompt').value.trim(),
    }
    sb.from('profiles').update(data).eq('id', currentUser.id).then(function(res) {
      btn.disabled = false
      btn.textContent = 'Save Settings'
      loading = false
      if (res.error) { showToast('Error: ' + res.error.message, 'error'); return }
      profile = Object.assign({}, profile, data)
      showToast('Settings saved', 'success')
    })
  }

  function connectGmail() {
    var uid = currentUser && currentUser.id
    if (!uid) return
    localStorage.setItem('gmail_connecting', 'true')
    window.location.href = SUPABASE_URL + '/functions/v1/gmail-auth?user_id=' + uid
  }

  function disconnectGmail() {
    if (!confirm('Disconnect Gmail?')) return
    sb.from('profiles').update({
      gmail_connected: false, gmail_email: null,
      gmail_access_token: null, gmail_refresh_token: null,
      gmail_token_expiry: null, gmail_history_id: null,
    }).eq('id', currentUser.id).then(function() {
      profile.gmail_connected = false
      profile.gmail_email = null
      renderSettings()
      showToast('Gmail disconnected', 'success')
    })
  }


  function confirmDeleteAccount() {
  if (!currentUser || !currentUser.id) return

  const confirmed = confirm(
    '⚠️ WARNING: This will permanently delete your account and ALL data (properties, conversations, settings, etc.).\n\n' +
    'Delete my account.'
  )
  if (!confirmed) return

  const typed = prompt('Type DELETE to confirm account deletion')
  if (typed !== 'DELETE') {
    showToast('Account deletion cancelled', 'error')
    return
  }

  deleteAccount()
}

async function deleteAccount() {
  if (loading) return
  loading = true

  const btn = document.querySelector('button[onclick="confirmDeleteAccount()"]')
  if (btn) {
    btn.disabled = true
    btn.textContent = 'Deleting...'
  }

  try {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) throw new Error('Not authenticated')

    const res = await fetch(SUPABASE_URL + '/functions/v1/delete-account', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + session.access_token,
        'Content-Type': 'application/json',
      },
    })

    const result = await res.json()
    if (!res.ok) throw new Error(result.error || 'Delete failed')

    await sb.auth.signOut()
    localStorage.clear()
    window.location.href = '/login.html'
  } catch (err) {
    console.error(err)
    showToast('Delete failed: ' + (err.message || 'unknown error'), 'error')
    if (btn) {
      btn.disabled = false
      btn.textContent = 'Delete Account'
    }
  } finally {
    loading = false
  }
}

  
  function showToast(msg, type) {
    var t = document.getElementById('toast')
    if (!t) return
    t.textContent = msg
    t.className = 'mb-4 text-sm px-4 py-3 rounded-lg ' + (type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-emerald-50 border-emerald-200 text-emerald-700')
    t.style.display = 'block'
    setTimeout(function() { t.style.display = 'none' }, 4000)
  }

  function section(icon, title, content) {
    return '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5 space-y-4">' +
      '<h3 class="text-sm font-semibold text-[#0F172A] dark:text-white flex items-center gap-2">' +
        '<span style="color:#5B4FE8">' + icon + '</span>' + title +
      '</h3>' + content + '</div>'
  }

  function field(label, input) {
    return '<div><label class="block text-xs font-medium text-[#0F172A] dark:text-[#CBD5E1] mb-1.5">' + label + '</label>' + input + '</div>'
  }

  function opt(val, label, current) {
    return '<option value="' + esc(val) + '"' + (current === val ? ' selected' : '') + '>' + label + '</option>'
  }

  function iCls() {
    return 'class="w-full h-9 px-3 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] bg-white transition"'
  }

  function iconSvg(name) {
    var icons = {
      user:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
      zap:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
      mail:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
      sun:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>',
      logout: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
      plan:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>',
    }
    return icons[name] || ''
  }


  function renderPlanSection() {
    var plan = profile && profile.plan ? profile.plan : 'trial';
    var planLimits = { trial: 20, solo: 60, host: 200, unlimited: Infinity };
    var propLimits = { trial: 1, solo: 1, host: 3, unlimited: Infinity };
    var planLabels = { trial: 'Free Trial', solo: 'Solo', host: 'Host', unlimited: 'Unlimited' };
    var planColors = {
      trial:     'bg-amber-100 text-amber-700',
      solo:      'bg-[#EEF0FF] text-[#5B4FE8]',
      host:      'bg-emerald-100 text-emerald-700',
      unlimited: 'bg-[#0F172A] text-white',
    };
    var limit     = planLimits[plan] !== undefined ? planLimits[plan] : 20;
    var propLimit = propLimits[plan] !== undefined ? propLimits[plan] : 1;

    // Trial countdown or billing reset
    var statusLine = '';
    if (plan === 'trial') {
      var trialEnd = profile && profile.trial_ends_at ? new Date(profile.trial_ends_at) : null;
      if (trialEnd) {
        var daysLeft = Math.ceil((trialEnd - new Date()) / 86400000);
        statusLine = daysLeft > 0
          ? daysLeft + ' day' + (daysLeft === 1 ? '' : 's') + ' remaining'
          : 'Trial expired';
      }
    } else if (plan !== 'unlimited') {
      var cycleStart = profile && profile.billing_cycle_start ? new Date(profile.billing_cycle_start) : null;
      if (cycleStart) {
        var reset = new Date(cycleStart);
        reset.setMonth(reset.getMonth() + 1);
        statusLine = 'Resets ' + reset.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      }
    }

    var html = '';

    // Plan badge + status + upgrade CTA
    html += '<div class="flex items-center justify-between">';
    html += '<div class="flex items-center gap-2 flex-wrap">';
    html += '<span class="text-xs font-semibold px-2.5 py-1 rounded-full ' + (planColors[plan] || planColors.trial) + '">';
    html += planLabels[plan] || plan;
    html += '</span>';
    if (statusLine) {
      var expired = plan === 'trial' && statusLine === 'Trial expired';
      html += '<span class="text-xs ' + (expired ? 'text-red-500 font-medium' : 'text-[#64748B] dark:text-[#94A3B8]') + '">' + statusLine + '</span>';
    }
    html += '</div>';
    if (plan === 'trial' || plan === 'solo') {
      html += '<a href="mailto:info.cohostai@gmail.com?subject=Upgrade%20CohostAI%20Plan" class="text-xs font-semibold text-[#5B4FE8] hover:underline whitespace-nowrap">Upgrade →</a>';
    }
    html += '</div>';

    // AI Drafts bar
    if (limit !== Infinity) {
      html += '<div>';
      html += '<div class="flex justify-between text-xs mb-1.5">';
      html += '<span class="text-[#64748B] dark:text-[#94A3B8]">AI Drafts this period</span>';
      html += '<span id="usage-label" class="font-medium text-[#0F172A] dark:text-white">— / ' + limit + '</span>';
      html += '</div>';
      html += '<div class="w-full h-1.5 bg-[#F1F5F9] dark:bg-[#2D3148] rounded-full overflow-hidden">';
      html += '<div id="usage-bar" class="h-full rounded-full transition-all duration-500" style="width:0%;background:#5B4FE8"></div>';
      html += '</div>';
      html += '</div>';
    } else {
      html += '<p class="text-xs text-[#64748B] dark:text-[#94A3B8]">AI Drafts: <span class="font-medium text-[#0F172A] dark:text-white">Unlimited</span></p>';
    }

    // Properties bar
    if (propLimit !== Infinity) {
      html += '<div>';
      html += '<div class="flex justify-between text-xs mb-1.5">';
      html += '<span class="text-[#64748B] dark:text-[#94A3B8]">Properties</span>';
      html += '<span id="prop-label" class="font-medium text-[#0F172A] dark:text-white">— / ' + propLimit + '</span>';
      html += '</div>';
      html += '<div class="w-full h-1.5 bg-[#F1F5F9] dark:bg-[#2D3148] rounded-full overflow-hidden">';
      html += '<div id="prop-bar" class="h-full rounded-full transition-all duration-500" style="width:0%;background:#5B4FE8"></div>';
      html += '</div>';
      html += '</div>';
    }

    return html;
  }

  async function loadUsageCount() {
    if (!currentUser || !profile) return;
    var plan        = profile.plan || 'trial';
    var planLimits  = { trial: 20, solo: 60, host: 200, unlimited: Infinity };
    var propLimits  = { trial: 1, solo: 1, host: 3, unlimited: Infinity };
    var limit       = planLimits[plan] !== undefined ? planLimits[plan] : 20;
    var propLimit   = propLimits[plan] !== undefined ? propLimits[plan] : 1;
    var billingStart = profile.billing_cycle_start || new Date().toISOString().split('T')[0];

    function applyBar(labelId, barId, used, total) {
      var pct      = Math.min(100, Math.round((used / total) * 100));
      var barColor = pct >= 90 ? '#EF4444' : pct >= 70 ? '#F59E0B' : '#5B4FE8';
      var lbl = document.getElementById(labelId);
      var bar = document.getElementById(barId);
      if (lbl) lbl.textContent = used + ' / ' + total;
      if (bar) { bar.style.width = pct + '%'; bar.style.background = barColor; }
    }

    // Draft count
    if (limit !== Infinity) {
      var dRes = await sb.from('usage_logs')
        .select('id', { count: 'exact', head: true })
        .eq('user_id', currentUser.id)
        .eq('event_type', 'draft')
        .gte('created_at', billingStart);
      applyBar('usage-label', 'usage-bar', dRes.count || 0, limit);
    }

    // Property count
    if (propLimit !== Infinity) {
      var pRes = await sb.from('properties')
        .select('id', { count: 'exact', head: true })
        .eq('user_id', currentUser.id);
      applyBar('prop-label', 'prop-bar', pRes.count || 0, propLimit);
    }
  }

  function esc(str) {
    if (!str) return ''
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
</script>
</body>
