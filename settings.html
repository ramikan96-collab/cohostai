<!DOCTYPE html>                                                                                                                                                                                                                                                               
  <html lang="en">
  <head>                                                                                                                                                                                                                                                                        
    <meta charset="UTF-8" />                                
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CohostAI — Settings</title>                                                                                                                                                                                                                                          
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>                                                                                                                                                                           
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />                                                                                                                                                           
    <style>                                                                                                                                                                                                                                                                     
      body { font-family: 'Inter', sans-serif; }                                                                                                                                                                                                                                
      @keyframes spin { to { transform: rotate(360deg); } }                                                                                                                                                                                                                     
      .spinner { animation: spin 0.8s linear infinite; }                                                                                                                                                                                                                        
    </style>
  </head>                                                                                                                                                                                                                                                                       
  <body class="bg-[#F5F6FA]" onload="init()">               
  <script src="app.js"></script>                                                                                                                                                                                                                                                
  <script>
    var profile = {}                                                                                                                                                                                                                                                            
    var profileId = null                                    
                                                                                                                                                                                                                                                                                
    function init() {                                       
      requireAuth(function(user, p) {
        profile = p || {}                                                                                                                                                                                                                                                       
        profileId = user.id
        renderPage()                                                                                                                                                                                                                                                            
      })                                                                                                                                                                                                                                                                        
    }
                                                                                                                                                                                                                                                                                
    function renderPage() {                                 
      document.body.innerHTML =
        '<div class="flex h-screen overflow-hidden">' +
          renderSidebar('settings') +                                                                                                                                                                                                                                           
          '<div class="flex-1 overflow-y-auto">' +
            '<div class="max-w-2xl mx-auto px-6 py-8">' +                                                                                                                                                                                                                       
              '<div class="mb-6">' +                        
                '<h1 class="text-lg font-semibold text-[#0F172A]">Settings</h1>' +                                                                                                                                                                                              
                '<p class="text-sm text-[#64748B] mt-0.5">Configure your host profile and AI behaviour</p>' +
              '</div>' +                                                                                                                                                                                                                                                        
              '<div id="toast" style="display:none" class="mb-4 bg-emerald-50 border border-emerald-200 text-emerald-700 text-sm px-4 py-3 rounded-lg"></div>' +
              '<form onsubmit="saveSettings(event)" class="space-y-5">' +                                                                                                                                                                                                       
                                                                                                                                                                                                                                                                                
                // Host Profile                                                                                                                                                                                                                                                 
                section('Host Profile',                                                                                                                                                                                                                                         
                  field('Your Name',                        
                    '<input id="host_name" value="' + esc(profile.host_name || '') + '" placeholder="e.g. Hayim" ' + iCls() + '>' +
                    '<p class="text-xs text-[#94A3B8] mt-1">Used by the AI to sign off replies</p>'                                                                                                                                                                             
                  ) +                                                                                                                                                                                                                                                           
                  field('Default Reply Language',                                                                                                                                                                                                                               
                    '<input id="default_language" value="' + esc(profile.default_language || '') + '" placeholder="Auto-detect (recommended)" ' + iCls() + '>' +                                                                                                                
                    '<p class="text-xs text-[#94A3B8] mt-1">Leave blank to auto-detect from guest\'s language</p>'                                                                                                                                                              
                  ) +                                                                                                                                                                                                                                                           
                  field('Email Signature',                                                                                                                                                                                                                                      
                    '<textarea id="signature" rows="3" placeholder="e.g. Warm regards, Hayim | +972 50 000 0000" ' + tCls() + '>' + esc(profile.signature || '') + '</textarea>' +                                                                                              
                    '<p class="text-xs text-[#94A3B8] mt-1">Appended to every AI-generated reply</p>'                                                                                                                                                                           
                  )                                                                                                                                                                                                                                                             
                ) +                                                                                                                                                                                                                                                             
                                                                                                                                                                                                                                                                                
                // AI Master Prompt                                                                                                                                                                                                                                             
                section('AI Master Prompt',
                  '<p class="text-xs text-[#64748B] -mt-1 mb-3">This is the most important instruction you give the AI. Define your tone, style, and how you greet guests.</p>' +                                                                                               
                  '<textarea id="master_prompt" rows="7" placeholder="Example:\nAlways be warm, friendly and professional. Use the guest\'s first name. Keep replies concise. Never sound robotic. If the guest writes in Hebrew, reply in Hebrew." ' + tCls() + '>' +          
  esc(profile.master_prompt || '') + '</textarea>'                                                                                                                                                                                                                              
                ) +                                                                                                                                                                                                                                                             
                                                                                                                                                                                                                                                                                
                // Auto Draft                               
                section('AI Behaviour',
                  '<div class="flex items-center justify-between">' +                                                                                                                                                                                                           
                    '<div>' +
                      '<p class="text-sm font-medium text-[#0F172A]">Auto-generate draft</p>' +                                                                                                                                                                                 
                      '<p class="text-xs text-[#64748B] mt-0.5">Automatically create a draft when a new message arrives</p>' +                                                                                                                                                  
                    '</div>' +                                                                                                                                                                                                                                                  
                    '<button type="button" id="auto-draft-toggle" onclick="toggleAutoDraft()" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors ' + (profile.auto_draft !== false ? 'bg-[#5B4FE8]' : 'bg-[#E2E8F0]') + '">' +                    
                      '<span id="toggle-knob" class="inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform ' + (profile.auto_draft !== false ? 'translate-x-6' : 'translate-x-1') + '"></span>' +                                                    
                    '</button>' +                                                                                                                                                                                                                                               
                  '</div>'                                                                                                                                                                                                                                                      
                ) +                                                                                                                                                                                                                                                             
                                                            
                // Gmail
                section('Gmail Connection',
                  '<div id="gmail-section">' + renderGmailSection() + '</div>'
                ) +                                                                                                                                                                                                                                                             
   
                // Danger zone                                                                                                                                                                                                                                                  
                '<div class="bg-white border border-red-100 rounded-xl p-5">' +
                  '<h3 class="text-sm font-medium text-[#0F172A] mb-3">Account</h3>' +                                                                                                                                                                                          
                  '<button type="button" onclick="logout()" class="w-full py-2 bg-red-500 text-white text-sm font-medium rounded-lg hover:bg-red-600 transition">Log Out</button>' +                                                                                            
                '</div>' +                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                
                '<div class="flex justify-end pb-8">' +                                                                                                                                                                                                                         
                  '<button type="submit" id="save-btn" class="px-5 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Save Settings</button>' +
                '</div>' +                                                                                                                                                                                                                                                      
              '</form>' +                                   
            '</div>' +
          '</div>' +
        '</div>'
    }

    function renderGmailSection() {                                                                                                                                                                                                                                             
      if (profile.gmail_connected && profile.gmail_email) {
        return '<div class="flex items-center gap-3 p-3 bg-[#F5F6FA] rounded-lg">' +                                                                                                                                                                                            
          '<div class="w-8 h-8 bg-emerald-100 rounded-full flex items-center justify-center shrink-0">' +                                                                                                                                                                       
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>' +                                                                                                                       
          '</div>' +                                                                                                                                                                                                                                                            
          '<div class="flex-1 min-w-0">' +                                                                                                                                                                                                                                      
            '<p class="text-sm font-medium text-[#0F172A]">Gmail Connected</p>' +                                                                                                                                                                                               
            '<p class="text-xs text-[#64748B] truncate">' + esc(profile.gmail_email) + '</p>' +
          '</div>' +                                                                                                                                                                                                                                                            
          '<span class="text-xs text-emerald-600 font-medium shrink-0">Active</span>' +
          '</div>' +                                                                                                                                                                                                                                                            
          '<button type="button" onclick="disconnectGmail()" class="mt-2 text-xs text-red-500 hover:underline">Disconnect Gmail</button>'
      }                                                                                                                                                                                                                                                                         
      return '<p class="text-sm text-[#64748B] mb-3">Connect your Gmail to receive Airbnb and Booking.com messages automatically.</p>' +
        '<button type="button" onclick="connectGmail()" class="flex items-center gap-2 px-4 py-2 border border-[#E2E8F0] bg-white rounded-lg text-sm font-medium text-[#0F172A] hover:border-[#5B4FE8] transition">' +                                                          
          '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>' +                               
          'Connect Gmail' +                                                                                                                                                                                                                                                     
        '</button>'                                                                                                                                                                                                                                                             
    }                                                                                                                                                                                                                                                                           
                                                            
    var autoDraft = profile.auto_draft !== false
    function toggleAutoDraft() {
      autoDraft = !autoDraft
      var toggle = document.getElementById('auto-draft-toggle')                                                                                                                                                                                                                 
      var knob   = document.getElementById('toggle-knob')
      toggle.className = 'relative inline-flex h-6 w-11 items-center rounded-full transition-colors ' + (autoDraft ? 'bg-[#5B4FE8]' : 'bg-[#E2E8F0]')                                                                                                                           
      knob.className   = 'inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform ' + (autoDraft ? 'translate-x-6' : 'translate-x-1')                                                                                                                  
    }                                                                                                                                                                                                                                                                           
                                                                                                                                                                                                                                                                                
    function saveSettings(e) {                                                                                                                                                                                                                                                  
      e.preventDefault()                                    
      var btn = document.getElementById('save-btn')
      btn.disabled = true
      btn.textContent = 'Saving...'
                                                                                                                                                                                                                                                                                
      var data = {
        host_name:        document.getElementById('host_name').value.trim(),                                                                                                                                                                                                    
        default_language: document.getElementById('default_language').value.trim(),
        signature:        document.getElementById('signature').value.trim(),                                                                                                                                                                                                    
        master_prompt:    document.getElementById('master_prompt').value.trim(),
        auto_draft:       autoDraft,                                                                                                                                                                                                                                            
      }                                                                                                                                                                                                                                                                         
  
      sb.from('profiles').update(data).eq('id', profileId)                                                                                                                                                                                                                      
        .then(function(res) {                               
          btn.disabled = false                                                                                                                                                                                                                                                  
          btn.textContent = 'Save Settings'
          if (res.error) { alert('Error: ' + res.error.message); return }                                                                                                                                                                                                       
          profile = Object.assign({}, profile, data)        
          showToast('Settings saved')                                                                                                                                                                                                                                           
        })
    }                                                                                                                                                                                                                                                                           
                                                            
    function connectGmail() {
      // Gmail OAuth — will implement with Edge Function
      window.location.href = 'https://scfotrsaabcgxiyemmlg.supabase.co/functions/v1/gmail-auth?user_id=' + profileId                                                                                                                                                            
    }                                                                                                                                                                                                                                                                           
                                                                                                                                                                                                                                                                                
    function disconnectGmail() {                                                                                                                                                                                                                                                
      if (!confirm('Disconnect Gmail?')) return                                                                                                                                                                                                                                 
      sb.from('profiles').update({ gmail_connected: false, gmail_email: null }).eq('id', profileId)
        .then(function() {
          profile.gmail_connected = false                                                                                                                                                                                                                                       
          profile.gmail_email = null
          document.getElementById('gmail-section').innerHTML = renderGmailSection()                                                                                                                                                                                             
        })                                                                                                                                                                                                                                                                      
    }
                                                                                                                                                                                                                                                                                
    function showToast(msg) {                               
      var t = document.getElementById('toast')
      t.textContent = msg
      t.style.display = 'block'
      setTimeout(function() { t.style.display = 'none' }, 3000)                                                                                                                                                                                                                 
    }
                                                                                                                                                                                                                                                                                
    function section(title, content) {                      
      return '<div class="bg-white border border-[#E2E8F0] rounded-xl p-5 space-y-4">' +
        '<h3 class="text-sm font-medium text-[#0F172A]">' + title + '</h3>' +                                                                                                                                                                                                   
        content + '</div>'
    }                                                                                                                                                                                                                                                                           
    function field(label, input) {                          
      return '<div><label class="block text-xs font-medium text-[#0F172A] mb-1.5">' + label + '</label>' + input + '</div>'                                                                                                                                                     
    }                                                                                                                                                                                                                                                                           
    function iCls() { return 'class="w-full h-9 px-3 rounded-lg border border-[#E2E8F0] text-sm outline-none focus:border-[#5B4FE8] bg-white transition"' }
    function tCls() { return 'class="w-full px-3 py-2 rounded-lg border border-[#E2E8F0] text-sm outline-none focus:border-[#5B4FE8] bg-white resize-none transition"' }                                                                                                        
    function esc(str) {                                                                                                                                                                                                                                                         
      if (!str) return ''                                                                                                                                                                                                                                                       
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')                                                                                                                                                                 
    }                                                       
  </script>                                                                                                                                                                                                                                                                     
  </body>                                                   
  </html>
