<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI — Settings</title>
  <script>
    // Apply dark mode before page renders to avoid flash
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-[#F5F6FA] dark:bg-[#0F1117]" onload="init()">
<script src="app.js"></script>
<script>
  var profile = null
  var loading = false
  var isDark = localStorage.getItem('theme') === 'dark'

  function init() {
    requireAuth(function(user, prof) {
      profile = prof
      renderSettings()
    })
  }

  function checkOAuthResult() {
    var params = new URLSearchParams(window.location.search)
    if (params.get('gmail_connected') === '1') {
      sb.from('profiles').select('*').eq('id', profile.id).single().then(function(res) {
        if (res.data) {
          profile = res.data
          var el = document.getElementById('gmail-section')
          if (el) el.innerHTML = renderGmailSection()
        }
        showToast('Gmail connected successfully!', 'success')
        history.replaceState(null, '', 'settings.html')
      })
    } else if (params.get('gmail_error')) {
      showToast('Gmail connection failed: ' + params.get('gmail_error'), 'error')
      history.replaceState(null, '', 'settings.html')
    }
  }

  function toggleDark() {
    isDark = !isDark
    if (isDark) {
      document.documentElement.classList.add('dark')
      localStorage.setItem('theme', 'dark')
    } else {
      document.documentElement.classList.remove('dark')
      localStorage.setItem('theme', 'light')
    }
    // Update toggle UI
    var knob = document.getElementById('dark-knob')
    var track = document.getElementById('dark-track')
    var label = document.getElementById('dark-label')
    var icon = document.getElementById('dark-icon')
    if (knob) knob.style.transform = isDark ? 'translateX(20px)' : 'translateX(2px)'
    if (track) track.style.background = isDark ? '#5B4FE8' : '#CBD5E1'
    if (label) label.textContent = isDark ? 'Dark Mode' : 'Light Mode'
    if (icon) icon.innerHTML = isDark ? moonIcon() : sunIcon()
  }

  function sunIcon() {
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>'
  }

  function moonIcon() {
    return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
  }

  function renderSettings() {
    var d = 'dark:bg-[#1E2130] dark:border-[#2D3148] dark:text-white'

    document.body.innerHTML =
      '<div class="flex h-screen overflow-hidden">' +
        renderSidebar('settings') +
        '<div class="flex-1 overflow-y-auto">' +
          '<div class="max-w-2xl mx-auto px-6 py-8">' +

            // Header
            '<div class="mb-6">' +
              '<h1 class="text-lg font-semibold text-[#0F172A] dark:text-white">Settings</h1>' +
              '<p class="text-sm text-[#64748B] dark:text-[#94A3B8] mt-0.5">Configure your host profile and AI behaviour.</p>' +
            '</div>' +

            '<div id="toast" style="display:none" class="mb-4"></div>' +

            '<form onsubmit="saveSettings(event)" class="space-y-5">' +

              // — Host Profile —
              sectionWithIcon(
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
                'Host Profile',
                field('Your name',
                  '<input id="host_name" value="' + esc(profile?.host_name || '') + '" placeholder="e.g. Rami" ' + iCls() + '>' +
                  '<p class="text-xs text-[#94A3B8] mt-1">Used by the AI to sign off replies.</p>'
                ) +
                field('Reply language',
                  '<select id="language_pref" ' + iCls() + '>' +
                    opt('', 'Auto-detect (reply in guest\'s language)', profile?.language_pref) +
                    opt('English', 'English', profile?.language_pref) +
                    opt('Hebrew', 'Hebrew (עברית)', profile?.language_pref) +
                    opt('Arabic', 'Arabic (العربية)', profile?.language_pref) +
                    opt('Russian', 'Russian (Русский)', profile?.language_pref) +
                    opt('Turkish', 'Turkish (Türkçe)', profile?.language_pref) +
                    opt('French', 'French (Français)', profile?.language_pref) +
                    opt('German', 'German (Deutsch)', profile?.language_pref) +
                    opt('Spanish', 'Spanish (Español)', profile?.language_pref) +
                  '</select>'
                )
              ) +

              // — AI Master Prompt —
              sectionWithIcon(
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
                'AI Master Prompt',
                '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] -mt-1">The single most important instruction you give the AI. Define tone, style, what to emphasise, and how to greet guests.</p>' +
                '<textarea id="master_prompt" rows="7" placeholder="Example:\nAlways be warm, friendly, and professional. Use the guest\'s first name. Keep replies concise. Never sound robotic. Sign off with: Warm regards, Rami.\n\nIf the guest writes in Hebrew, reply in Hebrew. If in English, reply in English." class="w-full px-3 py-2.5 rounded-xl border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] resize-none transition leading-relaxed">' + esc(profile?.master_prompt || '') + '</textarea>' +
                field('Email signature',
                  '<textarea id="signature" rows="2" placeholder="e.g. Best,\nRami" class="w-full px-3 py-2 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] resize-none transition">' + esc(profile?.signature || '') + '</textarea>'
                ) +
                '<label class="flex items-center gap-3 cursor-pointer">' +
                  '<input type="checkbox" id="auto_draft" ' + (profile?.auto_draft ? 'checked' : '') + ' class="w-4 h-4 rounded accent-[#5B4FE8]">' +
                  '<div>' +
                    '<span class="text-sm text-[#0F172A] dark:text-white font-medium">Auto-generate draft on new email</span>' +
                    '<p class="text-xs text-[#94A3B8]">AI will prepare a draft reply as soon as a new guest message arrives.</p>' +
                  '</div>' +
                '</label>'
              ) +

              // Save button
              '<div class="flex justify-end">' +
                '<button type="submit" id="save-btn" class="px-5 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Save Settings</button>' +
              '</div>' +

              // — Gmail —
              sectionWithIcon(
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
                'Gmail Connection',
                '<div id="gmail-section">' + renderGmailSection() + '</div>'
              ) +

              // — Appearance —
              sectionWithIcon(
                '<span id="dark-icon">' + (isDark ? moonIcon() : sunIcon()) + '</span>',
                'Appearance',
                '<div class="flex items-center justify-between">' +
                  '<div>' +
                    '<p class="text-sm font-medium text-[#0F172A] dark:text-white" id="dark-label">' + (isDark ? 'Dark Mode' : 'Light Mode') + '</p>' +
                    '<p class="text-xs text-[#94A3B8] mt-0.5">Switch between light and dark theme</p>' +
                  '</div>' +
                  '<button type="button" onclick="toggleDark()" style="width:44px;height:24px;border-radius:12px;background:' + (isDark ? '#5B4FE8' : '#CBD5E1') + ';position:relative;transition:background .2s;border:none;cursor:pointer;" id="dark-track">' +
                    '<span id="dark-knob" style="position:absolute;top:2px;width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s;transform:' + (isDark ? 'translateX(20px)' : 'translateX(2px)') + '"></span>' +
                  '</button>' +
                '</div>'
              ) +

              // — Account —
              sectionWithIcon(
                '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
                'Account',
                '<div class="flex items-center justify-between">' +
                  '<div>' +
                    '<p class="text-sm text-[#0F172A] dark:text-white">' + esc(profile?.email || currentUser?.email || '') + '</p>' +
                    '<p class="text-xs text-[#94A3B8] mt-0.5">Signed in account</p>' +
                  '</div>' +
                  '<button type="button" onclick="logout()" class="px-3 py-1.5 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50 dark:hover:bg-red-950 transition">Log out</button>' +
                '</div>' +
                '<button type="button" onclick="deleteAccount()" class="text-xs text-[#94A3B8] hover:text-red-500 transition mt-1">Delete account</button>'
              ) +

            '</form>' +
          '</div>' +
        '</div>' +
      '</div>'

    checkOAuthResult()
  }

  function renderGmailSection() {
    if (profile?.gmail_connected && profile?.gmail_email) {
      return '<div class="flex items-center gap-3 p-3 bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-200 dark:border-emerald-800 rounded-lg">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" class="shrink-0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
        '<div class="flex-1 min-w-0">' +
          '<p class="text-sm font-medium text-[#0F172A] dark:text-white">Gmail Connected</p>' +
          '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] truncate">' + esc(profile.gmail_email) + '</p>' +
        '</div>' +
        '<button type="button" onclick="disconnectGmail()" class="px-3 py-1.5 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition shrink-0">Disconnect</button>' +
      '</div>'
    } else {
      return '<div class="flex items-center gap-3 p-3 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800 rounded-lg mb-3">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" class="shrink-0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
        '<div>' +
          '<p class="text-sm font-medium text-[#0F172A] dark:text-white">Gmail Not Connected</p>' +
          '<p class="text-xs text-[#64748B] dark:text-[#94A3B8]">Connect Gmail to read and reply to guest messages.</p>' +
        '</div>' +
      '</div>' +
      '<button type="button" onclick="connectGmail()" class="w-full py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Connect Gmail</button>'
    }
  }

  function saveSettings(e) {
    e.preventDefault()
    if (loading) return
    loading = true
    var btn = document.getElementById('save-btn')
    btn.disabled = true
    btn.innerHTML = '<svg class="spinner w-4 h-4 inline mr-1" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>Saving...'

    var data = {
      host_name: document.getElementById('host_name').value.trim(),
      language_pref: document.getElementById('language_pref').value,
      master_prompt: document.getElementById('master_prompt').value.trim(),
      signature: document.getElementById('signature').value.trim(),
      auto_draft: document.getElementById('auto_draft').checked,
    }

    sb.from('profiles').update(data).eq('id', profile.id).then(function(res) {
      btn.disabled = false
      btn.textContent = 'Save Settings'
      loading = false
      if (res.error) { showToast('Error: ' + res.error.message, 'error'); return }
      profile = Object.assign({}, profile, data)
      showToast('Settings saved', 'success')
    })
  }

  function connectGmail() {
    window.location.href = SUPABASE_URL + '/functions/v1/gmail-auth?user_id=' + profile.id
  }

  function disconnectGmail() {
    if (!confirm('Disconnect Gmail?')) return
    sb.from('profiles').update({
      gmail_connected: false, gmail_email: null,
      gmail_access_token: null, gmail_refresh_token: null,
      gmail_token_expiry: null, gmail_history_id: null,
    }).eq('id', profile.id).then(function() {
      profile.gmail_connected = false
      profile.gmail_email = null
      document.getElementById('gmail-section').innerHTML = renderGmailSection()
      showToast('Gmail disconnected', 'success')
    })
  }

  function deleteAccount() {
    if (!confirm('Are you sure? This will delete all your data and cannot be undone.')) return
    var check = prompt('Type "DELETE" to confirm')
    if (check !== 'DELETE') return
    sb.from('profiles').delete().eq('id', profile.id).then(function() {
      sb.auth.signOut().then(function() { window.location.href = 'login.html' })
    })
  }

  function showToast(msg, type) {
    var t = document.getElementById('toast')
    if (!t) return
    t.textContent = msg
    t.className = 'mb-4 text-sm px-4 py-3 rounded-lg ' + (type === 'error'
      ? 'bg-red-50 border border-red-200 text-red-700'
      : 'bg-emerald-50 border border-emerald-200 text-emerald-700')
    t.style.display = 'block'
    setTimeout(function() { t.style.display = 'none' }, 4000)
  }

  function sectionWithIcon(iconHtml, title, content) {
    return '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5 space-y-4">' +
      '<h3 class="text-sm font-medium text-[#0F172A] dark:text-white flex items-center gap-2 text-[#5B4FE8]">' +
        '<span class="text-[#5B4FE8]">' + iconHtml + '</span>' +
        '<span class="text-[#0F172A] dark:text-white">' + title + '</span>' +
      '</h3>' +
      content +
    '</div>'
  }

  function field(label, input) {
    return '<div><label class="block text-xs font-medium text-[#0F172A] dark:text-[#CBD5E1] mb-1.5">' + label + '</label>' + input + '</div>'
  }

  function opt(val, label, current) {
    return '<option value="' + esc(val) + '"' + (current === val ? ' selected' : '') + '>' + label + '</option>'
  }

  function iCls() {
    return 'class="w-full h-9 px-3 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] bg-white transition"'
  }

  function esc(str) {
    if (!str) return ''
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
</script>
</body>
</html>
