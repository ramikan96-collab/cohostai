<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI — Settings</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease both; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-[#F5F6FA]" onload="init()">
<script src="app.js"></script>
<script>
  var profile = null
  var loading = false

  function init() {
    requireAuth(function(user, prof) {
      profile = prof
      renderSettings()
    })
  }

  function renderSettings() {
    document.body.innerHTML =
      '<div class="flex h-screen overflow-hidden">' +
        renderSidebar('settings') +
        '<div class="flex-1 overflow-y-auto">' +
          '<div class="max-w-2xl mx-auto px-6 py-8">' +
            '<div class="mb-6">' +
              '<h1 class="text-lg font-semibold text-[#0F172A]">Settings</h1>' +
              '<p class="text-sm text-[#64748B] mt-0.5">Manage your account and integrations</p>' +
            '</div>' +
            '<div id="toast" style="display:none"></div>' +
            '<form onsubmit="saveSettings(event)" class="space-y-5">' +
              section('Profile',
                field('Your name', '<input id="host_name" name="host_name" value="' + esc(profile?.host_name || '') + '" ' + iCls() + '>') +
                field('Language preference', 
                  '<select id="language_pref" name="language_pref" ' + iCls() + '>' +
  '<option value="english"' + (profile?.language_pref === 'english' ? ' selected' : '') + '>English</option>' +
  '<option value="hebrew"' + (profile?.language_pref === 'hebrew' ? ' selected' : '') + '>Hebrew (עברית)</option>' +
  '<option value="russian"' + (profile?.language_pref === 'russian' ? ' selected' : '') + '>Russian (Русский)</option>' +
  '<option value="arabic"' + (profile?.language_pref === 'arabic' ? ' selected' : '') + '>Arabic (العربية)</option>' +
'</select>'
                )
              ) +
              section('Gmail Integration',
                '<div id="gmail-section">' + renderGmailSection() + '</div>'
              ) +
              section('Danger Zone',
                '<button type="button" onclick="deleteAccount()" class="text-sm text-red-600 hover:text-red-700 font-medium">Delete my account</button>'
              ) +
              '<div class="flex justify-end pb-8">' +
                '<button type="submit" id="save-btn" class="px-5 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Save Settings</button>' +
              '</div>' +
            '</form>' +
          '</div>' +
        '</div>' +
      '</div>'
  }

  function renderGmailSection() {
    if (profile?.gmail_connected) {
      return '<div class="flex items-center justify-between">' +
        '<div>' +
          '<p class="text-sm text-[#0F172A]">Connected: ' + esc(profile.gmail_email) + '</p>' +
          '<p class="text-xs text-[#64748B] mt-0.5">CohostAI can read and send Airbnb/Booking.com messages</p>' +
        '</div>' +
        '<button type="button" onclick="disconnectGmail()" class="px-3 py-1.5 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition">Disconnect</button>' +
      '</div>'
    } else {
      return '<div class="flex items-center justify-between">' +
        '<div>' +
          '<p class="text-sm text-[#0F172A]">Not connected</p>' +
          '<p class="text-xs text-[#64748B] mt-0.5">Connect Gmail to read and reply to guest messages</p>' +
        '</div>' +
        '<button type="button" onclick="connectGmail()" class="px-3 py-1.5 text-xs bg-[#5B4FE8] text-white rounded-lg hover:bg-[#4840CC] transition">Connect Gmail</button>' +
      '</div>'
    }
  }

  function saveSettings(e) {
    e.preventDefault()
    if (loading) return
    loading = true
    var btn = document.getElementById('save-btn')
    btn.disabled = true
    btn.innerHTML = '<svg class="spinner w-4 h-4 inline mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>Saving...'

    var data = {
      host_name: document.getElementById('host_name').value.trim(),
      language_pref: document.getElementById('language_pref').value
    }

    sb.from('profiles').update(data).eq('id', profile.id)
      .then(function(res) {
        btn.disabled = false
        btn.textContent = 'Save Settings'
        loading = false
        if (res.error) { showToast('Error: ' + res.error.message, 'error'); return }
        profile = Object.assign({}, profile, data)
        showToast('Settings saved', 'success')
      })
  }

  function connectGmail() {
    window.location.href = SUPABASE_URL + '/functions/v1/gmail-auth?user_id=' + profile.id
  }

  function disconnectGmail() {
    if (!confirm('Disconnect Gmail?')) return
    sb.from('profiles').update({ gmail_connected: false, gmail_email: null }).eq('id', profile.id)
      .then(function() {
        profile.gmail_connected = false
        profile.gmail_email = null
        document.getElementById('gmail-section').innerHTML = renderGmailSection()
        showToast('Gmail disconnected', 'success')
      })
  }

  function deleteAccount() {
    if (!confirm('Are you sure? This will delete all your data and cannot be undone.')) return
    var check = prompt('Type "DELETE" to confirm account deletion')
    if (check !== 'DELETE') return
    sb.from('profiles').delete().eq('id', profile.id)
      .then(function() {
        sb.auth.signOut().then(function() {
          window.location.href = 'login.html'
        })
      })
  }

  function showToast(msg, type) {
    var t = document.getElementById('toast')
    if (!t) return
    t.textContent = msg
    t.className = 'mb-4 text-sm px-4 py-3 rounded-lg ' + (type === 'error' ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-emerald-50 border border-emerald-200 text-emerald-700')
    t.style.display = 'block'
    setTimeout(function() { t.style.display = 'none' }, 4000)
  }

  function section(title, content) {
    return '<div class="bg-white border border-[#E2E8F0] rounded-xl p-5 space-y-4">' +
      '<h3 class="text-sm font-medium text-[#0F172A]">' + title + '</h3>' +
      content + '</div>'
  }

  function field(label, input) {
    return '<div><label class="block text-xs font-medium text-[#0F172A] mb-1.5">' + label + '</label>' + input + '</div>'
  }

  function iCls() { return 'class="w-full h-9 px-3 rounded-lg border border-[#E2E8F0] text-sm outline-none focus:border-[#5B4FE8] bg-white transition"' }
  function esc(str) {
    if (!str) return ''
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
</script>
</body>
</html>
