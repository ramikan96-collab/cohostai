<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CohostAI — Settings</title>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-[#F5F6FA] dark:bg-[#0F1117]" onload="init()">
<script src="app.js"></script>
<script>
  var profile = null
  var loading = false
  var isDark = localStorage.getItem('theme') === 'dark'

  var DEFAULT_PROMPT = 'Reply as a warm, experienced short-term rental host. Think Airbnb Superhost energy.\n\nKeep replies short: 2 to 4 sentences is almost always enough. Be friendly and genuine, like texting someone you like. Never formal, never robotic.\n\nAvoid: long dashes, bullet points, "Of course!", "Absolutely!", "Great question!", "I\'d be happy to", or any phrase a robot would write.\n\nUse the guest\'s first name. Match the language they wrote in. End warmly and briefly: "See you soon!" or "Looking forward to hosting you!"\n\nIf you\'re missing a specific detail, add a short placeholder in brackets like [check-in time] rather than guessing.'

  function init() {
    requireAuth(function(user, prof) {
      profile = prof
      renderSettings()
    })
  }

  function checkOAuthResult() {
    var params = new URLSearchParams(window.location.search)
    if (params.get('gmail_connected') === '1') {
      sb.from('profiles').select('*').eq('id', currentUser.id).single().then(function(res) {
        if (res.data) {
          profile = res.data
          var el = document.getElementById('gmail-section')
          if (el) el.innerHTML = renderGmailSection()
        }
        showToast('Gmail connected!', 'success')
        history.replaceState(null, '', 'settings.html')
      })
    } else if (params.get('gmail_error')) {
      showToast('Gmail connection failed: ' + params.get('gmail_error'), 'error')
      history.replaceState(null, '', 'settings.html')
    }
  }

  function onDarkToggle() {
    isDark = !isDark
    if (isDark) {
      document.documentElement.classList.add('dark')
      localStorage.setItem('theme', 'dark')
    } else {
      document.documentElement.classList.remove('dark')
      localStorage.setItem('theme', 'light')
    }
    var track = document.getElementById('dark-track')
    var knob = document.getElementById('dark-knob')
    var label = document.getElementById('dark-label')
    if (track) track.style.background = isDark ? '#5B4FE8' : '#CBD5E1'
    if (knob) knob.style.left = isDark ? '22px' : '2px'
    if (label) label.textContent = isDark ? 'Dark Mode' : 'Light Mode'
  }

  function renderSettings() {
    document.body.innerHTML =
      '<div class="flex h-screen overflow-hidden">' +
        renderSidebar('settings') +
        '<div class="flex-1 overflow-y-auto">' +
          '<div class="max-w-2xl mx-auto px-6 py-8">' +
            '<div class="mb-6">' +
              '<h1 class="text-lg font-semibold text-[#0F172A] dark:text-white">Settings</h1>' +
              '<p class="text-sm text-[#64748B] dark:text-[#94A3B8] mt-0.5">Configure your host profile and AI behaviour.</p>' +
            '</div>' +
            '<div id="toast" style="display:none" class="mb-4"></div>' +
            '<form onsubmit="saveSettings(event)" class="space-y-5">' +

              section(
                iconSvg('user'),
                'Host Profile',
                field('Your name',
                  '<input id="host_name" value="' + esc(profile?.host_name || '') + '" placeholder="e.g. Rami" ' + iCls() + '>'
                ) +
                field('Reply language',
                  '<select id="language_pref" ' + iCls() + '>' +
                    opt('',         'Auto-detect (reply in guest\'s language)', profile?.language_pref) +
                    opt('English',  'English',           profile?.language_pref) +
                    opt('Hebrew',   'Hebrew (עברית)',     profile?.language_pref) +
                    opt('Arabic',   'Arabic (العربية)',   profile?.language_pref) +
                    opt('Russian',  'Russian (Русский)', profile?.language_pref) +
                    opt('Turkish',  'Turkish (Türkçe)',  profile?.language_pref) +
                    opt('French',   'French (Français)', profile?.language_pref) +
                    opt('German',   'German (Deutsch)',  profile?.language_pref) +
                    opt('Spanish',  'Spanish (Español)', profile?.language_pref) +
                  '</select>' +
                  '<p class="text-xs text-[#94A3B8] mt-1">Leave on Auto-detect to reply in the guest\'s own language.</p>'
                )
              ) +

              section(
                iconSvg('zap'),
                'AI Instructions',
                '<p class="text-xs text-[#64748B] dark:text-[#94A3B8] -mt-1">Tell the AI how to reply to your guests. The default works well — edit it to match your style.</p>' +
                '<textarea id="master_prompt" rows="8" class="w-full px-3 py-2.5 rounded-xl border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] resize-none transition leading-relaxed">' + esc(profile?.master_prompt || DEFAULT_PROMPT) + '</textarea>'
              ) +

              '<div class="flex justify-end">' +
                '<button type="submit" id="save-btn" class="px-5 py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Save Settings</button>' +
              '</div>' +

              section(
                iconSvg('mail'),
                'Gmail Connection',
                '<div id="gmail-section">' + renderGmailSection() + '</div>'
              ) +

              section(
                iconSvg('sun'),
                'Appearance',
                '<div class="flex items-center justify-between">' +
                  '<div>' +
                    '<p class="text-sm font-medium text-[#0F172A] dark:text-white" id="dark-label">' + (isDark ? 'Dark Mode' : 'Light Mode') + '</p>' +
                    '<p class="text-xs text-[#94A3B8] mt-0.5">Switch between light and dark theme</p>' +
                  '</div>' +
                  '<div onclick="onDarkToggle()" style="position:relative;width:44px;height:24px;border-radius:12px;background:' + (isDark ? '#5B4FE8' : '#CBD5E1') + ';cursor:pointer;transition:background .2s;flex-shrink:0;" id="dark-track">' +
                    '<div id="dark-knob" style="position:absolute;top:2px;left:' + (isDark ? '22px' : '2px') + ';width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s;"></div>' +
                  '</div>' +
                '</div>'
              ) +

              section(
                iconSvg('logout'),
                'Account',
                '<div class="flex items-center justify-between">' +
                  '<div>' +
                    '<p class="text-sm text-[#0F172A] dark:text-white">' + esc(currentUser?.email || '') + '</p>' +
                    '<p class="text-xs text-[#94A3B8] mt-0.5">Signed in account</p>' +
                  '</div>' +
                  '<button type="button" onclick="logout()" class="px-3 py-1.5 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition">Log out</button>' +
                '</div>' +
                '<button type="button" onclick="deleteAccount()" class="text-xs text-[#94A3B8] hover:text-red-500 transition">Delete account</button>'
              ) +

            '</form>' +
          '</div>' +
        '</div>' +
      '</div>'

    checkOAuthResult()
  }

  function renderGmailSection() {
    if (profile && profile.gmail_connected && profile.gmail_email) {
      return '<div class="flex items-center gap-3 p-3 bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-200 dark:border-emerald-800 rounded-lg">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" style="flex-shrink:0"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>' +
        '<div style="flex:1;min-width:0">' +
          '<p class="text-sm font-medium text-[#0F172A] dark:text-white">Gmail Connected</p>' +
          '<p class="text-xs text-[#64748B] dark:text-[#94A3B8]" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(profile.gmail_email) + '</p>' +
        '</div>' +
        '<button type="button" onclick="disconnectGmail()" class="px-3 py-1.5 text-xs text-red-600 border border-red-200 rounded-lg hover:bg-red-50 transition" style="flex-shrink:0">Disconnect</button>' +
      '</div>'
    }
    return '<div class="flex items-center gap-3 p-3 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-800 rounded-lg mb-3">' +
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" style="flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
      '<div>' +
        '<p class="text-sm font-medium text-[#0F172A] dark:text-white">Gmail Not Connected</p>' +
        '<p class="text-xs text-[#64748B] dark:text-[#94A3B8]">Connect to read and reply to guest messages.</p>' +
      '</div>' +
    '</div>' +
    '<button type="button" onclick="connectGmail()" class="w-full py-2 bg-[#5B4FE8] text-white text-sm font-medium rounded-lg hover:bg-[#4840CC] transition">Connect Gmail</button>'
  }

  function saveSettings(e) {
    e.preventDefault()
    if (loading) return
    loading = true
    var btn = document.getElementById('save-btn')
    btn.disabled = true
    btn.innerHTML = '<svg class="spinner w-4 h-4 inline mr-1" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>Saving...'

    var data = {
      host_name: document.getElementById('host_name').value.trim(),
      language_pref: document.getElementById('language_pref').value,
      master_prompt: document.getElementById('master_prompt').value.trim(),
    }

    sb.from('profiles').update(data).eq('id', currentUser.id).then(function(res) {
      btn.disabled = false
      btn.textContent = 'Save Settings'
      loading = false
      if (res.error) { showToast('Error: ' + res.error.message, 'error'); return }
      profile = Object.assign({}, profile, data)
      showToast('Settings saved', 'success')
    })
  }

  function connectGmail() {
    var uid = currentUser && currentUser.id
    if (!uid) { showToast('Not signed in', 'error'); return }
    window.location.href = SUPABASE_URL + '/functions/v1/gmail-auth?user_id=' + uid
  }

  function disconnectGmail() {
    if (!confirm('Disconnect Gmail?')) return
    sb.from('profiles').update({
      gmail_connected: false, gmail_email: null,
      gmail_access_token: null, gmail_refresh_token: null,
      gmail_token_expiry: null, gmail_history_id: null,
    }).eq('id', currentUser.id).then(function() {
      profile.gmail_connected = false
      profile.gmail_email = null
      document.getElementById('gmail-section').innerHTML = renderGmailSection()
      showToast('Gmail disconnected', 'success')
    })
  }

  function deleteAccount() {
    if (!confirm('Are you sure? This will delete all your data and cannot be undone.')) return
    if (prompt('Type "DELETE" to confirm') !== 'DELETE') return
    sb.from('profiles').delete().eq('id', currentUser.id).then(function() {
      sb.auth.signOut().then(function() { window.location.href = 'login.html' })
    })
  }

  function showToast(msg, type) {
    var t = document.getElementById('toast')
    if (!t) return
    t.textContent = msg
    t.className = 'mb-4 text-sm px-4 py-3 rounded-lg ' + (type === 'error'
      ? 'bg-red-50 border border-red-200 text-red-700'
      : 'bg-emerald-50 border border-emerald-200 text-emerald-700')
    t.style.display = 'block'
    setTimeout(function() { t.style.display = 'none' }, 4000)
  }

  function section(icon, title, content) {
    return '<div class="bg-white dark:bg-[#1E2130] border border-[#E2E8F0] dark:border-[#2D3148] rounded-xl p-5 space-y-4">' +
      '<h3 class="text-sm font-semibold text-[#0F172A] dark:text-white flex items-center gap-2">' +
        '<span style="color:#5B4FE8">' + icon + '</span>' + title +
      '</h3>' +
      content +
    '</div>'
  }

  function field(label, input) {
    return '<div><label class="block text-xs font-medium text-[#0F172A] dark:text-[#CBD5E1] mb-1.5">' + label + '</label>' + input + '</div>'
  }

  function opt(val, label, current) {
    return '<option value="' + esc(val) + '"' + (current === val ? ' selected' : '') + '>' + label + '</option>'
  }

  function iCls() {
    return 'class="w-full h-9 px-3 rounded-lg border border-[#E2E8F0] dark:border-[#2D3148] dark:bg-[#151724] dark:text-white text-sm outline-none focus:border-[#5B4FE8] bg-white transition"'
  }

  function iconSvg(name) {
    var icons = {
      user:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
      zap:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
      mail:   '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
      sun:    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>',
      logout: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
    }
    return icons[name] || ''
  }

  function esc(str) {
    if (!str) return ''
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
  }
</script>
</body>
</html>
